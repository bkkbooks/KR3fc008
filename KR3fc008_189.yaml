body:
  text: 今驗開禧厯所推臨安府大暑後五日午中景一尺四寸八分八十五秒與陽城大暑後五日午中景二尺一寸一十四秒太課之乃以臨安府五日景減陽城五日景差六寸一分二十九秒太草曰置臨安府所測冬至景一丈八寸二分二十五秒以夏至景九寸一分減之餘九尺九寸一分二十五秒為景差以為實置象度九十一度三十一分四十四秒加一十一度二十五分二十七秒半命度為寸得一百二寸五千六百七十一分半為法除差實得空寸九千六
