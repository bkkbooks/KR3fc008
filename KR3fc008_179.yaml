body:
  text: 仍以夏至羃八十二寸八千一百分加上位一百一寸八千六十分得一百八十四寸六千一百六十分爲大暑羃以爲實以一寸爲隅開平方得一尺三寸五分八十七秒爲大暑景不盡弃之又置立秋乘率二百八十九乘節率九千三百四十分得二百六十九寸九千二百六十分於上位
