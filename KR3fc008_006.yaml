body:
  text: 域第三莫高匪山莫濬匪川神禹奠之積矩攸傳智創巧述重差夕桀求之既詳揆之罔越崇深廣遠度則靡容形格勢禁寇壘分墉欲知其數先望以表因差施術坐悉微渺述測望第四邦國之賦以侍百事畡田經入取之有度未免力役先商厥功以衰以率勞逸乃同漢猶近古稅租以算調均錢榖河葘之扞惟仁隱民猶已溺飢賦役不均寧得勿思述賦役第五物等斂賦式時府庾爛粟寸絲褐夫紅女商征邊糴後世多端吏緣為欺上下俱殫我聞理財如智治水澄源濬流維其深矣彼昧弗察慘急煩弄去理益遠吁嗟不仁述錢穀第六斯城斯池乃棟乃宇宅生寄命以保以聚鴻功雉制竹箇木章匪究匪度財蠹力傷圍蔡而栽如子西素匠計靈臺俾漢文懼惟武圖功惟儉昭德有國有家茲焉取則述營建第七天生五材兵去未可不教而戰維上之過堂堂之陳鵝鸛為行營應規矩其將莫當師中之吉惟智仁通夜算軍書先計攸重我間在昔輕則寡謀飱民以幸亦孔之憂述軍旅第八日中而市萬民所資賈貿蹛鬻利析錙銖蹛財役貧封君
  hash: sha256:237b3baa22e225358d90ad74c5d6e242f3775c36cc4d95266d981ebb146eb5b1
