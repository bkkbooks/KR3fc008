body:
  text: 術曰以商功求之均輸入之倍臺上袤加下袤乘上廣爲寄倍下袤加上袤乘下廣併寄乘高爲土率如六而一得堅積以築功尺爲法除堅積得築功以穿率乘堅積爲實以堅率乘钁鍬功尺半之爲鍬法除實得钁鍬𠔏功以壤率因堅積如堅率而一爲壤積求負土者先列全分及等至高諸母子以母互乘諸子爲寄左行以諸母相乘爲寄母次列棚道全分及所當鮮母衍子以鮮母互乘衍子爲左行以鮮母相乘以乘寄得數又以列位乘之爲總母以左右兩行諸子對乘之併之爲總子其總母子求等約之爲定母子以定子乘棚道爲次以定母乘平道加次又以踟躕之數身下加之又以載輸步乘定母併次爲統數以定母除統數得定一返步亦爲到土法有分復通爲法置程里通步乘擔土尺有步母則又以步母乘之爲到實實如法而一得毎功人到土亦爲壤法以除壤積得負土功併前鍬築二功爲總用功以各縣日程數約稅力各得力率副併爲科法以𠔏用功乘未併者各爲科實實如法而一各得縣夫求甎者倍轉道闊遍加臺上下廣袤變名上下闊長以甎厚加臺高爲臺直次列甎石長闊厚各相乘爲甎石積法通廣袤如法乃倍上長加下長乘上闊爲寄次倍下長加上長乘下闊併寄𠔏乘直得數減土率餘如六而一爲泛置南北道高子各乘臺高爲貴如各母而一得五道
