body:
  text: 術曰以商功求之均輸入之倍臺上袤加下袤乘上廣為寄倍下袤加上袤乘下廣併寄乘高為土率如六而一得堅積以築功尺為法除堅積得築功以穿率乘堅積為實以堅率乘钁鍬功尺半之為鍬法除實得钁鍬共功以壤率因堅積如堅率而一為壤積求負土者先列全分及等至高諸母子以母互乘諸子為寄左行以諸母相乘為寄母次列棚道全分及所當鮮母衍子以鮮母互乘衍子為左行以鮮母相乘以乘寄得數又以列位乘之為總母以左右兩行諸子對乘之併之為總子其總母子求等約之為定母子以定子乘棚道為次以定母乘平道加次又以踟蹰之數身下加之又以載輸步乘定母併次為統數以定母除統數得定一返步亦為到土法有分復通為法置程里通步乘擔土尺有步母則又以步母乘之為到實實如法而一得每功人到土亦為壤法以除壤積得負土功併前鍬築二功為總用功以各縣日程數約稅力各得力率副併為科法以共用功乘未併者各為科實實如法而一各得縣夫求甎者倍轉道闊遍加臺上下廣袤變名上下闊長以甎厚加臺高為臺直次列甎石長闊厚各相乘為甎石積法通廣袤如法乃倍上長加下長乘上闊為寄次倍下長加上長乘下闊併寄共乘直得數減土率餘如六而一為泛置南北道高子各乘臺高為貴如各母而一得五道
