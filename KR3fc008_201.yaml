body:
  text: 為隅開平方得一十寸四分展為一尺四分為平地雪厚合問竹器驗雪問以圓竹籮驗雪籮口徑一尺六寸深一尺七寸底徑一尺二寸雪降其中高一尺籮體通風受雪多則平地少欲知平地雪高幾何答曰平地雪厚九寸三千四百三十九分寸之七百六十四術曰口徑減底徑餘乘雪深半之自乘為隅以籮深羃乘雪深羃併隅又乘雪深冪為實隅實可約約之開連枝三乘方得平地雪厚草曰列問數各通為寸置口徑一十六寸減底徑一十二寸餘四寸乘雪深一十寸得四十寸以半之得二十寸自乘得四百寸為隅以籮深一十七寸自乘得二百八十九寸為籮深羃次置雪深一十寸自乘得一百寸為雪深羃以乘籮深冪數加隅又乘深羃得二百九十三萬寸為實隅實求等得四百俱約之得七千三百二十五為實得一為隅開三乘方步法不可超乃約實置商九寸與隅一相生得九為下廉又與商相生得八十一寸為上廉又與商相生得七百二十九為從方乃命上商除實不盡七百六十四已而復以商生隅入二廉至方陸續又生畢以方廉隅共併之得三千四百三十九分寸之七百六十四為平地雪厚九寸三千四百三十九分寸
