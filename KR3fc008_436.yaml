body:
  text: 一萬六千一百九十四已上並為定力副併八處定力得五千六百九十二萬二千五百五十七為法以合起一萬二千夫遍乘定力訖上得一千三百八十三億二千五百九十六萬八千為實中得一千七百二十八億七千一百七十四萬八千為中實下得二千三百九十四億五百二十五萬六千為下實仁得四百五億八千四百四十五萬六千為仁實義得三百三十五億四千二百四十九萬六千為義實禮得三百六億四千四百二十四萬四千為禮實智得二百五十一億二百一十八萬八千為智實信得二十五億九千四百三十二萬八千為信實已上八實皆如前法而一上縣得二千四百三十夫不盡四百一十五萬四千四百九十輩歸中縣下縣中縣得三千三十六夫不盡五千四百八十六萬四千九百四十八輩為一夫下縣得四千二百五夫不盡四千五百九十萬三千八百一十五輩為一夫仁鄉得七百一十二夫不盡五千五百五十九萬五千四百一十六輩為一夫義鄉得五百八十九夫不盡一千五百一十萬九千九百二十七輩歸仁鄉禮鄉得五百三十八夫不盡一千九百九十萬八千三百三十四輩歸智鄉信鄉智鄉得四百四十夫不盡五千六百二十六萬二千九百二十輩為一夫信鄉得四十五夫不盡三千二百八十一萬二千九百三十五輩為一夫合問
