body:
  text: 十人乙縣出一千九百九十人丙縣出一千六百三十人丁縣出一千三百二十人其甲縣先差到一千五百四十四夫丙縣先差到九百六十五夫欲知各合賦役埂長計幾何里法三百六十步荅曰甲先到人築二千六百二十八步計七里一百八步丙先到人築一千六百四十二步計四里二百二步半術曰以商功求之置里通步作尺爲積率併諸縣人數爲均法法與率可約者約之以科率各乘先到人爲實皆如法而一各得先築里步爲先賦埂長其續到人合賦功準此求之草曰置三十六里五分以里法三百六十步通之得一萬三千一百四十步又以步法五尺乘之得六萬五千七百尺爲長率併甲乙丙丁四縣合科人得七千七百二十爲均法今法與率可求等得二十以約之率得三千二百八十五法得三百八十六以長率三千二百八十五尺乘甲縣先到人一千五百四十四夫得五百七萬二千四十尺爲甲實實如法三百八十六而一得一萬三千一百四十尺以步五尺法約之得二千六百二十八步爲甲縣先到人所築積步又以積率三千二百八十五乘丙縣先到人九百六十五夫得三百一十七萬二十五尺爲丙實實如法三百八十六而一得八千二百一十二尺五寸以步法五尺約之得一千六百四十
