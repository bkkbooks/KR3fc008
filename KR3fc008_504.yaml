body:
  text: 以石價除都牽錢得牽米見問術曰以商功求之率變入之置糴本牙錢牽錢相乘為實以牽米為隅開連枝立方得石價以價除本得糴到米以牙錢乘米得總牙錢以價除之得牙米以牽錢乘牙米得共牽錢草曰置糴米三百萬貫乘牙錢三十文得九千萬貫又乘牽錢八百文得七百二十億萬貫為價實置牽米四石六斗八合於實數零文之下為立方從隅起步步法常超二位每超一度商進之今隅凡超四度當於實上約定首商二十貫乃以商生隅四石六斗八合得九十二貫一百六十文乃以為廉又以商生廉得一百八十四萬三千二百貫為方乃以方命上商二十貫除實訖實餘三百五十一億三千六百萬貫復以商生隅四石六
