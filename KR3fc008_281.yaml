body:
  text: 十三步五分步之三爲山高次以法四寸乘表高二丈三尺得九百二十爲遠法以退後表三丈一尺三寸乘高實一百四十七萬六千七百二十寸得四億六千二百二十一萬三千三百六十寸爲遠實實如遠法九百二十寸而一得五十萬二千四百五寸二十三分寸之一十九爲積寸乃以步法五十寸乘遠法九百二十得四萬六千寸爲法亦除遠實得一萬四十八步不盡五千三百六十與法求等得八十俱以約之爲五百七十五分步之六十七又以里法三百六十步約得二十七里三百二十八步五百七十五分步之六十七爲山後表人立望處算圖如後
  hash: sha256:433ef5557982489f109ad31e2e986f5b5643792ae1db1aafeb43447236b56f26
