body:
  text: 百為大率以小率九萬減大率餘二十萬一千六百自乘得四百六億四千二百五十六萬為實以小率九萬併大率二十九萬一千六百得三十八萬一千六百倍之得七十六萬三千二百為從上廉以一為益隅開玲瓏翻法三乘方步法乃以從廉超一位益隅超三位約商得十今再超進乃商置百其從上廉為七十六億三千二百萬其益隅為一億約實置商八百為定商以商生益隅得八億為益下廉又以商生下廉得六十四億為益上廉與從上廉七十六億三千二百萬相消從上廉餘十二億三千二百萬又與商相生得九十八億五千六百萬為從方又與商相生得七百八十八億四千八百萬為正積與元實四百六億四千二百五十六萬相消正積餘三百八十二億五百四十四萬為正實又以益隅一億與商相生得八億增入益下廉為一十六億又以益下廉與商相生得一百二十八億為益上廉乃以益上廉與從上廉一十二億三千二百萬相消餘一百一十五億六千八百萬為益上廉又與商相生得九百二十五億四千四百萬為益方與從方九十八億五千六百萬相消益方餘八百二十六億八千八百萬為益方又以商生益隅一億得八億增入益下廉得二十四億又以商相生得一百九十二億入益上廉得三百七億六千八百萬為益上廉又以商生益隅一億得八
