body:
  text: 魯郡秦九韶復邑修賦問有海坍縣地今已復漲歲久鄉井再成申請創邑稱土排到六鄉以附郭為甲最遠為己各有田九等開具下項甲鄉共計田一十四萬一百九十三畝三角一十二步上等上田五千六百七十八畝一角四十八步中田四千八百九十二畝三十步下田六千六百二十一畝五十四步中等上田八千二百二十五畝二十四步中田一萬三十五畝六步下田一萬六千五百三十畝下等上田二萬一千九十畝二十四步中田三萬二千六十畝三步下田三萬五千六十一畝三角三步乙鄉田共計八萬四千一十畝二角二步上等上田六千七百八十九畝一角三十六步中田五千九百八十七畝二角下田八千一十畝三角三步中等上田七千五百四十一畝中田九千一百二十一畝二角一十二步下田一萬九千六十六畝六步
