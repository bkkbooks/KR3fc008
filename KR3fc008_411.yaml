body:
  text: 百一十五貫三百二十一文遍乘所放錢米二率得錢七千九百四十九貫三百五十一文五分五釐六毫得米三萬九百一十四石一斗四升四合九勺四抄為明年兩稅合放數均科綿稅問縣科綿有五等戶共一萬一千三十三戶共科綿八萬八千三百三十七兩六錢上等一十二戶副等八十七戶中等四百六十四戶次等二千三十五戶下等八千四百三十五戶欲令上三等折半差下二等比中等六四折差科率求之各戶納及各等幾何答曰上等一戶一百二十四兩一十二戶計一千四百八十八兩副等一戶六十二兩八十七戶計五千三百九十四兩中等一戶三十一兩四百六十四戶計一萬四千三百八十四兩次等一戶一十二兩四錢二千三十五戶計二萬五千二百三十四兩下等一戶四兩九錢六分八千四百三十五戶計四萬一千八百三十七兩六錢術曰列五等戶數先以四折下等數加次等戶又以四折
