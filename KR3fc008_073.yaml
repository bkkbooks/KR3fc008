body:
  text: 乃視諸庫有無零錢數騐得乙丙己三庫無先去其用數乃以甲丁戊庚四庫零錢列左行對乘本用甲得四萬六千二百丁得六萬一千六百戊得二萬七百九十庚得三萬六千九百六十各爲總併此四總得一十六萬五千五百五十滿衍母二萬七千七百二十去之不滿二萬六千九百五十爲所求率以貫約爲二十六貫九百五十文爲諸庫日息等數以官省七十七陌展得三十五貫文各以其庫元陌紐計各得舊會零錢各以三十日乘爲大月息以日息減大息餘爲小月息合問數書九章卷第一
