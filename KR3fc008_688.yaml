body:
  text: 今驗音次行之負金當以右行之正金補之而其數不等先以右金五約次金五百二十五得一百五以乘音圖右行畢其右積得二十七萬八千二百五十貫金五百二十五兩正鹽一百五袋正其副次左三行如音圖故乃成爻圖今視爻圖右行之金正與次行之金負適等即用右行直加次行按術以同名相加乃以右之金正減其次之金負為空按術以異名相減之其次鹽空為無人按術以正無人正之乃以爻圖右積二十七萬八千二百五十貫加次積二百三十五萬三千二百貫內得二百六十三萬一千四百五十貫其次金空次鹽一百五袋正次銀五萬二千一百四兩正仍置定圖右行數而成正圖
