body:
  text: 術入之共得一千二百九十四功七千分功之一千四百八十九通分內子得一百二十九萬五千四百八十九為衆功實置火頭每管六十人分母乘之得六萬為法除都功實得火頭二十一人六萬分之三萬五千四百八十九壕寨每部一百二十人就倍火頭法六萬為十二萬亦除衆功實得壕寨十人十二萬分之九萬五千四百八十九列兩餘分及前諸作功餘七千分之一千四百八十九三項以合分術入之得一功不盡五十萬四千億分之三十萬二千三百六十九億四千萬分求等又約之為八十四萬分之五十萬三千九百四十九分乃又併之共得一千三百二十六功其餘分大約百分中之五十九在半以上收為一功共定得一千三百二十七功為每丈都功然後以城通長遍乘諸項置城長一千五百一十丈乘城率一萬五千七百五十尺得二千三百七十八萬二千五百尺為城堅積又以城長乘牆率七百五十尺得一百一十三萬二千五百尺為牆堅積併牆城二積得二千四百九十一萬五千尺又以墟率四因之得九千九百六十六萬尺為實以堅率三約得三千三百二十二萬尺為濠積以為實以濠闊三十丈併下闊二十五丈得五十五丈以半之得二百七十五尺乘濠長一千五百一十丈得四十一萬五千二百五十尺為濠法除實得八丈為濠深
