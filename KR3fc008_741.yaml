body:
  text: 僦直推原問房廊數內一戶日納一百五十六文八分足為準指揮未曾經減者減三分已曾經減三分者減二分已曾經減二分者更減二分今本戶纍經減者欲知元額房錢幾何答曰元額三百五十文術曰以衰分求之列一十分兩行各三位列減分對減右行以餘者相乘為法以左行元列相乘得納錢為實實如法而一得元額錢
