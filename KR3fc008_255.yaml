body:
  text: 子母求等得三俱以三約母子得五十三分步之三為大圓積七十九步五十三分步之三次置小圓田周三十步以自乘得九百為周羃退位得九十為徑實以一為隅開平方得九步不盡九以隅生方又益隅得一十九分步之九為小圓徑九步一十九分步之九次以周羃九百乘前實九十得八萬一千以十六約之得五千六十二步五分為實以一為隅開平方得七十一步有不盡數二十一步五分為子以隅生方又益隅得一百四十三為分母以分子母求等得五分俱約之得二百八十六分步之四十三為積次置環田周三十步自乘得九百為周羃退位得九十為實以一為隅開平方得九步不盡九為分子以隅生方併隅得一十九為分母直命之為環田通徑九步一十九分步之九次以環周羃九百乘環實九十得八萬一千以十六約之得五千六十二步五分為大率次置環田虛徑八步自乘得六十四為虛羃進位得六百四十為實以一為隅開平方得二十五步不盡一十五為分子以隅生方又併隅得五十一為分母與子求等得三俱約之得一十七分步之五為環田內周二十五步一十七分步之五次以虛羃六十四乘周實六百四十得四萬九百六十以十六約之得二千五百六十為小率以小率減大率餘二千五百二步五分自乘得六百二十六萬二千五百六步二
