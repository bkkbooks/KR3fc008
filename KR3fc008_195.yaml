body:
  text: 草曰以盆㴱及徑皆通爲寸盆㴱得一十八寸底徑得一十二寸相乘得二百十六寸爲底率置口徑二十八寸減底徑一十二寸餘一十六寸爲差以乘水㴱九寸得一百四十四寸併底率二百一十六寸得三百六十寸爲面率以盆㴱一十八寸爲法除面率得二十寸展爲二尺爲水面徑以底率二百一十六寸乘面率三百六十寸得七萬七千七百六十寸於上以底率二百一十六寸自乘得四萬六千六百五十六寸加上又以面率三百六十自乘得一十二萬九千六百併上𠔏得二十五萬四千一十六以乘水㴱九寸得二百二十八萬六千一百四十四寸爲實以盆㴱一十八寸乘口徑二十八寸得五百四寸自乘得二十五萬四千一十六寸又三因得七十六萬二千四十八寸爲法除實得三寸爲平地雨㴱合問圓罌測雨問以圓罌接雨口徑一尺五分腹徑二尺四寸底徑八寸㴱一尺六寸竝裏明接得雨一尺二寸圓法用密率問平地雨水㴱幾何荅曰平地水㴱一尺八寸七萬四千八十八分寸之六萬四千四百八十三術曰底徑與腹徑相乘又各自乘併之乘半罌㴱以一十一乘之爲下率以四十二爲上法除得下積以半罌㴱併雨㴱減元罌㴱餘爲上㴱以口徑減腹徑餘乘上㴱爲次
