body:
  text: 草曰以盆深及徑皆通為寸盆深得一十八寸底徑得一十二寸相乘得二百十六寸為底率置口徑二十八寸減底徑一十二寸餘一十六寸為差以乘水深九寸得一百四十四寸併底率二百一十六寸得三百六十寸為面率以盆深一十八寸為法除面率得二十寸展為二尺為水面徑以底率二百一十六寸乘面率三百六十寸得七萬七千七百六十寸於上以底率二百一十六寸自乘得四萬六千六百五十六寸加上又以面率三百六十自乘得一十二萬九千六百併上共得二十五萬四千一十六以乘水深九寸得二百二十八萬六千一百四十四寸為實以盆深一十八寸乘口徑二十八寸得五百四寸自乘得二十五萬四千一十六寸又三因得七十六萬二千四十八寸為法除實得三寸為平地雨深合問圓罌測雨問以圓罌接雨口徑一尺五分腹徑二尺四寸底徑八寸深一尺六寸並裏明接得雨一尺二寸圓法用密率問平地雨水深幾何答曰平地水深一尺八寸七萬四千八十八分寸之六萬四千四百八十三術曰底徑與腹徑相乘又各自乘併之乘半罌深以一十一乘之為下率以四十二為上法除得下積以半罌深併雨深減元罌深餘為上深以口徑減腹徑餘乘上深為次
