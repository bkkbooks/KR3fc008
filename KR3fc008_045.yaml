body:
  text: 以三行互乘右得一百三十七萬三千三百四十為氣分中得一十一萬一千三十六為朔分左得二十二萬五千六百為紀分先求總等得一十二乃存紀分一位不約只以等一十二約氣分得一十一萬四千四百四十五又約朔分得九千二百五十三皆為元法乃以連環求等次以紀元二十二萬五千六百與朔元九千二百五十三求等得一不約又以紀元與氣元一十一萬四千四百四十五求等得二百三十五只約氣元得四百八十七次以氣元四百八十七與朔元九千二百五十三求等得四百八十七只約朔元九千二百五十三得一十九約遍畢得四百八十七為氣定得一十九為朔定得二十二萬五千六百為紀定以三定相乘得二十億八千七百四十七萬六千八百為衍母具圖如后
  hash: sha256:d5b474c6ad444de4a4b2a9932b9d1248b69d89380d39d420a92f5276f9d711de
