body:
  text: 下田苗米二斗四升二合七勺八抄四撮和買一尺二寸六分五釐六毫八絲夏稅九寸二分六釐中等上田苗米二斗一升二合四勺三抄六撮和買一尺一寸七釐四毫七絲夏稅八寸一分二毫五絲中田苗米一斗八升二合八抄八撮和買九寸四分九釐二毫六絲夏稅六寸九分四釐五毫下田苗米一斗五升一合七勺四抄和買七寸九分一釐五絲夏稅五寸七分八釐七毫五絲下等上田苗米一斗二升一合三勺九抄二撮和買六寸三分二釐八毫四絲夏稅四寸六分三釐中田苗米九升一合四抄四撮和買四寸七分四釐六毫三絲夏稅三寸四分七釐二毫下田苗米六升六勺九抄六撮和買三寸一分六釐四毫二絲夏稅二寸三分一釐五毫丁鄉上等上田苗米三斗四升三合二勺一抄四撮
