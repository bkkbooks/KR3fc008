body:
  text: 六十二人得九十人為外鋭一邊人倍一邊九十得一百八十併不盡二人共得一百八十二人為內鋭廣布兵數亦為長布兵副置加一得一百八十三乘副一百八十二得三萬三千三百六以半之得一萬六千六百五十三人為內鋭陳布兵以減總兵六萬二千五百餘四萬五千八百四十七人為外鋭兵
