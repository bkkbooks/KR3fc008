body:
  text: 百六十四分四十秒以自乘之得空寸九千三百四十分爲節率先以小暑乘率二十五乘之得二十三寸三千五百分於上次以臨安夏至景九寸一分自乘得八十二寸八千一百分爲夏至景羃以加上得一百六寸一千六百分爲小暑羃開平方以一寸爲隅開之得一尺三分爲小暑景又以大暑乘率一百九乘節率九千三百四十分得一百一寸八千六十分於上仍加夏至羃八十二寸八千一百分得一百八十四寸六千一百六十分爲大暑羃以爲實以一寸爲隅開平方得一尺三寸五分八十七秒爲大暑景又置立秋乘率二百八十九乘節率九千三百四十分得二百六十九寸九千二百六十分於上仍加夏至羃八十二寸八千一百分𠔏得三百五十二寸七千三百六十爲立秋羃以爲實以一寸爲隅開平方得一尺八寸七分八十一秒爲立秋景乃騐陽城夏至景一尺四寸七分七十九秒在大暑後立秋前乃併大暑立秋二景半之得一尺六寸一分八十四秒爲大暑後九日景又併大暑景半之得一尺四寸八分八十五秒半爲大暑後五日午中景又併大暑景得數半之得一尺四寸二分三十六秒少爲大暑後三日景又併五日景一尺四寸八分八十五秒半得數半之得一尺四寸五分六十秒强爲大暑後四日景騐得陽城夏至景入臨安大景後四日乃以四日景
