body:
  text: 百六十四分四十秒以自乘之得空寸九千三百四十分為節率先以小暑乘率二十五乘之得二十三寸三千五百分於上次以臨安夏至景九寸一分自乘得八十二寸八千一百分為夏至景羃以加上得一百六寸一千六百分為小暑羃開平方以一寸為隅開之得一尺三分為小暑景又以大暑乘率一百九乘節率九千三百四十分得一百一寸八千六十分於上仍加夏至羃八十二寸八千一百分得一百八十四寸六千一百六十分為大暑羃以為實以一寸為隅開平方得一尺三寸五分八十七秒為大暑景又置立秋乘率二百八十九乘節率九千三百四十分得二百六十九寸九千二百六十分於上仍加夏至羃八十二寸八千一百分共得三百五十二寸七千三百六十為立秋羃以為實以一寸為隅開平方得一尺八寸七分八十一秒為立秋景乃驗陽城夏至景一尺四寸七分七十九秒在大暑後立秋前乃併大暑立秋二景半之得一尺六寸一分八十四秒為大暑後九日景又併大暑景半之得一尺四寸八分八十五秒半為大暑後五日午中景又併大暑景得數半之得一尺四寸二分三十六秒少為大暑後三日景又併五日景一尺四寸八分八十五秒半得數半之得一尺四寸五分六十秒強為大暑後四日景驗得陽城夏至景入臨安大景後四日乃以四日景
