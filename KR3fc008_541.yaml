body:
  text: 為石版以每片用灰乘石為灰數以匠功片數約版得石匠以般夫數乘石版為實以扛片數為法除之得人數以般用灰數除灰得人數併諸工以火頭管數約之為火頭半之為部押草曰置層高二尺面闊三丈相乘得六十尺又乘長三十丈得一萬八千尺為初率次以差闊一尺乘高二尺又乘長三十丈得六百尺為次率卻以石版長五尺闊二尺厚五寸相乘得五尺為法以除二率得三千六百片為初積一百二十片為次積列右行置深四丈二尺以每層二尺約之得二十一層乘初積三千六百片得七萬五千六百片於上次置二十一層減一餘二十以乘二十一層得四百二十半之得二百一十乘次積一百二十片得二萬五千二百片加入上共得一十萬八百片為石版數次置二十一層減去一餘二十以差闊一尺乘之得二丈併上闊三丈共得五丈為下闊之數又置石版一十萬八百片以每功九約得一萬一千二百功置石版數以般扛四人乘之得四十萬三千二百為實以五片為法除之得八萬六百四十工又置石版數以每片用灰一十斤乘之得一百萬八千斤為灰實以每人擔用一百一十斤約之得九千一百六十三功一十一分功之七為灰工於上又併石版工一萬一千二百及併般扛工八萬六百四十功加上共得一十萬一
