body:
  text: 術曰以商功求之置城及牆上下廣各併之乘高進位半之各得每丈積率併之為共率先以每功尺除之又以諸色工各數乘之為土功丈率次置柱木橛索乘其每條段功得各共功次置城方一丈自之乘用甎總幅數為實以甎長乘厚為側法除實得城身用甎次置鵲臺座子肩子帽子各高闊長相乘為寄併之於上次以箭窗眼高低差寸求斜深虛積減寄餘為女頭甎實以側法乘甎闊為甎積法除之得女頭鵲臺用甎又置護險牆高以丈乘而半之又乘上下幅共數為實以甎闊厚相乘為法除之得護險牆用甎併三項用甎為都實以每功片為法除之得甎匠功以每丈用石段數求石匠功以搬每丈石求搬石功以片用灰數乘都甎得甎用灰以每丈石版數乘片用灰得石用灰併之為甎石共灰以每功般灰數除之得般灰工併諸作功為實以火頭壕寨每管人數各為法除之得各數又併之為都功然後以城圍通長遍乘諸項每丈率積灰各功料得共數草曰置城上廣三丈併下廣七丈五尺得一十丈五尺乘高三丈得三千一百五十尺進位得三萬一千五百尺半之得一萬五千七百五十尺為每丈城積率次置羊馬牆闊五尺併下闊一丈得一十五尺乘高一丈得一百五十尺進位得一千五百尺以半之得七百五十尺
