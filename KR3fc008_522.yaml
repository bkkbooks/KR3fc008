body:
  text: 術曰以商功求之置城及牆上下廣各併之乘高進位半之各得毎丈積率併之爲𠔏率先以毎功尺除之又以諸色工各數乘之爲土功丈率次置柱木橛索乘其毎條段功得各𠔏功次置城方一丈自之乘用甎總幅數爲實以甎長乘厚爲側法除實得城身用甎次置鵲臺座子肩子帽子各高闊長相乘爲寄併之於上次以箭窗眼高低差寸求斜㴱虛積減寄餘爲女頭甎實以側法乘甎闊爲甎積法除之得女頭鵲臺用甎又置護險牆高以丈乘而半之又乘上下幅𠔏數爲實以甎闊厚相乘爲法除之得護險牆用甎併三項用甎爲都實以毎功片爲法除之得甎匠功以毎丈用石段數求石匠功以搬毎丈石求搬石功以片用灰數乘都甎得甎用灰以毎丈石版數乘片用灰得石用灰併之爲甎石𠔏灰以毎功般灰數除之得般灰工併諸作功爲實以火頭壕寨毎管人數各爲法除之得各數又併之爲都功然後以城圍通長徧乘諸項毎丈率積灰各功料得𠔏數草曰置城上廣三丈併下廣七丈五尺得一十丈五尺乘高三丈得三千一百五十尺進位得三萬一千五百尺半之得一萬五千七百五十尺爲毎丈城積率次置羊馬牆闊五尺併下闊一丈得一十五尺乘高一丈得一百五十尺進位得一千五百尺以半之得七百五十尺
