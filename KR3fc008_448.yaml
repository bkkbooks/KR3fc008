body:
  text: 草曰置各郡銀絹乘各價甲郡銀三千二百兩乙郡銀二千七百兩丙郡銀四千兩丁郡銀二千六百兩於右行甲郡銀兩價二貫二百足乙郡銀兩價二貫三百足丙郡銀兩價九貫三百新會丁郡銀兩價五十一貫舊會於左行對乘之甲得七千四十貫足乙得六千二百一十貫足丙得三萬七千二百貫新會丁得十三萬二千六百貫舊會又列置各郡絹甲六萬四千匹乙四萬九千二百匹丙七萬三千六百匹丁三萬二千三十五匹於右行各郡絹匹價甲二貫足乙二貫四百二十足丙新會十貫三百丁五十八貫舊會於左行亦對乘之甲得一十二萬八千貫足乙得一十一萬九千六十四貫足丙得七十五萬八千八十貫新會丁得一百八十五萬八千三十貫舊會乃併各郡銀絹價甲𠔏一十三萬五千四十貫足乙𠔏十二萬五千二百七十四貫足丙𠔏七十九萬五千二百八十貫新丁𠔏一百九十九萬六百三十貫舊甲以舊會價五十四文展足錢得二百五十萬七百四十貫七百四十文乙以舊會價五十九文展足錢得二百一十二萬三千二百八十八貫一百三十六文丙巳係新會丁係舊會今甲乙丁俱以五除
