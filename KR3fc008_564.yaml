body:
  text: 百步不盡約為一十八分步之五為定一返步乃復通分內子得三千六百五為到法乃置程里六十以三百六十通之得二萬一千六百步乘擔土一尺三寸得二萬八千八十尺以到母一十八乘之得五十萬五千四百四十尺為到實實如法除得一百四十尺不盡七百四十與法求等得五約之為七百二十一分尺之一百四十八為到土復通分內子得一十萬一千八十八又以壤母三因得三十萬三千二百六十四尺為壤法次以到土母七百二十一乘壤積七百七十萬尺得五十五億五千一百七十萬尺為壤實實如法而一得一萬八千三百六功不盡一十四萬九千二百一十六與法求等得三十二俱約之為一萬八千三百六功九千四百七十七分功之四千六百六十三為擔土功次列前土功圖築功一萬七千一百一十一功九分功之一及穿功一萬二百六十六功三分功之二具圖如后
