body:
  text: 七十八次得一百八十下得三百二十四母得三百二十四今以平分術入之併四子得一千四百二十二為總子以列位四乘乘母三百二十四得一千二百九十六為總母乃以總母子求等得一十八俱約之總子得七十九為定子總母得七十二為定母以定子七十九乘棚道四十步得三千一百六十於次以棚道四十步減往來一百六十步餘一百二十為平道以乘定母七十二得八千六百四十加次𠔏得一萬一千八百又以踟蹰十加一於身下加一得一萬二千九百八十仍於次又以載輸二十步乘定母七十二得一千四百四十併次得一萬四千四百二十為統數以定母七十二除統數得二
