body:
  text: 去宋九韶蓋此四州人周密本舊時地名稱之耳但爲義兵首不知在何年其年運遂無可考冶本傳冶登金進士第中州集李治中遹子冶字仁𨜮正大七年收世科辟知鈞州事歲壬辰城潰冶北渡流落忻崞間聚書環堵世祖在潛邸聞其賢召之太宗紀四年攻鈞州克之世祖紀歲甲辰帝在潛邸思有爲于天下延藩府舊臣及四方文學之士問以治道辛亥憲宗卽位盡屬以漠南漢地軍國庶事遂南駐瓜忽都之地是冶以元太宗四年北渡其召見潛邸則在憲宗辛亥以前測圓海鏡自敘標戊申秋九月去甲辰止五年則此書蓋創始于流落忻崞時也自敘云老大以來得洞淵九容之說日夕玩繹而嚮之病我者使爆然落去而無遺餘山中多暇客有從余求其說者於是又爲衍之累一百七十問本傳云冶晚家元氏買田封龍山下學徒益眾按言山中多暇則是買田聚徒之日蓋甲辰召對後卽歸元氏山下言客有求其說者卽學徒益眾之一乃敘稱病我者使爆然落去稱又爲衍之可見先已有成槀至元氏山中復理之耳所云老大以來蓋指忻崞聚書時事壬辰已五十五故稱老大九韶數學九章敘標淳祐七年是年歲次丁未比戊申止前一年冶書之不本於秦明矣郭守敬授時術用天元一算句股弧矢容圓郭卒於仁宗三年年八十六上溯欒城敘書之年相距七十載邢臺時才十六歲方冶學洞淵九容之説蓋猶未生邢臺之學實欒城啟之乃始祖至元十三年召修授時術而冶已前卒故一代製作遂首推邢臺無復知有欒城矣學者稱秦在李前或敘郭于李上均非實也王德淵海鏡後敘云敬齋先生病且革語其子克修曰吾生平著述死後可盡燔去獨測圓海鏡一書雖九九小數吾嘗精思致力于此
