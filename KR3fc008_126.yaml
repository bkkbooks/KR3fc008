body:
  text: 朔定骨二萬九千六百六十九閏泛骨一十六萬三千七百七十一閏縮一十八萬八千五百七十八紀率一百一萬四千氣元率一萬九千五百元閏三十七萬七千八百七十三元數四百二氣等率五十二因率一百四十四蔀率三百二十五朔等數一因數四十五萬七千九百九十九蔀數四十九萬九千六十七朔積年七百八十三萬九千積年七百八十四萬八千一百八十三術曰以厯法求之大衍入之調日法如何承天術用強弱母子互乘得數併之為朔餘以二十九日通日法增入朔餘為朔率又以日法乘前厯所測冬至氣刻分收棄末位為偶數得斗分與日法用大衍術入之求等數因率蔀率以紀乘等數為約率置所求氣定骨如約率而一得數以乘因率滿蔀率去之不滿以紀法乘之為入元歲次置歲日以日法通之併以斗定分為歲率以十二月乘朔率滅歲率餘為歲閏以歲閏乘入元歲滿朔率去之不滿為入閏與閏骨相減之得差或適足便以入元歲為積年後術並不用或差在刻分法半數以下者亦以入元歲為積年必在刻分法半數以上卻以閏泛骨併朔率得數內減入閏餘與朔率求閏縮在朔率以下便為閏縮以上用朔率減之亦得以紀法乘日法為紀率以
