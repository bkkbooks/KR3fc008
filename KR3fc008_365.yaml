body:
  text: 石八斗四升四合二勺爲實以法除之得一百六十一石五斗七升二合三勺爲一分之率以未併下率一百乘率得一萬六千一百五十七石二斗三升爲丁戊己三鄉各科數以於身下加一得一萬七千七百七十二石九斗五升三合爲乙丙二鄉各科數又於身下加一得一萬九千五百五十石二斗四升八合三勺爲甲合科數求和買亦用六百四十一爲法置元科和買一萬三千四百九十八疋以疋法四丈通之得五萬三千九百九十二丈內零一丈七尺三寸七分五釐得五萬三千九百九十三丈七尺三寸七分五釐爲實以法除之得八十四丈二尺三寸三分六釐爲一分之率亦以未併下率一百乘之得八千四百二十三丈三尺六寸爲丁戊己三鄉各科數次於身下加一得九千二百六十五丈六尺九寸六分爲乙丙二鄉各科數又於身下加一得一萬一百九十二丈二尺六寸五分六釐爲甲鄉合科數求夏稅亦置六百四十一爲法置元科夏稅九千八百七十六疋以疋法四丈通之得三萬九千五百四丈內零三丈二尺六寸五分六釐得三萬九千五百七丈二尺六寸五分六釐爲實以法除之得六十一丈六尺三寸三分八釐爲一分率亦以未併下率一百乘之得六千一百六十三丈三尺八寸爲丁戊己三鄉各科數次於身下加一得六千七百七十九丈七尺
