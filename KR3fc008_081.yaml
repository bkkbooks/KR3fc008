body:
  text: 米二百四十六石各以官斛八斗三升安吉斛一石一斗平江斛一石三斗五升約之甲得二百九十六石餘三斗二升乙得二百二十三石餘七斗丙得一百八十二石餘三斗各為糶過及餘米合問程行計地問軍師獲捷當早點差急足三名往都下節節走報其甲於前數日申末到乙後數日未正到丙於今日辰末到據供甲日行三百里乙日行二百四十里丙日行一百八十里問自軍前至都里數及三人各行日數幾何答曰軍前至都三千三百里甲行一十一日乙行一十三日四時丙行一十八日二時術曰以大衍求之置各行里先求總等存一約衆得元里次以連環求等約奇復乘偶得定母以定相乘為衍母滿定除衍得衍數滿定去衍數得奇奇定大衍得乘率以乘衍數得用數次置辰刻正末乘各行里為實以晝六時約之得餘里各乘用數併為總滿衍母去得所求至都里以各日行約之得日辰刻數草曰置甲三百里乙二百四十里丙一百八十里先求總等得六十只存甲三百勿約乃約乙二百四十得四次約丙一百八十得三各為元數連環求等
