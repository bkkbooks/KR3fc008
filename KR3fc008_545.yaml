body:
  text: 日役工八千一百六十四五分工之四術曰以商功求之併河上下廣於上併河上下流深乘之又以長乘為實以四為法除得河積以堅率乘河積為實以墟率為法除得堤積併堤上下廣乘堤長半之為法除堤積得堤高併河堤二積以棚道母半之副置以棚道減功子乘之以棚道減功母除之得數以併其副共為寄以子減母餘乘常尺為增子以母乘常尺為增分併增分增子乘寄半為用工實以增分乘增子又乘限月日為法除實得用人工數草曰置河上廣六丈併底廣四丈通之折半得五十尺於上又置河上流深八尺併下流深一丈六尺併之折半得一十二尺以乘上位得六百尺為次置長四十八里以尺里法二千一百六十通之得一十萬三千六百八十尺得堤河長以乘次得六千二百二十萬八千尺為河積以堅率三因河積得一億八千六百六十二萬四千尺為實以穿率四為法除之得四千六百六十五萬六千尺為堤積置上廣一丈八尺下廣二丈四尺併之為四十二尺以乘堤長一十萬三千六百八十尺得四百三十五萬四千五百六十尺以半之得二百一十七萬七千二百八十尺為法除堤積得二十一尺為堤高不盡九十三萬三千一百二十與法求等得三十一萬一千四十俱約之為七分尺之三次置河積六千二百
