body:
  text: 錐行置之右列位稍多甎名相互今假八音為號位先以最少者自木二十與革二十五求等得五乃反約木二十為四木四與土五十求等得二以約五十為二十五木四與𠣻六十求等得四約六十為一十五木四與百求等得四約一百為二十五木四與絲一百一十求等得二約一百一十為五十五木四與石一百二十求等得四反約木四為一以木一與金一百三十求等得一不約為木與諸數求等約訖為一變得數具圖如后次以革二十五與土五十求等得二十五約五十為二以革二十五與𠣻一十五求等得五約𠣻一十五為三以革二十五與竹二十五求等得二十五約竹二十五為一又以革二十五與絲五十五求等得五約絲五十五得一十一以革二十五與石一百二十求等得五約一百二十為二十四以革二十五與金一百三十求等得五約金一百三十得二十六革與諸數遍約訖為二變具圖如后
  hash: sha256:823d632f210c54898b5c10b3ec305973be1e5aa838e6ad2c339a3685282b6264
