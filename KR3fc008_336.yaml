body:
  text: 答曰一十二里半術曰以勾股求之重差入之置人目高以表高減之餘為法置退表乘表高為實實如法而一草曰置人目高四尺八寸減表高四尺餘八寸為法置退表九百步以步法五十寸通之得四萬五千寸乘表高四十寸得一百八十萬寸為實如法八寸而一得二十二萬五千寸以步法五十寸約之得四千五百步為相去步以里法三百六十步約之得一十二里半為敵去表所合問古池推元問有方中圓古池堙圯止餘一角從外方隅斜至內圓邊七尺六寸欲就古跡修之欲求圓方方斜各幾何答曰池圓徑三丈六尺六寸四百工十九分寸之四百一十二方面三丈六尺六寸四百二十九分寸之四百一十二方斜五丈一尺八寸四百二十九分寸之四百一十二術曰以少廣求之投胎術入之斜自乘倍之為實倍斜為益方以半為從隅開投胎平方得徑又為方面以隅併之𠔏為方斜草曰以斜七十六寸自乘得五千七百七十六倍之得一萬一千五百五十二寸為實倍斜七十六寸得一百五十二為益方以半寸為從隅開平方置實一萬一千五百五十二於上益方一百五十二於中從隅五分於下
