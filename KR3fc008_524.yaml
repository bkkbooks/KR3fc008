body:
  text: 為羊馬牆每丈積率併城牆二率得一萬六千五百尺為𠔏率以為實以钁鍬擔土杵手各六十尺為法除實得二百七十五功以四色因之得一千一百功為钁鍬擔土杵手功置永定柱二十條乘每條栽埋功七分得一十四功又乘串鑿功三分得六功計二十功為永定柱功置爬頭拽後木八十條乘作功三分得二十四功又乘串鑿功二分得一十六功計四十功為爬頭拽後木功置摶子木二百條乘作功二分得四十功又乘般加功二分得四十功計八十功為摶子木功置絍橛二千箇乘作功七毫得一十四功絍索二千條乘作功九毫得一十八功計三十二功為橛索𠔏功乃以城牆女頭甎積求甎匠功置城身方一丈自乘得一百尺於上次置下九幅中七幅上五幅併之得二十一幅乘上得二千一百尺甎長有寸以寸通之為二十一萬寸為實以甎長一十二寸乘厚二寸五分得三十寸為側法除實得七千片為城身甎數又置鵲臺高五寸乘闊五尺四寸得二百七十寸又乘長一丈得二萬七千寸寄上又置座子高二尺二寸五分乘闊三尺六寸得八百一十寸又乘長一丈得八萬一千寸加寄又置肩子高一尺二寸五分乘闊三尺六寸得四百五十寸又乘長八尺四寸得三萬七千八百寸又加寄又置帽子高一尺五寸乘闊二尺六寸又乘長六尺六寸得三萬五千六
