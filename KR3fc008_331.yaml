body:
  text: 為股羃併二羃為弦羃置里通步自之乘勾羃為率自乘為泛實半弦羃乘率為泛從上廉以勾羃減股羃餘四約之自乘為泛益隅三泛可約約之為定開連枝三乘玲瓏方得營徑以密率二十二乘七除為周草曰置表間二步自乘得四為勾羃以退表一十二步自乘得一百四十四為股羃以勾股二羃併之得一百四十八為弦羃置七里以里法三百六十步通之得二千五百二十步自乘得六百三十五萬四百乘勾羃四得二千五百四十萬一千六百為率以率自乘得六百四十五萬二千四百一十二億八千二百五十六萬為泛實乃半弦羃得七十四乘率二千五百四十萬一千六百得一十八億七千九百七十一萬八千四百為泛從上廉以勾羃四減股羃一百四十四餘一百四十以四約之得三十五以自乘得一千二百二十五為泛益隅置三泛求等得一千二百二十五俱以約之得五千二百六十七億二千七百五十七萬七千六百為定實一百五十三億四千四百六十四為從上廉一為定益隅開玲瓏三乘方乃以廉隅超二度約商置七百上廉約一百五十三億益隅為一億乃以上商生隅得七億為益下廉又以上商生益廉減從廉餘一百四億四千四百六十四萬又以上商生從廉得七百三十一億一千二百四十八萬為從方乃命上商除實實餘一百四十
