body:
  text: 先以小暑節乘率二十五乘節率九千三百四十分得二十三寸三千五百分於上次以臨安夏至九寸一分自乘得八十二寸八千一百分為夏至羃乃以夏至羃加上得一百六寸一千六百分為小暑羃以為實以一寸為隅開平方得一尺三分為臨安小暑節景不盡七百分即寸下七毫棄之又以大暑乘率一百九乘節率九千三百四十分得一百一寸八千六十分於上位
