body:
  text: 間各深三丈共闊五丈二尺書院六間各深一丈五尺各闊一丈二尺後閣四間各深一丈三尺內二間闊一丈次二間闊一丈五尺亭子地面一十所各方一丈四尺欲知見有今用外餘甎各幾何答曰見有一十八萬七千五百片今用一萬六千四百六片四分片之一外餘一十七萬一千九十三片四分片之三術曰以少廣求之置各地面深闊相乘以間數若所數乘之共為實甎長闊數相乘為甎平法除得今用甎數次以甎垜高長闊相乘為實卻以甎法乘厚得數為甎積法除之得每垜甎數次以垜數乘之得見有甎以減今用甎得餘甎草曰置堂闊五丈二尺乘深二丈得一十五萬六千寸於上又置書院深一丈五尺乘闊一丈二尺得一萬八千寸又以六間乘之得一十萬八千寸加上共得二十六萬四千寸併上又置後閣闊一丈併闊一丈五尺得二丈五尺又以各二間乘之得五百寸以乘各深一丈三尺得六萬五千寸加上得三十二萬九千寸併上次置亭基一丈四尺自乘得一萬九千六百寸以一十所乘之得一十九萬六千寸又併上共得五十二萬五千寸為實以甎長八寸乘闊四寸得三十二寸為甎平法除之得一萬六千四百六片四分片之一為共用甎次置
