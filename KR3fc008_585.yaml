body:
  text: 間各㴱三丈𠔏闊五丈二尺書院六間各㴱一丈五尺各闊一丈二尺後閤四間各㴱一丈三尺內二間闊一丈次二間闊一丈五尺亭子地面一十所各方一丈四尺欲知見有今用外餘甎各幾何荅曰見有一十八萬七千五百片今用一萬六千四百六片四分片之一外餘一十七萬一千九十三片四分片之三術曰以少廣求之置各地面㴱闊相乘以間數若所數乘之𠔏爲實甎長闊數相乘爲甎平法除得今用甎數次以甎垜高長闊相乘爲實卻以甎法乘厚得數爲甎積法除之得毎垜甎數次以垜數乘之得見有甎以減今用甎得餘甎草曰置堂闊五丈二尺乘㴱二丈得一十五萬六千寸於上又置書院㴱一丈五尺乘闊一丈二尺得一萬八千寸又以六間乘之得一十萬八千寸加上𠔏得二十六萬四千寸併上又置後閤闊一丈併闊一丈五尺得二丈五尺又以各二間乘之得五百寸以乘各㴱一丈三尺得六萬五千寸加上得三十二萬九千寸併上次置亭基一丈四尺自乘得一萬九千六百寸以一十所乘之得一十九萬六千寸又併上𠔏得五十二萬五千寸爲實以甎長八寸乘闊四寸得三十二寸爲甎平法除之得一萬六千四百六片四分片之一爲𠔏用甎次置
