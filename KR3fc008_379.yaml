body:
  text: 夏稅九寸七分六絲中田苗米二斗一升七合九勺六抄八撮和買一尺一寸三分六釐三毫五絲二忽夏稅八寸三分一釐四毫八絲下田苗米一斗八升一合六勺四抄和買九寸四分六釐九毫六絲夏稅六寸九分二釐九毫下等上田苗米一斗四升五合三勺一抄二撮和買七寸五分七釐五毫六絲八忽夏稅五寸六分四釐三毫二絲中田苗米一斗八合九勺八抄四撮和買五寸五分八釐一毫七絲六忽夏稅四寸一分五釐七毫四絲下田苗米七升二合六勺五抄六撮和買三寸七分八釐七毫八絲四忽夏稅二寸七分七釐一毫六絲丙鄉上等上田苗米三斗三合四勺八抄和買一尺五寸八分二釐一毫夏稅一尺一寸五分七釐五毫中田苗米二斗七升三合一勺三抄二撮和買一尺四寸二分三釐八毫九絲夏稅一尺四分一釐七毫五絲
