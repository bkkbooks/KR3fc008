body:
  text: 一百六十一寸二分九釐加上又以底徑自乘得一百四十四寸又加上𠔏得四百五十七寸六分九釐以三因之得一千三百七十三寸七釐爲法除前圓寄一萬六千六百六十八寸八分得一尺二寸一分四釐爲圓斛正㴱其實不及二毫六絲九忽八微收爲閏又以基一尺四寸七分增三分得一尺五寸併底徑一尺得二尺五寸減一寸爲差餘二尺四寸以半之得一尺二寸爲底徑以差一寸併底徑一尺二寸得一尺三寸爲口徑始以口徑一十三寸乘底徑一尺二寸得一百五十六寸於上又以口徑一十三寸自乘得一百六十九寸加上又以底徑一十二寸自乘得一百四十四寸又加上𠔏得四百六十九寸以三因之得一千四百七寸爲法除前圓寄一萬六千六百六十八寸八分得一尺一寸八分四釐七毫爲圓斛㴱寄餘七釐一毫卻收㴱七毫作一釐通得一尺一寸八分五釐爲圓斛㴱此是求出兩等圓斛在人擇而用之求囤米置大囤上徑一丈通爲百寸乘下徑九十寸得九千寸於上又以上徑自乘得一萬寸加上又以下徑九十寸自乘得八千一百寸加上𠔏得二萬七千一百寸乘高一百二十寸得三百二十五萬二千寸又乘大囤一十二個得三千九百二萬四千寸爲寄次置小囤上徑九十寸下徑八十寸相乘得七千二百寸於次又上
