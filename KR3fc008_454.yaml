body:
  text: 十五乙得一萬一千五百一十六貫四百二十八文五十九分文之二十八丙得三萬九千五百九貫三百三十三文三分文之一丁得一萬六千一百七十三貫五百文並新會係四郡元傭價錢次以元四郡率對乘四郡合解新會各為實率其甲六貫足乘甲合解錢五十萬一百四十八貫一百四十八文得三十億八十八萬八千八百八十八貫其乙率四貫一百一十六足乘乙合解錢四十二萬四千六百五十七貫六百二十七文得一十七億四千七百八十九萬七百九十二貫七百三十二文足其丙率一百六十貫舊乘丙合解錢七十九萬五千二百八十貫得一千二百七十二億四千四百八十萬貫舊其丁率一百五十貫舊乘丁合解錢三十九萬八千一百二十六貫得五百九十七億一千八百九十萬貫舊各為實乃以每擔率五千貫為法而一甲得六百貫一百七十七文足不盡三千八百八十八貫文乙得三百四十九貫五百七十八文足不盡七百九十二貫七百三十二文丙得二萬五千四百四十八貫九百六十文舊會丁得一萬一千九百四十三貫七百八十文舊為各郡實用甲以二百七十文約乙以二百九十五文約丁丙皆五約為新會甲二千二百二十二貫八百七十七文不盡二百一十文乙一千一百八十五貫一十文不盡五十文丙五千八十九貫七百九十二文丁二千三百八十八貫七百五十六文各減元
