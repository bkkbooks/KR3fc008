body:
  text: 草曰列一十分三位於左行又列一十分三位於右行其右上減去初減三分右中減去次減二分右下減去更減二分右行餘七八八以相乘得四百四十八爲法乃以左行三位一十分相乘得一千爲乘率以乘見日納錢一百五十六文八分得一百五十六貫八百文爲實實如法而一得三百五十文爲本戶元額房錢數書九章卷第十八
