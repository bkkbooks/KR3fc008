body:
  text: 上廉又與商相生得七百二十九為從方乃以從方七百二十九命上商九除實七千三百二十五訖實餘七百六十四既而復以商生隅入下廉下廉得一十八又與商九相生入上廉上廉得二百四十三又以商相生入方得二千九百一十六又以商九生隅一入下廉一十八內得二十七
