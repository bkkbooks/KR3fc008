body:
  text: 萬四千併泛得一千四百四萬爲隅開平方得二百三寸不盡七百三十七萬六千四百收爲所得一寸乃得二百四寸爲堡以㴱子一乘之以㴱母三除之得六尺八寸爲大小港等㴱次以㴱母三因堡二百四寸得六百一十二寸爲實如㴱子一而一得六丈一尺二寸爲中以不及一尺半之得五寸加中得六丈一尺七寸爲大港面闊如母六而一得一丈二寸六分寸之五爲小港面以不及一尺各減大小港面得六丈七寸爲大港底得九尺二寸六分寸之五爲小港底次以埂下廣一丈二尺乘段一千七十二萬八千寸得一十二億八千七百三十六萬爲址以大港面六丈一尺七寸乘隅一千四百四萬得八十六億六千二百六十八萬爲實以闊母六除之得一十四億四千三百七十八萬爲港平以併址一十二億八千七百三十六萬得二十七億三千一百一十四萬減寄一千一百四十六億九千六百萬餘一千一百一十九億六千四百八十六萬爲田積寸以步法五十寸自乘得二千五百除積寸得四千四百七十八萬五千九百四十四步爲田積步以畝法二百四十步約之得一千八百六十六頃八畝不盡二十四步爲田積以址一十二億八千七百三十六萬減寄一千一百四十六億九千六百萬餘一千一百三十四億八百六十四萬乘令容水八寸得九千七十二億六
