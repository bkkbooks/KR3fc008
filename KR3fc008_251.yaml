body:
  text: 得五百二十三萬四千九百四十四為定實以一為定隅開平方得二千二百八十八為實以約隅一百二十一除之得一十八步不盡一百一十與法一百二十一俱以一十一約之得一十一分步之十為元小斜減殘小斜一十三步餘五步一十一分步之十為水小斜置水小斜通步內子得六十五以水直五步乘之得三百二十五為水實倍水小母一十一得二十二為法除之得一十四步不盡一十七以法命之得一十四步二十二分步之一十七為水積置中斜一十六併水直五得二十一乘徑一十二得二百五十二以半之得一百二十六為殘積以併水積𠔏得一百四十步二十二分步之一十七為元積環田三積問環田大小圓田𠔏三段環田外周三十步虛徑八步大圓田徑一十步小圓田周三十步欲知三田積及環內周通實徑大圓周小圓徑各幾何答曰環田積二十步二百三十六萬二千二百五十六分步之一百二十九萬八千二十
