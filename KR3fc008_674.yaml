body:
  text: 貫沈得三百一十八玳得二百五斤中行求得一十約之中積得五十四萬三千九百貫沈得七百二十四玳得一千八百一十五今又欲去中左行之玳瑁乃以中行一千八百一十五互乘右行右積得二億四千一十二萬四千五百貫右沈得五十七萬七千一百七十右玳得三十七萬二千七十五次以干圖右玳二百五互乘中行中積得一億一千一百四十九萬九千五百貫中沈得一十四萬八千四百二十中玳得三十七萬二千七十五今驗宮圖右積多中積少乃以中行直減右行畢仍置干圖中行數今驗干圖右行段數只有沈香四十二萬八千七百五
