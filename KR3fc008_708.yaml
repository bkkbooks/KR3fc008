body:
  text: 草曰先以度牒三道乘鹽二裁得六以乘布一十五得九十又乘絹六疋得五百四十乃乘銀九萬一千七百二十八錢得四千九百五十三萬三千一百二十錢爲實次以鹽一十三袋乘布八十四得一千九十二以乘絹三疋五分得三千八百二十二乃乘銀七十二錢得二十七萬五千一百八十四錢爲法除實得一百八十道爲元關度牒菽粟互易問菽三升易小麥二升小麥一斗五合易油麻八合油麻一升二合易粳米一升八合今將菽十四石四斗欲易油麻又將小麥二十一石六斗欲易粳米幾何荅曰油麻五石一斗二升粳米一十七石二斗八升
