body:
  text: 砌七百片石灰每甎一斤蘆席一百五十領靑茅五百束絲竿筀竹五十條芮子水竹一十把每把二尺圍鑊手鍬手擔土杵手每功各六十尺火頭一名管六十工部押濠寨一名管一百二十工每工日支新會一百文米二升五合知城牆堅積濠積濠深𠔏用木竹橛索甎石灰蘆茅人工錢米𠔏數各幾何答曰城積二千三百七十八萬二千五百尺堅積牆積一百一十三萬二千五百尺堅積濠積三千三百二十二萬尺穿積濠深八丈永定柱三萬二百條每條長三丈五尺徑一尺爬頭拽後木一十二萬八百條每條長二丈徑七寸摶子木三十萬二千條每條長一丈徑三寸絍橛子三百二萬箇每箇長一尺方一寸絍索三百二萬條每條長一丈徑五分蘆席二十二萬六千五百領靑茅七十五萬五千束每束六尺圍筀竹七萬五千五百竿每竿六寸圍水竹一萬五千一百把每把二寸圍石版一萬五千一百片城甎一千二百八十三萬三千四百九十片石灰一千二百九十八萬四千四百九十斤
