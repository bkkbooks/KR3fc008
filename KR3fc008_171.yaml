body:
  text: 魯郡秦九韶揆日究微問厯代測景惟唐大衍厯最密本朝崇天厯陽城冬至景一丈二尺七寸一分五十秒夏至景一尺四寸七分七十九秒係與大衍厯同今開禧厯臨安府冬至景一丈八寸二分二十五秒夏至景九寸一分欲求臨安府夏至後差幾日而景與陽城夏至日等較以大衍厯晷景所差尺寸各幾何荅曰大暑後五日午中景長一尺四寸八分八十五秒
