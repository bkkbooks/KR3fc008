body:
  text: 萬三千三百二十四不盡一十三萬一千六百二十三為丙縣功諸縣不盡皆輩為一功甲合科一萬七千一百三十二功乙合科一萬五千二百二十九功丙合科一萬三千三百二十五功求甎者倍轉道並闊六尺得一丈二尺遍加臺上下廣袤變各為上下闊長以甎厚六寸加臺高為臺直先列甎長一尺二寸闊六寸厚二寸五分相乘之得一百八十寸為甎積法次列石版長五尺闊二尺厚五寸相乘得五千寸為石積法具圖如后
