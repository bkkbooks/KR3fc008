body:
  text: 草曰置估直四十二萬四千貫以四人約之得一十萬六千貫為各積以人數列四位次置甲金二百兩於右上以四袋乘鈔一十道得四十袋於右副為右行次置乙鈔八十八道以三袋乘之得鹽二百六十四袋及銀八百兩為副行次置丙銀一千六百七十兩度牒一十五道為次行次置丁度牒五十二道金五十八兩八銖為左行驗得首圖左行上段金帶八銖是三分兩之一乃以分母通乘左行諸數只以分子一內入左上金內其左積得三十一萬八千貫左金得一百七十五兩左度牒得一百五十六道為次圖驗次圖四行皆可求等右行求得四十約之副行求得八約之次行求得五約之左行求得一約之各得數為定率圖
