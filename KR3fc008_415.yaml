body:
  text: 乃以得次數併入中戶四百六十四內𠔏得二千六百二十七戶六分次以五分折中數二千六百二十七戶六分得數次以得數一千三百一十三戶八分併副戶八十七得一千四百戶八分又以五折副數一千四百戶八分得七百戶四分旣得數乃以副數七百戶四分併上戶一十二戶得七百一十二戶四分不折便以爲法
