body:
  text: 總所三千六百六十四貫八百文運司九十一貫六百二十文術曰以衰分求之置諸元率可約約之副併為法以催到錢乘未併者各為實實如法而一草曰列戶部九十六萬五千四百二十一貫總所六十四萬三千六百一十四貫運司一萬六千九十貫三百五十文各為元率今元率可約求等得一萬六千九十貫三百五十為等數俱約之戶部得六十總所得四十運司得一各為率副併得一百一為法次置催到九千二百五十三貫六百二十文乘未併數六十四十及一畢得五十五萬五千二百一十七貫二百文為戶部之實三十七萬一百四十四貫八百以運司率乘得九千二百五十三貫六百二十文為運司之實三實皆如法一百一而一其戶部得五千四百九十七貫二百文總所得三千六百六十四貫八百文運司得九十一貫六百二十各為候解錢纍收庫本問有庫本錢五十萬貫月息六釐半令今掌事每月帶本納息共還一十萬欲知幾何月而納足並末後畸錢多少答曰本息納足共七個月末後一月錢二萬四千七百六貫二百七十九文三分四釐八毫四絲六忽七微七沙三莽一輕二淸五
  hash: sha256:a22af6f5aeca72b561292f00e1589f9ac8e8520ab5967626a1f9bfd4f487dcee
