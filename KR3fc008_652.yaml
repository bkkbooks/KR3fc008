body:
  text: 不盡三萬八千四百日與法四萬一千四百求等得六百俱以約之得六十九分日之六十四為造箭日分合問計造軍衣問庫有布綿絮三色計料欲製軍衣其布六人八匹少一百六十匹七人九匹剩五百六十匹其綿八人一百五十兩剩一萬六千五百兩九人一百七十兩剩一萬四千四百兩其絮四人一十三斤少六千八百四斤五人一十四斤適足欲知軍士及布綿絮各幾何答曰兵士一萬五千一百二十人布二萬匹綿三十萬兩絮四萬二千三百三十六斤術曰以盈朏求之置人數於左右之中置所給物各於其
