body:
  text: 魯郡秦九韶計定城築問淮郡築一城圍長一千五百一十丈外築羊馬牆開濠長與城同城身高三丈面闊三丈下闊七丈五尺羊馬牆高一丈面闊五尺下闊一丈開濠面闊三十丈下闊二十五丈女頭鵲臺𠔏高五尺五寸𠔏闊三尺六寸𠔏長一丈鵲臺長一丈高五寸闊五尺四寸座子長一丈高二尺二寸五分闊三尺六寸肩子高一尺二寸五分闊三尺六寸長八尺四寸帽子高一尺五寸闊三尺六寸長六尺六寸箭窗三眼各闊六寸長七寸五分外眼比內眼斜低三寸取土用穿四堅三為率周回石版鋪城腳三層每片長五尺闊二尺厚五寸通身用甎包砌下一丈九幅中一丈七幅上一丈五幅甎每片長一尺二寸闊六寸厚二寸五分護嶮牆高三尺闊一尺二寸下腳高一尺五寸鋪甎三幅上一尺五寸鋪甎二幅每長一丈用木物料永定柱二十條長三丈五尺徑一尺每條栽埋功七分串鑿功三分爬頭拽後木𠔏八十條長二丈徑七寸每條作功三分串鑿功二分摶子木二百條長一丈徑三寸每條作功二分般加功二分絍橛二千箇每箇長一尺方一寸每箇功七毫絍索二千條長一丈徑五分每條功九毫石版一十片匠一功般一功每片灰一十斤般灰千斤用一功甎匠每功
