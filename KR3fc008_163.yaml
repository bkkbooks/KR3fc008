body:
  text: 差求晨疾初段常度置合伏日一十六日九十分乃收九十分作一日通爲一十七日併舊厯所注晨疾初段常日三十得四十七爲𠔏日乘合伏初行率二十三分九十七秒得一十一度二十六分五十九秒爲寄上乃副置𠔏日四十七減一餘四十六以半之得二十三以乘副四十七得一千八十一以乘日差一十一秒二十三小分六十六小秒得一度二十一分四十六秒七十六小分四十六小秒以減上寄一十一度二十六分五十九秒餘一十度五分一十二秒二十三小分五十四小秒爲合伏晨疾初兩段𠔏積度
