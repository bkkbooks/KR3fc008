body:
  text: 求等得六只約甲五十四得九不約丁次以丙與乙求等又以丙與甲九求等皆得一不約後以乙與甲九求等得一不約復騐甲九與丁二十四猶可再約又求等得三以約丁二十四得八復甲爲二十七次以定母四位相乘求得一十萬二千六百爲衍母各以定母約衍母甲得三千八百乙得五千四百丙得四千一百四丁得一萬二千八百二十五爲衍數滿定母各去衍數甲不滿二十乙不滿四丙不滿四丁不滿一各爲奇數
