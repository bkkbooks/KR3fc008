body:
  text: 故也數理精微不易窺識窮年致志感於夢寐幸而得之謹不敢隱草曰本厯以何承天術調得一萬六千九百為日法係三百三十九强一十七弱先以强數三百三十九乘强子二十六得八千八百一十四於上次以弱數一十七乘弱子九得一百五十三併上𠔏得八千九百六十七為朔餘次以日法通朔策二十九日得四十九萬一百增入朔餘得四十九萬九千六十七為朔率又以日法乘統天厯所測每歲冬至周日下二十四刻三十一分得四千一百八分三十九秒為斗泛分驗八分既偶遂弃三十九秒只以四千一百八分為斗定分與日法以大衍術入之求得五十二為等數一百四十四為因率三百二十五為蔀率以甲子六十為紀法乘等數得三千一百二十為約率卻置本厯上課所用嘉泰甲子歲氣骨一十一日四十四刻六十一分五十四秒以乘日法得一十九萬三千四百四十分二十六秒為氣泛骨欲滿約率三千一百二十而一故就近乃弃微秒只以一十九萬三千四百四十為氣定骨然後以約率三千一百二十除之得六十二以因率一百四十四乘之得八千九百二十八滿蔀率三百二十五去之不滿一百五十三以紀法六十乘之得九千一百八十年為入元歲次置歲日三百六十五以日法通之得六百一十六萬
