body:
  text: 魯郡秦九韶推氣治厯問太史測驗天道慶元四年戊午歲冬至三十九日九十二刻四十五分紹定三年庚寅歲冬至三十二日九十四刻一十二分欲求中間嘉泰甲子歲氣骨歲餘斗分各得幾何答曰氣骨十一日三十八刻二十分八十一秒八十小分歲餘五日二十四刻二十九分三十秒三十小分斗分空日二十四刻二十九分三十秒三十小分術曰先距前後年數為法置前測日刻分減後測日刻分餘為率不足減則加紀策以紀策纍加之令及天道合用五日以上數為實以法除實得歲餘去全日餘為斗分以所求中間年上距前測年數乘歲餘益入前測日刻分滿紀策去之餘為所求年氣骨草曰置前測戊午歲距後測庚寅歲得三十三為法置前測戊午歲冬至三十九日日辰癸丣九十二刻四十五分減後測紹定三年庚寅歲冬至三十二日日辰丙申九十四刻一十二分今後測者少不及前測者以減乃加紀法六十日於後測日內得九十二日九十四刻一十二分然後用前測者減之餘五十三日一刻六十七分為率按術當以法三十三除率須使商數必得五日以上乃
