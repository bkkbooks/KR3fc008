body:
  text: 數乘率用數以丙丁縣不及數乘本用併爲總數以定母相乘爲衍母滿母去總數得各縣分給里步積尺數以縣數因之爲堤長各以里法步法約之爲里步草曰置甲縣力一十三萬八千六百貫乙縣力一十四萬六千三百貫丙縣力一十九萬二千五百貫丁縣力一十八萬四千八百貫以程功六十尺徧乘之皆以貫默約之甲得八百三十一萬六千尺乙得八百七十七萬八千尺丙得一千一百五十五萬尺丁得一千一百八萬八千尺各爲實次以力率七百七十貫乘堤齊闊二十尺亦以貫默約之得一萬五千四百尺爲法徧除諸各實甲得五十四丈乙得五十七丈丙得七十五丈丁得七十二丈各爲四縣眾夫毎日築長率按大衍術命曰復數列右行以復數求總等得三寸以約三位多者不約其少者甲得五十四乙得一十九丙得二十五丁得二十四仍爲元數次以兩兩連環求等各約之先以丁丙求等又以丁乙求等皆得一不約次以丁甲
