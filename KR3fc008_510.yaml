body:
  text: 煙術曰以盈朏變法求之置元本以息數退位乘歸本位每出𠔏納纍得月數以末後不及數為足月錢數草曰置本五十萬貫以六釐五毫乘入𠔏本內得五十三萬二千五百貫文內減初月一十萬貫餘四十三萬二千五百貫文以六釐五毫乘之得四十六萬六百一十二貫五百文又減次月一十萬貫餘三十六萬六百一十二貫五百文又以六釐五毫乘之得三十八萬四千五十二貫三百一十二文五分又減第三月錢一十萬貫餘二十八萬四千五十二貫三百一十二文五分又以六釐五毫乘之得三十萬二千五百一十五貫七百一十二文八分一釐二毫五絲內減第四月錢一十萬貫餘二十萬二千五百一十五貫七百一十二文八分一釐二毫五絲又以六釐五毫乘之得二十一萬五千六百七十九貫二百三十四文一分四釐五毫三絲一忽二微五塵內減第五月錢一十萬貫餘一十一萬五千六百七十九貫二百三十四文一分四釐五毫三絲一忽二微五塵又以六釐五毫乘之得一十二萬三千一百九十八貫三百八十四文三分六釐四毫七絲五忽七微八塵一沙二渺五莽減第六月錢一十萬貫餘二萬三千一百九十八貫三百八十四文三分六釐四毫七絲五忽七微八塵一沙二渺五莽又以六釐五毫
