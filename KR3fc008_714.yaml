body:
  text: 魯郡秦九韶推計互易問庫率糯穀七石出糯米三石糯米一斗易小麥一斗七升小麥五升踏麯二斤四兩麯一十一斤醞糯米一斗三升今有糯穀一千七百五十九石三斗八升欲出穀作米易麥踏麯還自醞餘穀之米須令適足各合幾何列算圖
