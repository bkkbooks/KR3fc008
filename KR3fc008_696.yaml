body:
  text: 乃以支圖右行鹽一袋遍乘副行畢其副積只得二百五十貫次以副行直減右行畢右積餘二千四百貫金五兩鹽空而成閏圖乃以閏圖右積二千四百貫為實金五兩為法除之得四百八十貫為金一兩價成定圖次以閏圖左金一百七十五兩遍乘右行直減左行訖左積得二十三萬四千貫度牒一百五十六道左金空而成定圖今驗定圖左積二十三萬四千貫為實以左下度牒一百五十六道為法除之得一千五百貫為度牒一道價
