body:
  text: 乃以支圖右行鹽一袋徧乘副行畢其副積只得二百五十貫次以副行直減右行畢右積餘二千四百貫金五兩鹽空而成閏圖乃以閏圖右積二千四百貫爲實金五兩爲法除之得四百八十貫爲金一兩價成定圖次以閏圖左金一百七十五兩徧乘右行直減左行訖左積得二十三萬四千貫度牒一百五十六道左金空而成定圖今騐定圖左積二十三萬四千貫爲實以左下度牒一百五十六道爲法除之得一千五百貫爲度牒一道價
