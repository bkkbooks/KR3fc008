body:
  text: 夏稅三寸九分二釐七毫六絲九忽下田苗米六升八合六勺四抄二撮八圭和買三寸五分七釐八毫六絲夏稅二寸六分一釐八毫四絲六忽戊鄉上等上田苗米一斗五升三合八勺二抄和買八寸一釐九毫二絲夏稅五寸八分六釐七毫七絲中田苗米一斗三升八合四勺三抄八撮和買七寸二分一釐七毫二絲八忽夏稅五寸二分八釐九絲三忽下田苗米一斗二升三合五抄六撮和買六寸四分一釐五毫三絲六忽夏稅四寸六分九釐四毫一絲六忽中等上田苗米一斗七合六勺七抄四撮和買五寸六分一釐三毫四絲四忽夏稅四寸一分七毫三絲九忽中田苗米九升二合二勺九抄二撮和買四寸八分一釐一毫五絲二忽夏稅三寸五分二釐六絲二忽下田苗米七升六合九勺一抄和買四寸九毫六絲夏稅二寸九分三釐三毫八絲五忽
