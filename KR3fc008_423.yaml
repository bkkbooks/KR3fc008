body:
  text: 甲元納絹紬折帛八匹三丈九尺七寸三分九釐併紬絹本色二十匹二丈八尺九寸三分九釐得二十九匹二丈八尺六寸七分八釐以匹法四丈通匹數內零丈得一百一十八丈八尺六寸七分八釐內減田絹積丈尺一百一十七丈三尺餘一丈五尺六寸七分八釐為甲地紬以每畝紬一尺三寸四分納之得一十一畝七分其畝下七分倍之得一百四十身下加二得一百六十八步以六十步納之得二角零四十八步通得一十一畝二角四十八步為甲元有地乃以甲所出四百七畝及五百一十六畝併得九百二十三畝減元有一千二十畝餘九十七畝為甲今有田並元地次以甲出田四百七畝併乙元有田三百七十五畝𠔏得七百八十二畝為乙今有田次以甲所出田五百一十六畝併丙元有田四百六十三畝𠔏得九百七十九畝為丙今有田各列三戶今有田地數于右行副之先以每畝苗三升五合遍乘右行甲得三石三斗九升五合乙得二十七石三斗七升丙得三十四石二斗六升五合為本戶苗米次以每畝稅一尺一寸五分遍乘左副行甲得一十一丈一尺五寸五分乙得八十九丈九尺三寸丙得一百一十二丈五尺八寸五分各為丈積各列二位皆以三分因上位七分因下位並退一位即是自下三七折之又各以四丈約丈積成匹其甲得三丈三尺四寸
