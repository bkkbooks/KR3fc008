body:
  text: 餘穀八百三十五石三斗八升醞米三百五十八石二斗術曰以粟米換易求之置諸率隨本色對列如雁翅有分者通之異類者變之以上位者進乘之以下位者退乘之得合數有對者相乘之無對者直命之為諸率併上下無對者為法率諸率可約者約之以今有物遍乘諸率不乘法率各為實諸實竝如法而一各得其已變者復互易乘除之即得所求草曰置糯穀七出米三於右行上副兩位次置糯米一斗麥一斗七升於副行副中兩位次置小麥五升踏麯二斤四兩於次行中次兩位次置麯一十一斤醞米一斗三升於左行次下兩位隨本色對列如雁翅訖乃驗次行二斤四兩是四分斤之一以母四通次行兩位以子一內次行次位其中位得二十次位得九又驗左行下位是糯米是異類於糯穀合變為糯穀乃以問中首句率穀七米三變之以七因米一斗三升得九斗一升於左下為穀卻以米三因麯一十一斤為三十三斤麯於左行得變圖數以左行三十三乘次行二十得六百六十次以得六百六十乘副行一十得六千六百次以六千六百乘右上七得四萬六千二百各於元位卻以右行副位三因副行一斗七升得五斗一升又以五斗一升乘次行九得四百五十九又以四百五十九乘左下
