body:
  text: 今驗陽城夏至景一尺四寸七分七十九秒為入臨安府大暑后四日景一尺四寸五分六十秒太强乃以四日景減五日景餘三分二十四秒太弱為景差以十二時除之得二十七秒五小分二十小秒為法乃置陽城夏至景一尺四寸七分七十九秒減臨安大暑後四日景一尺四寸五分六十秒八小分七十五小秒餘二分一十八秒一十二小分五十小秒為實復以法二十七秒五小分二十小秒除之
