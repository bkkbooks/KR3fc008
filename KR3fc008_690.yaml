body:
  text: 今視政圖從省乃擇其諸行本色可求等首金可鹽亦可蓋金多鹽少乃以政圖副次兩行鹽數三十三與一百五求等得三故以三約三十三得一十一以乘次行又以三約一百五得三十五以乘副行畢其副積得四十六萬三千七百五十貫鹽一千一百五十五袋銀三千五百兩次積二千八百九十四萬五千九百五十鹽一千一百五十五袋銀五十七萬三千一百四十四兩皆正列成卜圖
