body:
  text: 魯郡秦九韶漂田推積問三斜田被水衝去一隅而成四不等直田之狀元中斜一十六步如多長水直五步如少闊殘小斜一十三步如弦殘大斜二十步如元中斜之弦橫量徑一十二步如殘田之廣又如元中斜之句亦是水直之股欲求元積殘積水積元大斜元中斜二水斜各幾何答曰元積一百三十八步一十一分步之八水積一十二步一十一分步之八殘積一百二十六步元大斜二十九步一十一分步之一元小斜一十八步一十一分步之一十水大斜九步一十一分步之一水小斜五步一十一分步之一術曰以少廣求之連枝入之又句股入之置水直減中斜餘為法以中斜乘大殘為大斜實以法除實得元大斜以殘大斜減之餘為水大斜以法乘徑又自之為小斜隅以水直羃併徑羃為弦羃又乘徑羃又乘中斜羃為小斜實與隅可約約之開連枝平方得元小斜以殘小斜減之餘為水小斜以水直乘之為水實倍水小母為法除之得水積以水直併中斜乘徑為實以二為法除之得殘積以殘積併水積𠔏為元積有分者通之重有者重通之
