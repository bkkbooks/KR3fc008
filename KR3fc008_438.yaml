body:
  text: 均定勸分問欲勸糶賑濟據甲民物力畝步排定𠔏計一百六十二戶作九等上等三戶第二等五戶第三等七戶第四等八戶第五等十三戶第六等二十一戶第七等二十六戶第八等三十四戶第九等四十五戶今先勸諭第一等上戶願糶五千石第九等戶願糶二百石欲知各等抛差石數并總認米數各幾何荅曰總認米二十三萬七千六百石上等一戶米五千石三戶計一萬五千石二等一戶米四千四百石五戶計二萬二千石三等一戶米三千八百石七戶計二萬六千六百石四等一戶米三千二百石八戶計二萬五千六百石五等一戶米二千六百石一十三戶計三萬三千八百石六等一戶米二千石二十一戶計四萬二千石七等一戶米一千四百石二十六戶計三萬六千四百石
