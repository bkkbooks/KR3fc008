body:
  text: 均數徭役問軍戍差坐烽擺鋪切慮差徭不均今諸軍𠔏合差一千二百六十人契勘諸軍見管前軍六千一百七十人右軍四千九百三十六人中軍七千四百四人左軍三千七百二人後軍二千四百六十八人各軍合差幾何答曰前軍差三百一十五人右軍差二百五十二人中軍差三百七十八人左軍差一百八十九人後軍差一百二十六人術曰以均輸求之置各軍見管人驗可約求等以約之為衰副併為法以𠔏合差數乘列衰各為實實如法而一各得草曰置諸軍見管求等得一千二百三十四俱以約各見管前軍得五右軍得四中軍得六左軍得三後軍得二列為各衰副併諸衰得二十為法以𠔏差一千二百六十人乘諸衰前軍得六千三百右軍得五千四十中軍得七千五百六十左軍得三千七百八十後軍得二千
  hash: sha256:94cb99686cfc2e2815f9ae8d631a1f8ee84a60ff801b4c7c995b7962772a82cc
