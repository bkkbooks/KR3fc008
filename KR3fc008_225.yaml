body:
  text: 三斜求積問沙田一段有三斜其小斜一十三里中斜一十四里大斜一十五里里法三百步欲知為田幾何答曰田積三百一十五頃術曰以少廣求之以小斜羃併大斜羃減中斜羃餘半之自乘於上以小斜羃乘大斜羃減上餘四約之為實一為從隅開平方得積草曰以小斜一十三里自乘得一百六十九里為小斜羃以大斜一十五里自乘得二百二十五里為大斜羃併小斜羃得三百九十四里於上以中斜一十四里自乘得一百九十六里為中斜羃減上餘一百九十八里以半之得九十九里自乘得九千八百一里於上以小斜羃一百六十九乘大斜羃二百二十五得三萬八千二十五減上餘二萬八千二百二十四以四約之得七千五十六里為實以一為隅開平方以隅超步為一百乃於實上商置八十以商生隅得八百為從方乃命上商除實餘六百五十六又以商生隅入方得數退一位為
  hash: sha256:c35f6275157a26d83b8b0045ada296bc872baa42e60a1f5cb6a3ea1eaf08c04c
