body:
  text: 綴術推星問歲星合伏經一十六日九十分行三度九十分去日一十三度乃見後順行一百一十三日行一十七度八十三分乃畱欲知合伏段晨疾初段常度初行率末行率平行率各幾何荅曰合伏一十六日九十分常度三度九十分初行率二十三分九十七秒平行率二十三分二秒末行率二十二分七秒晨疾初三十日常度六度一十三分初行率二十一分九十六秒平行率二十分三十三秒末行率一十八分六十九秒術曰以方程法求之置見日減一餘半之爲見率以伏日併見日爲初行法以法半之加見率𠔏爲伏率以伏日乘伏率爲伏差以見日乘見率爲見差以伏日乘見差
