body:
  text: 期取馭卒戮之至郡數月罷歸所攜甚富己未透渡秦喜色洋洋然既未有省者則又曰生活皆為人攬了也時吳履齊在鄞亟往投之吳時將入相使之先行曰當思所處秦復追隨之吳旋得謫賈當國徐托秦事竄之梅州在梅治政不輟竟殂於梅其始謫梅離家之日大堂前大楣中斷人謂不祥秦亡後其養子復歸與其弟𠔏處焉余嘗聞楊守齊云往守霅川日秦方居家暑夕與其姬好合於月下適有僕汲水庭下意謂其窺己也翌日遂加以盜名解之郡中且自至白郡就欲黥之楊公頗知其事以其罪不至此遂從杖罪斷遣秦大不平然匿怨相交如故楊知其怨己每闞其亡而往謁焉直至替滿而往別之遂延入曲室堅欲苛留楊力辭之遂薦湯一杯皆如墨色楊恐甚不飮而歸蓋秦向在廣中多蓄毒藥如所不喜者必遭其毒手其險可知也陳聖觀云
