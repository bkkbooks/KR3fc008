body:
  text: 草曰以出竿四尺一寸五分乘臺高三十尺得一百二十四尺五寸為段以去址一十二尺乘段得一千四百九十四尺為闊泛以護岸高五尺乘段一百二十四尺五寸得六百二十二尺五寸為淺泛以目高五尺乘去址一十二尺得六十尺為約泛以闊泛淺泛約泛三者求等得一尺五寸皆以約之其闊泛得九百九十六尺為闊率其淺泛得四百一十五尺為淺率其約泛得四十尺為約率以闊率九百九十六自乘得九十九萬二千一十六尺為闊羃以淺率四百一十五自乘得一十七萬二千二百二十五尺為淺羃併闊淺二羃得一百一十六萬四千二百四十一為峻羃以闊羃九十九萬二千一十六乘峻羃得一萬一千五百四十九億四千五百六十九萬九千八百五十六尺於上又以臺高三十尺自乘得九百為臺高羃乘上得一千三十九萬四千五百一十一億二千九百八十七萬四百尺為峻實次以闊率九百九十六乘淺率四百一十五得四十一萬三千三百四十為寄以臺高三十乘闊率九百九十六得二萬九千八百八十又乘約率四十得一百一十九萬五千二百內減寄餘七十八萬一千八百六十尺自乘得六千一百一十三億五百五萬九千六百尺為隅以隅與峻實求等得二千四百八十萬四百俱以約之得四千一百九十一萬二千六百七十六尺為峻定實
