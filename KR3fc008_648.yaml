body:
  text: 次列元造弓八張刀五副箭一百五十隻於中行又列見管弓作二百二十五人刀作五百四十人箭作二百七十六人於左行以兩行對乘之上得一千八百中得二千七百下得四萬一千四百各為法先以上法一千八百除寄右行弓日實六十三萬日得三百五十為造弓一萬張日數
