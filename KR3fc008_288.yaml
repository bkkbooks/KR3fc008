body:
  text: 乃以中除上得下位里法及零步其不盡寸與法求等得八十俱約之為步分母子之數臨臺測水問臨水城臺立高三丈其上架樓其下址側腳闊二尺護下排沙下樁去址一丈二尺外樁露土高五尺與址下平遇水漲時浸至址今水退不知多少人從樓上欄杆腰串間虛駕一竿出外斜望水際得四尺一寸五分乃與竿端參合人目高五尺欲知水退立深涸岸斜長自臺址至水際各幾何答曰水退立深一丈五尺一百五十七分尺之一百三十五涸岸自臺址至水際斜長四丈一尺一百五十七分尺之三十七術曰以勾股變法兼少廣求之求涸岸斜長置出竿乘臺高為段以去基乘段為闊泛以岸高乘段為淺泛以目高乘去基為約泛三泛可約者約之為定率不可約徑為率以闊率自乘為闊冪以淺率自乘為淺羃併闊淺二羃共為峻羃復乘闊羃於上以臺高羃乘上為峻實次以闊率乘淺率為寄以臺高數乘闊率又乘約率得數內減寄餘自乘為峻隅驗峻實峻隅兩者可約求
