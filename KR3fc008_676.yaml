body:
  text: 十裹以為法以右上積一億二千八百六十二萬五千貫為實實如法而一得三百貫為沈香一裹價便以中行沈七百二十四乘三百貫得二十一萬七千二百貫減中積五十四萬三千九百貫餘三十二萬六千七百貫為中積便減去中行沈香段之數次以左上沈六十四乘三百貫得一萬九千二百貫減左積二萬九千四百貫餘一萬二百貫為左積便減左上沈香裹數去之今驗支圖中行其下只有玳瑁一千八百一十五以為法以中積三十二萬六千七百貫為實實如法而一得一百八十貫為玳瑁價今驗閏圖左行有玳瑁三十斤以乘價一百八十貫得五千四百貫減左積一萬二百貫餘四千八百貫為左積其下積有乳香七十五套以為法以積四千八百貫為實實如法而一得六十四貫為乳香套價此題竝係俱正鋪草
