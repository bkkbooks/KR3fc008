body:
  text: 造弓八張八人六日造刀五副三人二日造箭一百五十隻作院見管弓作二百二十五人刀作五百四十人箭作二百七十六人欲知畢日幾何答曰造弓一萬張三百五十日造刀一萬把一百七十七日九分日之七造箭一百萬隻一百四十四日人十九分日之六十四術曰以粟米求之互換入之置各功程元人率於右行置元日數於中行置欲求數為左行以三行對乘之為各實列右行次置元物數於中行置見管人為左行以左行乘中行各為法以對除右行各得日數草曰置元造弓七人造刀八人造箭三人於右行次置造弓九日造刀六日造箭二日列中行又置欲造弓一萬欲造刀一萬欲造箭一百萬列左行以三行對舉乘上得六十三萬中得四十八萬下得六百萬各為實
