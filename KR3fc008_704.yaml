body:
  text: 斤不盡二百七十二斤以十六兩通之得四千三百五十二兩又以法除之得五兩不盡一百一十二求等得一十六約之得五十三分兩之七約甲得椒三千五十包一十一斤五兩五十三分兩之七乙得一千八百六十九包不盡四百四十八包以四十斤乘之得一萬七千九百二十又以法除之得二十一斤不盡一百一十二斤以十六兩通之得一千七百九十二兩又以法除之得二兩不盡九十六兩求等得十六約之得五十三分兩之六為乙合得椒一千八百六十九包二十一斤二兩五十三分兩之六丙得三千三十七包不盡八百三十四以四十斤通之得三萬三千三百六十斤又以法除之得三十九斤不盡二百八十八以十六兩通之得四千六百八兩又以法除之得五兩不盡三百六十八兩求等得十六約之得五十三分兩之二十三為丙合得椒三千三十七包三十九斤五兩五十三分兩之二十三丁得二千四百七十二包不盡一百七十四以四十斤通之得六千九百六十斤又以法除之得八斤不盡一百七十六以十六兩通之得二千八百一十六又以法除之得三兩不盡二百七十二求等得十六約之得五十三分兩之一十七為丁合得椒二千四百七十二包八斤三兩五十三分兩之一十七
