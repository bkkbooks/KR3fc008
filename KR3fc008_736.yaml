body:
  text: 得二萬四千六百八十貫以乘蒺藜差一三六得二萬四千六百八十貫為上率得七萬四千四十貫為中率得一十四萬八千八十貫為下率然後各以息釐數乘各庫三乘此是變文為庫其甲以一釐乘上率二十四萬六千九百貫得二千四百六十九貫為上息以二釐五毫乘中率一十六萬四千六百貫得四千一百一十五貫為中息以三釐乘下率八萬二千三百貫得二千四百六十九貫為下息併上中下三息得九千五十三貫文為甲庫𠔏息其乙庫以一釐乘上率二萬六千四百五十貫得二百六十四貫五百文為上息以二釐五毫乘中率一十萬五千八百貫得二千六百四十五貫為中息以三釐乘下率二十三萬八千五十貫得七千一百四十一貫五百為下息併上中下三息得一萬五十一貫文為乙庫𠔏息其丙庫以一釐乘上率二萬四千六百八十貫得二百四十六貫八百為上息以二釐五毫乘中率七萬四千四十貫得一千八百五十一貫為中息以三釐乘下率一十四萬八千八十貫得四千四百四十二貫四百為下息併上中下三息得六千五百四十貫二百文為丙庫𠔏息卻併三庫𠔏息得二萬五千六百四十四貫二百文為總息推求典本問典庫今年二月二十九日有人取解一號主家聽得當
