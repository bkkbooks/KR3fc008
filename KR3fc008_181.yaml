body:
  text: 仍置夏至羃八十二寸八千一百分加上位二百六十九寸九千二百六十分得三百五十二寸七千三百六十分為立秋羃置立秋羃為實以一寸為隅開平方得一尺八寸七分八十一秒為立秋景不盡弃之乃驗陽城夏至景一尺四寸七分七十九秒在大暑後立秋前乃置大暑一尺三寸五分八十七秒併立秋景一尺八寸七分八十一秒得三尺二寸三分六十八秒以半之得一尺六寸一分八十四秒為大暑后九日景又以九日景併大暑景得二尺九寸七分七十一秒以半之得一尺四寸八分八十五秒半為大暑後五日景
