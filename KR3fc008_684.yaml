body:
  text: 定率圖右積得二千六百五十貫金五兩鹽一袋副積得一萬三千二百五十貫鹽三十三袋銀一百兩次積得二萬一千二百貫銀三百三十四兩度牒三道左積得三十一萬八千貫金一百七十五兩度牒一百五十六道乃以定圖次行之度牒三因左行左積得九十五萬四千貫金五百二十五兩度牒四百六十八道次以定圖左下度牒一百五十六道乘次行積得三百三十萬七千二百貫銀五萬二千一百四兩
