body:
  text: 次以道闊六尺併下長一千八百二十寸得一千八百八十寸為補以南北道高併臺高共得二千五百八十寸乘補得四百八十五萬四百寸為需次以上廣五百寸減下廣一千五百寸餘一千寸為址乘南道高四百八十寸得四十八萬寸為實以臺高一千二百寸除之得四百寸為減率以減下廣一千五百寸餘一千一百寸為南道長併下廣一千五百寸得二千六百乘南道高四百八十寸得一百二十四萬八千寸加需又以址一千寸乘北道高九百寸得九十萬寸為實亦如臺高一千二百而一得七百五十以減下廣一千五百寸餘七百五十寸為北道長併下廣一千五百得二千二百五十寸乘北道高九百寸得二百二萬五千寸又加需共得八百一十二萬三千四百以半道闊三尺乘之得二億四千三百七十萬二千寸併泛三億四千三百四十五萬四百得五億八千七百一十五萬二千四百寸為共率次以基腳七層乘石版厚五寸得三十五寸為基高次倍道闊得一百二十併下闊一千六百二十寸得一千七百四十乘下長一千八百二十得三百一十六萬六千八百為基率次以下廣一千五百寸乘下袤
