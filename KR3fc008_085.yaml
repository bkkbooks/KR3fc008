body:
  text: 以乘率對乘寄左行衍數甲得五百七十六乙得二百二十五丙得二千八百各爲用數次置甲申末到者其酉初爲夜此是甲以全日到爲無餘里次置乙於未正到乃於丣時數至未正得四個半辰以四半乘乙行二百四十里得一千八十爲實以晝六時約之得一百八十里爲乙行不及全日之餘里次置丙辰於末到自丣初數至辰末得二時以因丙行一百八十里得三百六十爲實以六時除之得六十里爲丙行不及全日之餘里
