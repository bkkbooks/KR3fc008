body:
  text: 求綿草曰置八人於左中綿一百五十兩於左上餘一萬六千五百兩於左下次置九人於右中一百七十兩於右上餘一萬四千四百兩於右下以左右中八九互乘各上訖左上得一千三百五十右上得一千三百六十相減餘一十為法次以中八九相乘得七十二為寄於中次以左下一萬六千五百乘上一右千三百六十得二千二百四十四萬卻以右下一萬四千四百乘左上一千三百五十得一千九百四十四萬驗其下係兩盈當相減之其右上餘三百萬為綿實其左右之下亦相減之餘二千一百乘寄七十二得一十五萬一千二百為兵實二實皆如法一十而一綿得三十萬兩兵得一萬五千一百二十人
  hash: sha256:c99c6ce70ddf30ddb08db7219cbb80f2af260b2dcc80c0e07038391d74fbd294
