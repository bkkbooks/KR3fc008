body:
  text: 乃以干圖副行銀一百兩乘兩價五十貫得五千貫以減干圖副行之積一萬三千二百五十貫訖副積餘八千二百五十貫其下鹽得三十三袋銀空而成曜圖乃以曜圖副行之積八千二百五十貫為鹽實以其下鹽三十三袋為法除之得二百五十貫為鹽一袋價而成支圖
