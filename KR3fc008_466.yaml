body:
  text: 算回運費問有江西水運米一十二萬三千四百石元係至鎮江交卸計水程二千一百三十里每石水腳錢一貫二百文十七界會子今截上件米就池州安頓池州至鎮江八百八十里欲收回不該水腳錢幾何答曰收回錢六萬一千一百七十八貫五百九十一文術曰以粟米互易求之置池州至鎮江里數乘水腳錢得數又乘運米為實以元至鎮江水程為法除實得收回錢草曰置池州至鎮江八百八十里乘每石水腳錢一貫二百得一千五十六貫文又乘運米一十二萬三千四百石得一億三千三十一萬四百貫文為實以元至鎮江水程二千一百三十里為法除實得六萬一千一百七十八貫五百九十一文為收回錢數課糴貴賤問差人五路和糴據甲浙西平江府石價三十五貫文一百三十五合至鎮江水腳錢每石九百文安吉州石價二十九貫五百文一百一十合至鎮江水腳錢每石一貫二百文江西隆興府石價二十八貫一百文一百一十五合
