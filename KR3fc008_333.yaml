body:
  text: 九億四千二十一萬七千六百又以上商生益隅入下廉得一十四億又以上商生益廉減從廉餘六億四千四百六十四萬又以上商生從廉入方得七百七十六億二千四百九十六萬又以上商生益隅入下廉得二十一億又以上商生益廉減從廉餘一百四十億五千五百三十六萬爲益上廉又以上商生益隅入下廉得二十八億諸法皆退方一退爲七十七億六千二百四十九萬六千益上廉再退爲一億四千五十五萬三千六百益下廉三退爲二百八十萬益隅四退爲一萬乃於上商之次續商置二十步以續商生隅入下廉爲二百八十二萬又以續商生下廉入上廉爲一億四千六百一十九萬三千六百又以續商生上廉減從方餘七十四億七千一十萬八千八百乃命續商除實適盡所得七百二十步以里法約之得二里爲營徑次以密率二十二乘七百二十得一萬五千八百四十爲實以七除之得二千二百六十二步七分步之六以里法約得六里一百二步七分步之六爲營周望敵遠近問敵軍處北山下原不知相去遠近乃於平地立一表高四尺人退表九百步步法五尺遙望山原適與表端參合人目高四尺八寸欲知敵軍相去幾何圖具于后
