body:
  text: 收數者乃命尾位分釐作單零以進所問之數定位訖用元數格入之或如意立數為母收進分釐以從所問用通數格入之通數者置問數通分內子互乘之皆曰通數求總等不約一位約衆位得各元法數用元數格入之或諸母數繁就分從省通之者皆不用元各母仍求總等存一位約衆位亦各得元法數亦用元數格入之復數者問數尾位見十以上者以諸數求總等存一位約衆位始得元數兩兩連環求等約奇弗約偶復乘偶或約偶或約奇復乘奇或彼此可約而猶有類數存者又相減以求續等以續等約彼則必復乘此乃得定數所有元數收數通數三格皆有復乘求定之理悉可入之求定數勿使兩位見偶勿使見一太多見一多則借用繁不欲借則任得一以定相乘為衍母以各定約衍母各得衍數或列各定為母于右行各立天元一為子于左行以母互乘子亦得衍數諸衍數各滿定母去之不滿曰奇以奇與定用大衍求一入之以求乘率或奇得一者便為乘率大衍求一術云置奇右上定居右下立天元一於左上先以右上除右下所得商數與左上一相生入左下然後乃以右行上下以少除多遞互除之所得商數隨即遞互纍乘歸左行上下須使右上末後奇一而止乃驗左上所得以為乘率或奇數已見單一者便為乘率
