body:
  text: 九丈爲北道兩隅高又爲西道乾隅高又爲東裏道艮隅高具圖如后以北道高九丈減臺高一十二丈餘三丈爲上停高以南道高四丈八尺減北道高九丈餘四丈二尺爲中停高命南道高四丈八尺爲下停高三停高皆如履級寸而一得五十爲東裏道級數得七十爲西道級數得八十爲東外道級數次以上長八百二十寸減下長一千八百二十寸餘一千寸以半之得五百寸爲句以乘南道高四百八十寸得二十四萬寸爲實如臺高一千二百寸而一得一百寸爲底率以率
