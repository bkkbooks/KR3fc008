body:
  text: 對乘寄左行衍數各得為用數凡諸用數同類者數必多可互借以補無者先驗革元數二十五與木元數二十為同類求等得五以等五約衍母八萬五千八百得一萬七千一百六十乃於革用數內減出以補木位為木用餘四萬四千六百一十六為革用次驗竹元數一百與土五十為同類以求等得五十以等五十約衍母八萬五千八百得一千七百一十六亦於革用內各借與竹土為用數革止餘四萬一千一百八十四為用得諸定用數右行定用始列錐行假號求得今照甎色遷次列之
  hash: sha256:9f58af290c3695265add8297fd1d7241970354a1be91620057b1a3bdc81ef943
