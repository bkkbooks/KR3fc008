body:
  text: 知宿程里數合幾何答曰六里二百四十步術曰以均輸求之置行數為法以單數一行用乘日程里為實實如法而一得宿程里步草曰置行數九為法以單傔數一行用乘六十里為實實如法而一得六里不盡六里以里法三百六十步通之得二千一百六十步又為實仍如法九而一得二百四十步為六里二百四十步宿程軍器功程問今欲造弓刀各一萬副箭一百萬隻據功程七人九日
