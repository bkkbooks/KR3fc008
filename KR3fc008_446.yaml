body:
  text: 次限一十三萬二千七百八貫六百六十六文末限一十三萬二千七百八貫六百六十八文傭錢元理一萬六千一百七十三貫五百文實用二千三百八十八貫七百五十六文寬餘一萬三千七百八十四貫七百四十四文術曰以均輸求之置各郡銀絹乘各價併之歸足元展足爲舊會次以五約舊會爲新會各得合解錢以限數除之得毎限錢不盡併歸末限次置里數乘毎里傭價爲率以率乘元銀及元絹各爲傭實以毎擔銀絹率各爲法實如法而一不滿者亦爲擔併之爲元理傭錢次以率乘合解錢爲實乃以錢物毎擔率爲法實如法而一各得實用傭錢以減元理傭錢餘爲寬餘傭錢問數圖
