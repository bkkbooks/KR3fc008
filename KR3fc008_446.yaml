body:
  text: 次限一十三萬二千七百八貫六百六十六文末限一十三萬二千七百八貫六百六十八文傭錢元理一萬六千一百七十三貫五百文實用二千三百八十八貫七百五十六文寬餘一萬三千七百八十四貫七百四十四文術曰以均輸求之置各郡銀絹乘各價併之歸足元展足為舊會次以五約舊會為新會各得合解錢以限數除之得每限錢不盡併歸末限次置里數乘每里傭價為率以率乘元銀及元絹各為傭實以每擔銀絹率各為法實如法而一不滿者亦為擔併之為元理傭錢次以率乘合解錢為實乃以錢物每擔率為法實如法而一各得實用傭錢以減元理傭錢餘為寬餘傭錢問數圖
