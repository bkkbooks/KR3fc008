body:
  text: 等數約之為氣元率以氣元乘歲閏滿朔率去之不滿為元閏虛置一億減入元歲餘為實元率除之得乘限乃以元閏與朔率用大衍入之求得等數因數蔀數以等數約閏縮得數以因數乘之滿蔀數去之不滿在乘限以下以乘元率為朔積年併入元歲為演紀積年又加成厯年今人相乘演積年其術如調日法求朔餘朔率立斗分歲餘求氣骨朔骨閏骨及衍等數約率因率蔀率求入元歲歲閏入閏元率元閏已上皆同此術但其所以求朔積年之術乃以閏骨減入閏餘謂之閏贏卻與閏縮朔率列號甲乙丙丁四位除乘消減謂之方程乃求得元數以乘元率所得謂之朔積年加入元歲共為演紀歲積年所謂方程正是大衍術今人少知非特置算繫名初無定法可傳甚是惑誤後學易失古人之術意故今術不言閏贏而曰入閏差者蓋本將來可用入元歲便為積年之意故今止將元閏朔率二項以大衍先求等數因數蔀數者乃仿前求入元歲之術理假閏骨如氣骨以等數為約數及求乘數蔀數以等約閏縮得因乘數滿蔀去之不滿在限下以乘元率便得朔積年亦加入元歲共為演紀積年此術非惟止用乘除省便又且於自然中取見積年不惑不差矣新術敢不用閏贏而求者實知閏贏已存於入閏之中但求朔積年之奇分與閏縮等則自與入閏相合必滿朔率所去
