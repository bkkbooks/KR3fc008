body:
  text: 其色實餘盡得十一分為金色其價除得五百三貫七百二十四文為十分金每兩價不盡一貫五百九十文與法求等得七半俱以約之為五百三十七分文之二百一十二推求本息問三庫息例萬貫以上一釐千貫以上二釐五毫百貫以上三釐甲庫本四十九萬三千八百貫乙庫本三十七萬三百貫丙庫本二十四萬六千八百貫今三庫𠔏納到息錢二萬五千六百四十四貫二百文其典率甲反錐差乙方錐差丙蒺藜差欲知元典三例本息各幾何答曰甲庫𠔏納息九千五十三貫文一釐息二千四百六十九貫文二釐半息四千一百一十五貫文三釐息二千四百六十九貫文乙庫𠔏納息一萬五十一貫文一釐息二百六十四貫五百文二釐半息二千六百四十五貫文三釐息七千一百四十一貫五百文丙庫𠔏納息六千五百四十貫二百文一釐息二百四十六貫八百文二釐半息一千八百五十一貫文三釐息四千四百四十二貫四百文
