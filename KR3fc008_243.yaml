body:
  text: 億六千三十四萬七千七十六以爲寄數於上乃以小廣母五萬八千七百九乘得數母一億四千四百四十八萬七千三十九得八萬四千八百二十六億八千九百五十七萬二千六百五十一以寄減泛今不及減乃破全步一爲分併泛得八十六步十四萬一千四百一十八億一千五百一十七萬二千三百五十九減去小廣四十步及分餘四十六步八萬四千八百二十六億八千九百五十七萬二千六百五十一分步之六萬五千八百七十四億五千四百八十二萬五千二百八十三爲乙大廣亦丙小廣求丙長置甲長五十七步二千四十五分步之八百五十六乙長四十九步四億一千二百四十萬六千三百九分步之二千二十七萬六千三百一十九以甲乙分母互乘子甲乙分母相乘得甲正長五十七步八千四百三十三億七千九十萬一千九百五分步之三千五百三十億一千九百八十萬五百四乙正長四十九步八千四百三十三億七千九十萬一千九百五分步之四百一十四億六千五百七萬二千三百五十五併甲乙長及分𠔏長一百六步三千九百四十四億八千四百八十七萬二千八百五十九分用減元長一百五十步先破一步通分母作八千四百三十三億七千九十萬一千九百五減去甲乙𠔏長餘四十三步八千四百三十三億七千九十萬一千九
