body:
  text: 己鄉苗米二升八合二勺一抄五撮一圭和買一寸四分七釐九絲六忽夏稅一寸七釐六毫三絲用各鄉錐行數十九八七六五四三二各乘一分之率爲各鄉毎畝等則泛數或自上等上田之則以一分之率累減之亦得甲鄉上等上田苗米三斗二升三合二勺一抄和買一尺六寸八分五釐四絲夏稅一尺二寸三分二釐八毫中田苗米二斗九升八勺八抄九撮和買一尺五寸一分六釐五毫三絲六忽夏稅一尺一寸九釐五毫二絲下田苗米二斗五升八合五勺六抄八撮和買一尺三寸四分八釐三絲二忽夏稅九寸八分六釐二毫四絲中等上田苗米二斗二升六合二勺四抄七撮和買一尺一寸七分九釐五毫二絲八忽夏稅八寸六分二釐九毫六絲中田苗米一斗九升三合九勺二抄六撮和買一尺一分一釐二絲四忽夏稅七寸三分九釐六毫八絲下田苗米一斗六升一合六勺五撮
