body:
  text: 下田無丙上等上田率四萬八千六百八十五分一釐二毫五絲中田率五萬三千八百一十七分九釐七毫五絲下田率五萬五千一百八分二釐中等上田率五萬五千八百八十九分七釐五毫中田率八萬四千三百三十六分三釐下田率一十一萬六千六百六十五分二釐五毫下等上田率一十一萬一千二十分二釐七毫五絲中田無下田率六萬一百四十分二毫五絲丁上等上田率一十一萬一千二十分五毫中田率八萬八千八百八十六分二釐五毫下田率七萬一百二十三分中等上田率五萬二千七百七十四分四釐八毫二絲五忽中田無下田率六萬四千九百三十五分八釐七毫五絲下等上田無中田率一萬六千二百九十六分八釐二毫五絲下田率六萬六千七百二十七分五釐七毫五絲戊上等上田率二十四萬六千三百二十一分六釐二毫五絲
