body:
  text: 母去各本衍各得奇數甲無乙得一丙得四丁得二戊得一己得五庚無各爲奇數次騐有奇數者得一便以一爲乘率或得二數以上者各以奇數於右上定母於右下立天元一於左上用大衍求一之術入之騐乘除至右上餘一而止皆以左上所得爲乘率甲無乙得一丙得四丁得五戊得一己得三庚無各爲乘率列右行以對寄左衍以兩行對乘之爲用數甲無乙得二千五百二十丙得二萬二千一百七十六丁得一萬五千四百戊得三千四百六十五己得一萬一千八百八十庚無
  hash: sha256:ea485f2686cc32eaf529dc7287dd45a05f99ef0531225dd5835ec5c90419eb20
