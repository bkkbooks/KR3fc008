body:
  text: 乘堡為實以深母除之為大小港等深以深母因堡為實以深子除之為中以半不及加中為大港面以闊母除之為小港面二面各減不及為底以埂下廣乘段為址以大港面乘隅為實以闊母除之為港平以港平併址減寄餘為田積以址減寄餘乘容水為田容水以夏冬水深乘寄得夏冬積水以田容水併港容水減夏積水餘為遏出水以八節乘之為實以溪闊乘流長又乘歲日為法除之得溪面泛高草曰先通步法為五十寸通三百六十步得一萬八千寸為里法以里法通蕩廣三里得五萬四千為廣率又通蕩縱一百一十八里得二百一十二萬四千為縱率以縱率併廣率得二百一十七萬八千為和以縱率乘廣率得一千一百四十六億九千六百萬為寄三因縱率二百一十二萬四千得六百三十七萬二千於上倍和二百一十七萬八千得四百三十五萬六千加上得一千七十二萬八千為段次以埂上廣六尺併下廣一丈二尺得一十八尺乘半埂高五十寸得九千寸又乘段一千七十二萬八千得九百六十五億五千二百萬為土積亦為港容水以港闊母六因土積得五千七百九十三億一千二百萬為實以闊子一乘小港二十四條又乘廣率五萬四千得一百二十九萬六千為泛以闊母六因縱率二百一十二萬四千得一千二百七十四
