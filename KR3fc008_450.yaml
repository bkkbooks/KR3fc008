body:
  text: 之皆為新會甲得五十萬一百四十八貫一百四十八文乙得四十二萬四千六百五十七貫六百二十七文丙得七十九萬五千二百八十貫文丁得三十九萬八千一百二十六貫各為合解錢以限數三除之甲得一十六萬六千七百一十六貫四十九文為初限次限數不盡一文增入次限數內共得一十六萬六千七百一十六貫五十文為末限數乙得一十四萬一千五百五十二貫五百四十二文為初限次限數不盡一文增入得一十四萬一千五百五十二貫五百四十三文為末限數丙得二十六萬五千九十三貫三百三十三文為初限次限數不盡一文增入得二十六萬五千九十三貫三百三十四文為末限數丁得一十三萬二千七百八貫六百六十六文為初限次限數不盡二文增入得一十三萬二千七百八貫六百六十八文為末限數各以里數乘傭錢各為率置甲郡一千里乙郡九百八十里丙郡二千里丁郡一千五百里於右行次置甲郡傭錢六文足乙郡傭錢四文二分足丙郡傭錢八十文舊會丁郡傭錢一百舊會于左行與右行對乘之甲得率六貫足乙得率四貫一百一十六足丙得率一百六十貫舊丁得率一百五十貫舊於右行以率乘元銀數各為傭實次置甲元銀三千二百兩乙銀二千七百丙銀四千兩丁銀二千六百兩於左行與右行對乘之甲得
  hash: sha256:090e22fa4a84a438802f59d896f68986a776bfed54a27f3756487c0c2a4f1029
