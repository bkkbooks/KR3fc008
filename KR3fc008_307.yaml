body:
  text: 魯郡秦九韶表望方城問敵城不知廣遠傍城南山原林間望之林際有木二株南北相去一百六十步遙與城東方面參相直於二木之東相對立表表間與木四方平人目以繩維之人自東後表向西行一十步望城東北隅入東前表一十五步又望城東南隅入東前表四十八步強半步里法三百六十步欲知其方廣及相去幾何答曰城方廣各一十二里三百二十步城去木九里三百二十步圖具于后
