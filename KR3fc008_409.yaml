body:
  text: 問州郡寬恤近將某縣下三等稅戶秋科餘缺錢米己與蠲放𠔏錢一千三百五十五貫七百六文米五千二百七十二石一斗九升其本縣下等物力計三萬七千六百五十八貫五百文今來官員陳述本縣多有樂輸無缺之戶今蒙蠲放稅尾似反寬潤頑輸之戶於理未均遂議將樂輸三等戶於明年兩稅與照昨來體例減免契勘得三等無缺戶物力二十二萬八百一十五貫三百二十一文欲知每百文合減免錢米及𠔏減各幾何答曰每物力一百文放錢三文六分放米一升四合明年兩稅放放錢七千九百四十九貫三百五十一文五分五釐六毫米三萬九百一十四石一斗四升四合九勺四抄術曰以粟米衰分求之置元物力為法除元放錢米得每百文物力所放錢米率以各率乘今來物力各得錢米為明年兩稅合放數草曰以元物力三萬七千六百五十八貫五百文為法先除元放錢一千三百五十五貫七百六文定法伯文上得一文為商除得三文六分為物力伯文所放錢率次除元放米五千二百七十二石一斗九升得一升四合為物力百文所放米率以今三等戶物力二十二萬八
