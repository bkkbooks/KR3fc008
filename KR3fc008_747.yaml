body:
  text: 李為元人元宜在宋後也循按元史冶以至元二年卒於家年八十八是為宋度宗咸淳元年上溯生年為金世宗大定十九年當宋孝宗淳熙六年冶卒後十六年元世祖始并宋又按秦九韶之名不著宋史惟周密癸辛雜識續集言九韶字道古秦鳳間人數學九章敘自稱其籍為魯郡近盧氏補宋史藝文志因以九韶為魯郡人蓋失考核年十八在鄉里為義兵首既出東南多交豪富性極機巧星象音律算術以至營造等事無不精究從李梅亭學駢儷詩詞花庵中興絶妙詞選云李公甫名劉號梅亭遊戲裘馬弓劒莫不能知性喜侈好大嗜進謀身或以厯學薦于朝得對有奏稿及所述數學大略淳祐四年韓祥請召山林布衣造厯從之薦九韶宜在此時數學大略即數學九章與吳履齊交尢稔履齊即吳潛吳有地在湖州西門外當苕水所經入城面勢浩蕩乃以術攫取之以術攫取說亦荒渺果如是則忤履齊矣何得又有從履齊事建堂其上位置皆出自心匠齎錢如揚遍謁臺幕賈秋壑宛轉得瓊州至郡數月罷歸又言吳履齊在鄞亟住投之吳時入相使之先行曰當思所處秦復追隨之吳旋得謫賈當國徐托秦事竄之梅州在梅治政不輟竟殂于梅癸辛雜識所紀甚詳今撮其略考賈鎮淮揚時在理宗淳祐十年當元憲宗時履齊之謫在景定初年其殂梅之時與冶之卒相先後年齒未必大于李况李居河北秦處浙西同時異國不得謂李演秦說也九韶為秦鳳間人若以秦鳳路言之建炎間已入於金九龍為義兵首年已十八則年百餘歲矣然秦鳳路所屬之階成岷鳳四州終金之世未嘗
