body:
  text: 九十一得四萬一千七百六十九列為合圖數乃驗合圖四行其副中次三位有對者以對相乘合之其右上左下無對者直命之皆為率列右行上得四萬六千二百為出糯穀率副位得一萬九千八百為得糯米率中得三萬三千六百六十為易得麥率次得一萬五千一百四十七為踏到麯率下得四萬一千七百六十九為餘下糯穀率併上下二率𠔏得八萬七千九百六十九為法率今六率𠔏求等得一約之只得元率為率圖始用今有糯穀一千七百五十九石三斗八升皆化為升遍乘五率不乘法率得八十一億二千八百三十三萬五千六百升為出穀實得三十四億八千三百五十七萬二千四百升為糯米實得五十九億二千二百七萬三千八十升為易麥實得二十六億六千四百九十三萬二千八百八十六為踏麯實得七十三億四千八百七十五萬四千三百二十二升為餘穀實其五實皆如法八萬七千九百六十九而一得九百二十四石為出穀得三百九十六石為作到糯米得六百七十三石二斗為易到小麥得三萬二百九十四斤為踏到麯得八百三十五石三斗八升為餘下穀今將餘下穀變為米乃以米率三因餘穀八百三十五石三斗八升得二千五百六石一斗四升為實以糯穀率七為法除之得三百五十八石二升為醞米
