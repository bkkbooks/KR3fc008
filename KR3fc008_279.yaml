body:
  text: 魯郡秦九韶望山高遠問名山去城不知高遠城外平地有木一株高二丈三尺假為前表乃立後表與木齊高相去一百六十四步先退前表三丈九寸次退後表三丈一尺三寸斜望山峰各與其表之端參合人目高五尺里法三百六十步步法五尺欲知山高及遠各幾何答曰高二十里半零三步五分步之三遠二十七里三百二十八步五百七十五分步之六十七術曰以勾股求之重差入之置二退表相減餘為高法通表間併法於上以目高減表高餘乘上為高實實如法而一得山高以法乘表高為遠法以退後表乘高實為遠實實如法而一得山去草曰置後退表三丈一尺三寸減前退表三丈九寸餘四寸為高法置表去木一百六十四步以步法五十寸通得八千二百寸為表間併法四寸得八千二百四寸於上以目高五尺減表高二丈三尺餘通之為一百八十寸乘上得一百四十七萬六千七百二十寸為高實實如高法四寸而一得三十六萬九千一百八十寸為積寸次以步法五十寸約之得七千三百八十三步五分步之三次以里法三百六十步約之得二十里一百八
  hash: sha256:d43e4bd1752140a002b60d7a44d1b2f5cf6100b88f46d50ca79952258cc8823d
