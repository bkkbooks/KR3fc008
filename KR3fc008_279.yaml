body:
  text: 魯郡秦九韶望山高遠問名山去城不知高遠城外平地有木一株高二丈三尺假爲前表乃立後表與木齊高相去一百六十四步先退前表三丈九寸次退後表三丈一尺三寸斜望山峰各與其表之端參合人目高五尺里法三百六十步步法五尺欲知山高及遠各幾何荅曰高二十里半零三步五分步之三遠二十七里三百二十八步五百七十五分步之六十七術曰以勾股求之重差入之置二退表相減餘爲高法通表間併法於上以目高減表高餘乘上爲高實實如法而一得山高以法乘表高爲遠法以退後表乘高實爲遠實實如法而一得山去草曰置後退表三丈一尺三寸減前退表三丈九寸餘四寸爲高法置表去木一百六十四步以步法五十寸通得八千二百寸爲表間併法四寸得八千二百四寸於上以目高五尺減表高二丈三尺餘通之爲一百八十寸乘上得一百四十七萬六千七百二十寸爲高實實如高法四寸而一得三十六萬九千一百八十寸爲積寸次以步法五十寸約之得七千三百八十三步五分步之三次以里法三百六十步約之得二十里一百八
