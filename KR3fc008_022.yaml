body:
  text: 魯郡秦九韶蓍卦發微問易曰大衍之數五十其用四十有九又曰分而為二以象兩挂一以象三揲之以四以象四時三變而成爻十有八變而成卦欲知所衍之術及其數各幾何答曰衍母一十二衍法三一元衍數二十四二元衍數一十二三元衍數八四元衍數六已上四位衍數計五十一揲用數一十二二揲用數二十四三揲用數四四揲用數九已上四位用數計四十九大衍總數術曰置諸問數類名有四一曰元數謂尾位見單零者本門揲蓍酒息斛糶砌甎失米之類是也二曰收數謂尾位見分釐者假令冬至三百六十五日二十五刻欲與甲子六十日為一會而求積日之類三曰通數謂諸數各有分子母者本門問一會積年是也四曰復數謂尾位見十或百及千以上者本門築堤并急足之類是也元數者先以兩兩連環求等約奇弗約偶或約得五而彼有十乃約偶而弗約奇或元數俱偶約畢可存一位見偶或皆約而猶有類數存姑置之俟與其他約遍而後乃與姑置者求等約之或諸數皆不可盡類則以諸元數命曰復數以復數格入之
