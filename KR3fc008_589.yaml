body:
  text: 千一百五十一把得一百七十四萬三百一十二竿爲筀竹實倍圓束差六得一十二爲竹法除實得一十四萬五千二十六竿以把數一千一百五十一併之得一十四萬六千一百七十七竿爲筀竹又置圓差六併水竹外圍四十二竿得四十八竿以乘水竹圍四十二竿得二千一十六竿又乘水竹一千二百二十三把得二百四十六萬五千五百六十八竿爲水竹實亦以竹法一十二除之得二十萬五千四百六十四竿以水竹把數一千二百二十三併之得二十萬六千六百八十七竿爲水竹數次置蘆圍五尺通爲五十寸以自乘得二千五百寸又乘蘆束數三千六十五得七百六十六萬二千五百寸爲蘆實以元樣蘆圍五尺五寸亦通爲五十五寸以自乘得三千二十五寸爲蘆法除實得二千五百三十三束不盡一百七十五寸與法求等得二十五俱以約之得一百二十一分束之七爲蘆二千五百三十三束一百二十一分束之七合問積木計餘問元管杉木一尖垜偶不記數從上取用至中間見存九條爲面闊元木及見存各幾何荅曰元木一百五十三條見存木一百一十七條術曰商功求之堆積入之倍中面副置減一以乘其副得
  hash: sha256:fc90826791d56f81fb97d50fc72e40dc5de40623f33df6b734bcc2f1174efd21
