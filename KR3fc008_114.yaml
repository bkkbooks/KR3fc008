body:
  text: 答曰𠔏失米九石五斗六升三合甲米三石一斗九升二合乙米三石一斗七升九合丙米三石一斗九升二合術曰以大衍求之列三器所容為元數連環求等約為定母以相乘為衍母以定各約衍母得衍數各滿定母去之得奇以奇定用大衍求得乘率以乘衍數得用數次以各剩米乘用併之為總滿衍母去之不滿為每籮米各以剩米減之餘為甲乙丙盜米併之為𠔏失米草曰列三器所容一升九合一升七合一升二合為元數連環求等皆得一不約便以元數相乘得三千八百七十六為衍母以各元數為定母以定約衍母得衍數甲得二百四乙得二百二十八丙得三百二十三各為衍數列左行以三定母甲一十九乙一十七丙一十二列右行具圖如后各滿定母去衍數得奇數甲得一十四乙得七丙得一
