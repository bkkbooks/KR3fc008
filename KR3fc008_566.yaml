body:
  text: 列三行功各通分內子築率得一十五萬四千穿率得三萬八百擔率得一億七千三百四十九萬六百二十五按術當以通率圖諸母互乘諸率今驗擔母九千四百七十七可用築母九約亦可用穿母三約故從省以築母九約擔母九千四百七十七得一千五十三為築率乘數又以穿母三約擔母九千四百七十七得三千一百五十九為穿率乘數各以乘數乘本率名曰就母圖乃以九千四百七十七變名曰就母先以築率一十五萬四千乘乘數一千五十三得一億六千二百一十六萬二千為築分次以穿率三萬八百乘乘率三千一百五十九得九千七百二十九萬七千二百為穿分就以擔率一億七千三百四十九萬六百二十五為擔分併三分𠔏得四億三千二百九十四萬九千八百二十五為總功分實以就母九千四百七十七除之得四萬五千六百八十五功九千四百七十七分功之二千五百五十七為總用功具圖如后
  hash: sha256:f78fcccf1950df687778543cfc93298b42ba8ab50addce7cff3696a158064458
