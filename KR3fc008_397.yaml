body:
  text: 二步半為丙縣先到人所築步寬減屯租問屯租欲議寬減仍聽以夏麥折納分數官牛種者與減二分私牛種者與減四分每歲租穀以三分之一許夏折二麥內四分大六分小折色每大麥三石折小麥二石小麥二石折穀三石五斗屯租舊額官種一石納租五石私種一石納租三石今某州屯田去年計官私種共九千七百八十二石共合收租穀三萬九千五百八十六石欲知官私種各數目元額今減合催成年夏麥秋穀租各幾何答曰請官種五千一百二十石私出種四千六百六十二石元租額共三萬九千五百八十六石官種二萬五千六百石私種一萬三千九百八十六石今減一萬七百一十四石四斗官種五千一百二十石私種五千五百九十四石四斗合催二萬八千八百七十一石六斗官種租二萬四百八十石一分折麥計穀六千八百二十六石六斗六升零三分升之二四分折大麥二千三百四十石五斗七升七分
