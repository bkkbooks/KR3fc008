body:
  text: 本色八疋畸零三丈一尺九寸丙今有田九百七十九畝苗米三十四石二斗六升五合夏稅折帛八疋一丈七尺七寸五分五釐本色一十九疋畸零二丈八尺九分五釐物力一千一百七十四貫八百文和買折帛二十五疋二丈七尺九寸五分本色一十一疋畸零五寸五分術曰以粟米及衰分求之置甲元納米爲實以毎畝苗爲法除之得甲元有田以乘毎畝稅得田絹次以甲絹本色折帛併之內減田絹餘爲地紬以毎紬約之得甲元有地次以甲出田併乙丙元有田各得三戶今有田地各以等則乘之各得物力苗稅次以毎疋物力率約各戶𠔏物力得和買副之三分因之退位爲和本七分因之退位爲和折夏稅反其分而因之退之紬以半之併入稅各得草曰置甲元納米三十五石七斗爲實毎畝以苗三升五合爲法除之得一千二十畝爲甲元有田以乘毎畝稅一尺一寸五分得一百一十七丈三尺爲絹積尺次以
