body:
  text: 本色八匹畸零三丈一尺九寸丙今有田九百七十九畝苗米三十四石二斗六升五合夏稅折帛八匹一丈七尺七寸五分五釐本色一十九匹畸零二丈八尺九分五釐物力一千一百七十四貫八百文和買折帛二十五匹二丈七尺九寸五分本色一十一匹畸零五寸五分術曰以粟米及衰分求之置甲元納米為實以每畝苗為法除之得甲元有田以乘每畝稅得田絹次以甲絹本色折帛併之內減田絹餘為地紬以每紬約之得甲元有地次以甲出田併乙丙元有田各得三戶今有田地各以等則乘之各得物力苗稅次以每匹物力率約各戶共物力得和買副之三分因之退位為和本七分因之退位為和折夏稅反其分而因之退之紬以半之併入稅各得草曰置甲元納米三十五石七斗為實每畝以苗三升五合為法除之得一千二十畝為甲元有田以乘每畝稅一尺一寸五分得一百一十七丈三尺為絹積尺次以
