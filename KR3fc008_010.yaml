body:
  text: 數書十卷係贊九章序東魯秦九韶所作而書不著作者姓名豈即九韶所著耶淳祐七年宋理宗年號此書原閣鈔本會稽王雲來應遴録得豫借録一過册元止名數書九章二字乃王添入王有志經濟上書修大明一統志已得旨而禮曹不為一覆今王已私修俟覆開局也豈非志士乎萬厯四十四年丙辰孟秋晦日淸常道人琦美記
