body:
  text: 置臨安府所測冬至景一丈八寸二分二十五秒以夏至景九寸一分減之餘九尺九寸一分二十五秒為景差以為實置象限度九十一度三十一分四十四秒加一十一度二十五分二十七秒五十小分命度為寸得一百二寸五千六百七十一分五十秒為法以除前差實得空寸九千六百六十四分四十秒不盡弃之自乘得節泛數九千三百四十分不盡弃之
