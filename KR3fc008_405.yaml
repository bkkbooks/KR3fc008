body:
  text: 之得一千六百七十八石三斗二升爲小麥實其圖如后次列折色毎大麥三石折小麥二石小麥二石折穀三石五斗爲諸率與大小麥實率四數如鴈翅列之其六分折小麥勿置大麥折率有母者列母官種者先以大麥率三乘小麥率二得六又乘穀實八千一百九十二石得四萬九千一百五十二石爲大麥實次以小麥率二乘穀率三石五斗得七石又乘母得二十一石爲法除實得二千三百四十石五斗七升七分升之一爲官種折大麥數仍以母三約本實八千一百九十二石得二千七百三十石六斗六升三分升之二爲所折上得大麥穀數次以小麥率二乘穀實一萬二千二百八十八石得二萬四千五百七十六石爲
