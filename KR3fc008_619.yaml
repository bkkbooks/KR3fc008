body:
  text: 草曰以圓率三因內徑七十二丈得二千一百六十尺爲內周以圓邊九尺約內周得二百四十爲內周人數乃以圓束差六爲從隅次置內周二百四十人減隅餘二百三十四爲從方列兵二千六百爲實開平方步法從方進一位隅法超一位今方隅皆不可超進乃於實約商置九重以商生隅六得五十四增入從方內𠔏得二百八十八乃命上商九重除實訖實餘八人爲餘兵副置九重減一餘八以四因之得三十二又乘圓邊九尺得二百八十八尺併內徑七百二十尺得一千八尺爲通徑又以圓率三因通徑得三千二十四尺爲外周次以圓邊九尺爲法除外周尺數得三百三十六人爲外周人數合問數書九章卷第十五
  hash: sha256:a028e399139530c096fcf9b1d2d6f23156ece43b32542f5073b5594d0aa613ec
