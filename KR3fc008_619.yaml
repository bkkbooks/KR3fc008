body:
  text: 草曰以圓率三因內徑七十二丈得二千一百六十尺為內周以圓邊九尺約內周得二百四十為內周人數乃以圓束差六為從隅次置內周二百四十人減隅餘二百三十四為從方列兵二千六百為實開平方步法從方進一位隅法超一位今方隅皆不可超進乃於實約商置九重以商生隅六得五十四增入從方內共得二百八十八乃命上商九重除實訖實餘八人為餘兵副置九重減一餘八以四因之得三十二又乘圓邊九尺得二百八十八尺併內徑七百二十尺得一千八尺為通徑又以圓率三因通徑得三千二十四尺為外周次以圓邊九尺為法除外周尺數得三百三十六人為外周人數合問數書九章卷第十五
  hash: sha256:80213665c3d913e258adbb6017956cf5b08f64936746ec5be0b3a98c4ebd30b5
