body:
  text: 右列用數併之𠔏得四十一億七千四百九十五萬三千六百一為泛用數與衍母二十億八千七百四十七萬六千八百驗之在衍母以上就以衍母除泛得二乃知泛內多一倍母數當於各用內損去所多一倍按術驗法元圖內諸元數奇偶同類者各損其半今驗法元圖氣元尾數是五紀元尾數是六百為俱五同類乃以衍母二十億八千七百四十七萬六千八百折半得一十億四千三百七十三萬八千四百以損泛用圖內氣泛紀泛畢其朔泛不損各得氣朔紀正用數其氣正用得九億八千三百七十二萬八千八百朔正用五億四千九百三十三萬六千紀正用五億五千四百四十一萬二千一列為正用圖在前既得正用數次驗問題十一月朔日丙辰冬至初五日庚申初九日甲子乃以初一減初九甲子餘八日為朔不及次以初五亦減初九甲子餘四日為氣不及以二不及各乘正用得數具圖如后
  hash: sha256:ab15e673439c2b63a355d62bd0376be00d4da6de1836c164d2de2881a002c893
