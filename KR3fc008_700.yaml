body:
  text: 十五於左甲其右價四百八十貫乃以左甲母三約之為一百六十貫於右甲次以右鹽四十袋併副鹽二百六十四袋得三百四袋於左乙次以副銀八百兩併次銀一千六百七十兩得二千四百七十兩為左丙又以次行度牒一十五道併左度牒五十二道得六十七道為左丁以兩行對乘之以右甲一百六十乘左甲七百七十五兩得一十二萬四千貫為甲元本以右乙二百五十貫乘左乙三百四袋得七萬六千貫為乙元本以右丙五十貫乘左丙二千四百七十兩得一十二萬三千五百貫為丙元本以右丁一千五百貫乘左丁六十七道得一十萬五百貫為丁元本列四人各得元本求得等五百貫皆以五百貫為法除之甲得二百四十八乙得一百五十二丙得二百四十七丁得二百一各為列衰於右行併右行列衰得八百四十八為總法次置博到沈香五千八十八兩遍乘列衰各為沈香實次置胡椒一萬四百三十包亦遍乘列衰為椒實次置象牙四百二十四條以大小
