body:
  text: 官種法實如法而一得官種以減共種餘為私種各以租率對乘官私種各得官私種所納租次以減分對乘各納租乃得各減數以減所納餘為合催租乃分列之先以總折分子乘之各為實並以總分母除之各得折色正色數次置折色數二位用夏折大小分乘之各得與每折諸率如鴈翅列常以多一事者相乘為實以少一事者相乘為法各得所折大小麥其正色數如故為併本色得成年夏折二麥秋收正穀草曰列共租三萬九千五百八十六石並共種九千七百八十二石次各以官種一石納租五石私種一石納租三石各為率對租種本色列之先以種率各一石互乘租數只得共穀次驗租數率三石係少者以乘共種九千七百八十二石得二萬九千三百四十六石為種覆減共租餘一萬二百四十石為種實以租率三減租率五餘二石係官租者為官種法除種實得五千一百二十石為官種以減共種九千七百八十二餘四千六百六十二石為私出種以官租率五石私租率三石各對乘官私種得二萬五千六百石為官種所納租得一萬三千九百八十六石為私種所納租併之得元額租次列官牛種與減二分私牛種與減四分各對乘所納租數得五千一百二十石為官種減租數得五千五百九十四石四斗為私種減租數併之得一萬七百一十四
