body:
  text: 求長率以四縣因之得四千一百四丈為實以步法五尺八寸除之得七千七十五步五尺為堤積步以里法三百六十步約之得一十九里二百三十五步五尺為堤通長置長率一千二十六丈以步法約之得一千七百六十八步五尺六寸又以里法約之得四里三百二十八步五尺六寸為各縣所給道里步尺數推庫額錢問有外邑七庫日納息足錢適等遞年成貫整納近緣見錢希少聽各庫照當處市陌準解舊會其甲庫有零錢一十文丁庚二庫各零四文戊庫零六文餘庫無零錢甲庫所在市陌一十二文遞減一文至庚庫而止欲求諸庫日息元納足錢展省及今納舊會并大小月分各幾何答曰諸庫元納日息足錢二十六貫九百五十文展省三十五貫文甲庫日息舊會二百二十四貫五百一十文大月舊會六千七百三十七貫五百文小月舊會六千五百一十二貫九百二文乙庫日息舊會二百四十五貫文大月舊會七千三百五十貫文小月舊會七千一百五貫文丙庫日息舊會二百六十九貫五百文大月舊會八千八十五貫文
