body:
  text: 事𠔏計算本息一百六十貫八百三十二文稱係前歲頭臘月半解去月息利二分二釐欲知元本幾何答曰本一百二十貫文術曰以粟米求之置積日乘息分數增三百為法以三百乘𠔏錢為實實如法而一得本草曰置前年頭臘月半係四十五日併去年三百六十又加今年五十九日𠔏得四百六十四為積日乘息二分二釐得一百二文八釐增三百文得四百二文八釐為法以三百文乘𠔏錢一百六十貫八百三十二文得四萬八千二百四十九貫六百文為實實如法而一得一百二十貫文為元本
  hash: sha256:ef98f02a084c4807177dff2f8b72388e084b9c562796bca72fcfb99922c56dd0
