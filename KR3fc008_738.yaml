body:
  text: 事𠔏計算本息一百六十貫八百三十二文稱係前歲頭臘月半解去月息利二分二釐欲知元本幾何荅曰本一百二十貫文術曰以粟米求之置積日乘息分數增三百爲法以三百乘𠔏錢爲實實如法而一得本草曰置前年頭臘月半係四十五日併去年三百六十又加今年五十九日𠔏得四百六十四爲積日乘息二分二釐得一百二文八釐增三百文得四百二文八釐爲法以三百文乘𠔏錢一百六十貫八百三十二文得四萬八千二百四十九貫六百文爲實實如法而一得一百二十貫文爲元本
  hash: sha256:e81a1fba112c28f037c8dd8dfe24499a037891d291fdac3ef8b671d4601fc744
