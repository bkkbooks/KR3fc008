body:
  text: 和買八寸四分二釐五毫二絲夏稅六寸一分六釐四毫下等上田苗米一斗二升九合二勺八抄四撮和買六寸七分四釐一絲六忽夏稅四寸九分三釐一毫二絲中田苗米九升六合九勺六抄三撮和買五寸五釐五毫一絲二忽夏稅三寸六分九釐八毫四絲下田苗米六升四合六勺四抄二撮和買三寸三分七釐八忽夏稅二寸四分六釐五毫六絲乙鄉上等上田苗米三斗六升三合二勺八抄和買一尺八寸九分三釐九毫二絲夏稅一尺三寸八分五釐八毫中田苗米三斗二升六合九勺五抄二撮和買一尺七寸四釐五毫二絲八忽夏稅一尺二寸四分七釐二毫二絲下田苗米二斗九升六勺二抄四撮和買一尺五寸一分五釐一毫三絲六忽夏稅一尺一寸八釐六毫四絲中等上田苗米二斗五升四合二勺九抄六撮和買一尺三寸二分五釐七毫四絲四忽
