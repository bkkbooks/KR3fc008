body:
  text: 魯郡秦九韶計作淸臺問創築靑臺一所正高一十二丈上廣五丈袤七丈下廣一十五丈袤一十七丈其袤當東西廣當南北秋程人日行六十里里法三百六十步钁土鍬土毎工各二百尺築土毎功九十尺毎擔土壤一尺三寸往來一百六十步內四十步上下棚道築高至少半其棚三當平道五至中半三當七至太半二當五踟躕之間十加一載輸之間二十步定一返今甲乙丙三縣差夫甲縣附郭稅力一十三萬三千八百六十六乙縣去臺所一百二十里稅力二十三萬七千九百八十四丙縣去臺一百八十里稅力三十一萬二千三百五十四俱以道里遠近稅力多少均科之臺下鋪石腳七層先用甎包砌臺身次用甎𤴁砌轉道周圍五帶並闊六尺須令南北二平道東西三峻道相間始自臺之艮隅於東外道向南順升由巽隅以西左轉週迴厯北復東再升東裏道至巽隅乃登臺頂其東裏道艮隅與北平道兩隅及西道乾隅之高皆以强半其西道坤隅與南道兩隅東外道巽隅之高皆以五分之二峻道毎級履高六寸其東裏道級數取弱半東外道級數取五分之二西道級數取强半石長五尺闊二尺厚五寸甎長一尺二寸闊六寸厚二寸五分欲知土積定一返步毎功人到土
