body:
  text: 升之一係折穀工千七百三十石六斗六升三分升之二六分折小麥二千三百四十石五斗七升七分升之一係折穀四千九十六石二分正色穀一萬三千六百五十三石三斗三升三分升之一私種租八千三百九十一石六斗一分折麥計穀二千七百九十七石二斗四分折大麥九百五十九石四升係穀一千一百一十八石八斗八升六分折小麥九百五十九石四升係折穀一千六百七十八石三斗二升二分正色穀五千五百九十四石四斗已上成年共計收夏折穀大麥三千二百九十九石六斗一升七分升之一小麥三千二百九十九石六斗一升七分升之一秋正穀一萬九千二百四十七石七斗三升三分升之一術曰以粟米求之以互易入之列共租共種各以租種率數依本色對之先以各種率互乘諸租驗租數之少者以乘共種得數覆減共租餘為實以二租數相減餘為
