body:
  text: 魯郡秦九韶折解輕齎問有甲乙丙丁四郡各合起上供銀絹甲郡銀三千二百兩每兩二貫二百文足絹六萬四千匹每匹二貫文足去京一千里每擔一里傭錢六文足其時舊會每貫五十四文足乙郡銀二千七百兩每兩二貫三百文足絹四萬九千二百匹每匹二貫四百二十文足去京九百八十里每擔一里傭錢四文二分舊會價五十九文足丙郡銀四千兩每兩新會九貫三百文絹七萬三千六百匹每匹新會一十貫三百文去京二千里每擔一里傭銀八十文舊會丁郡銀二千二百兩每兩五十一貫文舊會絹三萬一千三十五匹每匹五十八貫文舊會去京一千五百里每擔一里傭錢一百文舊會諸郡銀每五百兩絹每六十匹新會每五千貫為擔欲並折新會均作三限起解求各郡每限及本色元理折解實用寬餘傭錢各新會幾何答曰甲郡合解五十萬一百四十八貫一百四十八文初限一十六萬六千七百一十六貫四十九文次限一十六萬六千七百一十六貫四十九文末限一十六萬六千七百一十六貫五十文傭錢元理二萬三千八百四十五貫九百二十五文二十七分文之二十五
