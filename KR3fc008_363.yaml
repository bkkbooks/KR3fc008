body:
  text: 夏稅六千一百六十三丈三尺八寸術曰以衰分求之先列本縣色位自下錐行列之又以鄉數對列而乘之副併為法以除諸官物數得一分之率以率數乘未併者各得諸鄉之數次列各鄉等位自上等置十分每以內分錐行九折之至九等之又各以畝步乘之副併為鄉法以除諸各鄉所得官物數所得為一分之率以乘未併者各得每畝稅色草曰列本縣色位三目下色列十分中十一分上比中身外加一上得一百二十一中得一百一十下得一百為上中下三率列之右行乃列甲一對上率乙丙𠔏二對中率丁戊己𠔏三對下率列左行乃以左行率數各相對乘右行率數其上得一百二十一其中得二百二十其下得三百乃副置而併之得六百四十一為法置元科苗米一十萬三千五百六十七
  hash: sha256:e262c1e15b2c33d2620f26363dbf7ca2e73edf388609e657405877ec2a49f454
