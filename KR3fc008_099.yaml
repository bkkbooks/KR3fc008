body:
  text: 乃以土二與匏三竹一絲一十一求等皆得一不約以土二與石二十四求等得二反約土二得一又以土一與金二十六求等得一不約土與諸數約訖爲三變具圖如后乃以匏三與竹一絲一十一求等皆得一又以匏三與石二十四求等得三約石二十四爲八又匏三與金二十六求等得一匏與諸數約訖以爲四變次以竹一與絲一十一與石二十四與金二十六求等皆得一竹與諸數約訖爲五變次以絲一十一與石二十四金二十六求等皆得一爲六變後以石二十四與金二十六求等得二約金二十六爲一十三至此七變連環求等約俱畢得數爲定母列圖如后右定母列右行以相乘得八萬五千八百爲衍母以各定母約衍母各得衍數其竹木土定得一者爲無
