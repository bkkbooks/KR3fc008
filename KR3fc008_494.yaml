body:
  text: 闊一十三尺得三百九十尺又乘米高一十二尺得四千六百八十尺以乘一十五間得七萬二百尺加上𠔏得一十四萬五千二百尺爲寄斛法二尺五寸除之得五萬八千八十石爲寺屋四十間𠔏容米以併敖米𠔏得一十六萬六千八十石爲𠔏和糴到米推知糴數問和糴三百萬貫求米石數聞毎石牙錢三十糴場量米折支牙人所得毎石出牽錢八百牙人量米四石六斗八合折與牽頭欲知米數石價牙錢牙米牽錢各幾何荅曰糴到米一十二萬石石價二十五貫文牙錢三千六百貫文折米一百四十四石牽錢一百一十五貫二百文
