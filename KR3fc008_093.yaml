body:
  text: 得二千六百二十五爲泛用數併三泛得一萬二千一乃多衍母一倍當半衍母六千得三千以消甲四千餘一千又消乙五千三百七十六餘二千三百七十六丙不消各爲定用數旣得用數次視前草中甲及乙七百五十里爲乙率乙及丙二千里爲丙率各滿乙丙日行里去之今乙丙二人所行各皆適滿去之無餘雖稱同時俱至乃各係全日所行便以乙丙二人約六千里得三千里爲彼去此里數合問積尺尋源問欲砌基一段見管大小方甎六門城甎四色令匠取便
