body:
  text: 各合科夫幾何答曰甲州上縣差二千四百三十夫中縣差三千三十七夫下縣差四千二百六夫乙軍郭縣仁鄉七百一十三夫義鄉五百八十九夫禮鄉五百三十八夫智鄉四百四十一夫信鄉四十六夫術曰以均輸求之置各縣及鄉力皆如里而一不盡者約之復通分內子互乘之或就母遷退之各得變力可約約之為定力副併為法以合起夫遍乘未併定力各得為實並如前法而一各得夫其餘分輩之草曰置甲州三縣及乙軍五鄉物力里數作八行列之具圖于后
  hash: sha256:9ef2f51c2095c177c952d60127684535a2b8d7e4d1d342b092a5dad759145376
