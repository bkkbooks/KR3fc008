body:
  text: 先以氣不及甲子四日以乘氣正用數九億八千三百七十二萬八千八百得三十九億三千四百九十一萬五千二百為氣總次以朔不及甲子八日數以乘其朔正用數五億四千九百三十三萬六千得四十三億九千四百六十八萬八千為朔總併之得八十三億二千九百六十萬三千二百為總數滿母二十億八千七百四十七萬六千八百去之不滿二十億六千七百一十七萬二千八百為所求率實具圖如后置所得率實二十億六千七百一十七萬二千八百如法元圖紀元法二十二萬五千六百而一得九千一百六十三年為厯過年數次置衍母二十億八千七百四十七萬六千八百為實如法元圖氣元一十一萬四千四百四十五為法而一得一萬八千二百四十年為氣
  hash: sha256:61f1d5f4ea2938de305ba39fd3be3e9ce37aaf368b7a159c9983559799c556c4
