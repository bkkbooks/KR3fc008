body:
  text: 答曰田積一千八百六十六頃八畝二十四步埂土積九百六十五億五千二百萬立方寸大港面闊六丈一尺七寸底闊六丈七寸深六尺八寸小港面闊一丈二寸六分寸之五底闊九尺二寸六分寸之五深六尺八寸夏積水二萬八千六百七十四億萬立方寸冬積水一萬一千四百六十九億六千萬立方寸田容水九千七十二億六千九百七十二萬立方寸港容水九百六十五億五千二百萬立方寸港上者在田內遏出水一萬八千六百三十五億七千八百八十八萬立方寸溪面泛高一尺三寸一十三萬一千六百二十五分寸之一萬四千四百一十一術曰以商功求之步里法皆先化寸各通廣縱為率二率相併為和二率相乘為寄三因縱率於上倍和加上為段併埂二廣乘半埂高又乘段為土積亦為港容水以闊母乘土積為實以闊子乘小港數又乘廣率為泛闊母乘縱率併泛共為隅開平方所得至寸收之為堡以深子
