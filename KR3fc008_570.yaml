body:
  text: 乃以總分四億三千二百九十四萬九千八百二十五遍乘三縣定率為各實以就母九千四百七十七乘併率二十四為科法甲得三十八億九千六百五十四萬八千四百二十五乙得三十四億六千三百五十九萬八千六百丙得三十億二千六十四萬八千七百七十五各為實法得二十二萬七千四百四十八為科法除各實具圖如后乃以科法除各實甲得一萬七千一百三十一功不盡一十三萬六千七百三十七為甲縣功乙得一萬五千二百二十八不盡二萬四百五十六為乙縣功丙得一
