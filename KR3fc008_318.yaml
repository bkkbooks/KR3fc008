body:
  text: 草曰以一爲從隅以五因北三里得一十五里爲從七廉以北三里自乘得九里爲正率以八因率得七十二爲從五廉以東行九里自乘得八十一爲負率以正率九減負率餘七十二爲負差以四因之得二百八十八以乘北三里得八百六十四係負差所乘者爲益三廉倍負率八十一得一百六十二乘五廉七十二得一萬一千六百六十四爲益上廉以北三里乘上廉得三萬四千九百九十二爲實各置實廉隅玲瓏空耦位方廉以約實眾法不可超進乃於實上定商三里其隅與商相生得三爲從下廉又與商相生入從七廉𠔏得二十四爲星廉又與商相生得七十二爲從六廉又與商相生入五廉內𠔏得二百八十八又與商相生得八百六十四爲從四廉又與商相生得二千五百九十二爲正三廉內消益三廉八百六十四訖餘一千七百二十八爲從三廉又與商相生得五千一百八十四爲從二廉又與商相生得一萬五千五百五十二爲正上廉內消益上廉一萬一千六百六十四訖餘三千八百八十八爲從上廉又與商相生得一萬一千六百六十四爲從方乃命上商三里除實適盡所得三里以自乘之得九里爲城圓徑之里數又以古法圓率三因之得二十七爲城周望敵圓營
