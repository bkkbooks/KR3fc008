body:
  text: 草曰置上縣力五十七萬三千二百五十九貫五百文如九百二十五里而一得力六十一萬九千七百四十置中縣五十萬四千九百八十三貫七百八十文如六百五十二里而一得力七十七萬四千五百一十五置下縣四十九萬八千七百六十貫九百五十如四百六十五里而一得力一百七萬二千六百四不盡九十文與法求等得十五約之得三十一分之六置仁鄉一十二萬八千三百七十一貫九百八十如七百六里而一得
