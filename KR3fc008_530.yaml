body:
  text: 求功料𠔏數如術以城通長遍乘丈率功永定柱爬頭拽後木摶子木橛子木絍索蘆席筀竹水竹靑茅城甎石版石灰各得以𠔏功乘日支錢米得𠔏錢米更不立草樓櫓功料問築城合蓋樓櫓六十處每處一十間護嶮高四尺長三丈厚隨甎長臥牛木一十一條長一丈六尺徑一尺一寸搭腦木一十一條長二丈徑一尺看濠柱一十一條長一丈六尺徑一尺二寸副濠柱一十一條長一丈五尺徑一尺二寸掛甲柱一十一條長一丈三尺徑一尺一寸虎蹲柱一十一條長七尺五寸徑一尺仰艎板木四十五條長一丈徑一尺二寸平面板木三十五條長一丈徑一尺二寸串掛枋木七十三條長五尺徑一尺仰板四八甎結砌三層計六千片每片用灰半斤𠔏用紙斤一百斤牆甎長一尺六寸闊六寸厚二寸半中板瓦七千五百片一尺釘八箇八寸釘二百七十箇五寸釘一百箇四寸釘五十箇丁環二十箇用工三百九十六人欲知𠔏用工料各幾何答曰臥牛木六百六十條搭腦木六百六十條看濠柱六百六十條副濠柱六百六十條掛甲柱六百六十條虎蹲柱六百六十條串掛枋四千三百八十條仰板木二千七百條平板木二千一百條城甎四萬八千片
