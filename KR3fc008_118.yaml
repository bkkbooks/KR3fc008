body:
  text: 併三數得二萬二千五百七十三爲總數滿衍母三千八百七十六去之不滿三千一百九十三合展爲三石一斗九升三合爲三籮適滿細數以左籮剩一合減之餘三石一斗九升二合爲甲盜米又爲丙盜米以中籮剩米一升四合減之餘三石一斗七升九合爲乙盜米併三人米𠔏得九石五斗六升三合爲所失米合問數書九章卷第二
