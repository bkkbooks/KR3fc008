body:
  text: 以半罌深乘口徑加次為面率以半深除面率得水面徑以半深乘腹徑為腹率置面率與腹率相乘又各自乘併之以一十一乘之為上率以半深自乘為羃以乘下法為上法上法除上率得上積半深羃乘下率併上率為總實口徑羃乘上法為總法除實得平地雨高草曰置底徑八寸與腹徑二十四寸相乘得一百九十二寸於上又底徑八寸自乘得六十四寸加上又腹徑二十四寸自乘得五百七十六寸併上共得八百三十二寸以乘半罌深八寸得六千六百五十六寸又以一十一乘之得七萬三千二百一十六寸為下率置密率法一十四以所併三因之得四十二為下法以半深八寸併雨深一十二寸得二十寸以減元深一十六寸餘四寸為上深以口徑一十寸五分減腹徑二十四寸餘一十三寸五分以乘上深四寸得五十四寸為次以半罌深八寸乘口徑一十寸五分得八十四寸加次共得一百三十八寸為面率以半深八寸乘腹徑二十四寸得一百九十二寸為腹率置面率一百三十八寸與腹率一百九十二寸相乘得二萬六千四百九十六寸於上又以面率一百三十八寸自乘得一萬九千四十四加上又以腹率一百九十二寸自乘得三萬六千八百六十四併上共得八萬二千四百四寸以一十一乘之得九十萬六千四百四十四寸為上率以半深八寸自乘
