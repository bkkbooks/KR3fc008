body:
  text: 以半罌㴱乘口徑加次爲面率以半㴱除面率得水面徑以半㴱乘腹徑爲腹率置面率與腹率相乘又各自乘併之以一十一乘之爲上率以半㴱自乘爲羃以乘下法爲上法上法除上率得上積半㴱羃乘下率併上率爲總實口徑羃乘上法爲總法除實得平地雨高草曰置底徑八寸與腹徑二十四寸相乘得一百九十二寸於上又底徑八寸自乘得六十四寸加上又腹徑二十四寸自乘得五百七十六寸併上𠔏得八百三十二寸以乘半罌㴱八寸得六千六百五十六寸又以一十一乘之得七萬三千二百一十六寸爲下率置密率法一十四以所併三因之得四十二爲下法以半㴱八寸併雨㴱一十二寸得二十寸以減元㴱一十六寸餘四寸爲上㴱以口徑一十寸五分減腹徑二十四寸餘一十三寸五分以乘上㴱四寸得五十四寸爲次以半罌㴱八寸乘口徑一十寸五分得八十四寸加次𠔏得一百三十八寸爲面率以半㴱八寸乘腹徑二十四寸得一百九十二寸爲腹率置面率一百三十八寸與腹率一百九十二寸相乘得二萬六千四百九十六寸於上又以面率一百三十八寸自乘得一萬九千四十四加上又以腹率一百九十二寸自乘得三萬六千八百六十四併上𠔏得八萬二千四百四寸以一十一乘之得九十萬六千四百四十四寸爲上率以半㴱八寸自乘
