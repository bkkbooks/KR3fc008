body:
  text: 分五釐為實以小大二率併之得七千六百二十二步五分倍之得一萬五千二百四十五為從上廉以一為益隅開玲瓏三乘方得二十步不盡三十二萬四千五百六步二分五釐為分子續商無數乃以益隅一益下廉八十併之得八十一為減母次以從上廉一萬二千八百四十五併從方五十七萬七千八百得五十九萬六百四十五以減母八十一減之餘五十九萬五百六十四為分母以分子求等得二分五釐俱約之得二百三十六萬二千二百五十六分步之一百二十九萬八千二十五為環田積二十步二百三十六萬二千二百五十六分步之一百二十九萬八千二十五次置環田通徑九步一十九分步之九以虛徑八步減之餘一步一十九分步之九為環田實徑合問
