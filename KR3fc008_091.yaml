body:
  text: 以定相乘得六千爲衍母以各定約衍母得衍數甲得二千乙得四十八丙得三百七十五求奇數左上二千以甲三去之奇二左中四十八卽爲乙奇左下三百七十五以丙十六去之奇七各以大衍求得甲二乙一百一十二丙七各爲乘率以乘率對乘衍數甲得四千乙得五千三百七十六丙
