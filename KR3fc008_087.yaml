body:
  text: 以乙餘一百八十乘乙用二百二十五得四萬五百於中以丙餘六十乘丙用二千八百得十六萬八千加中共得二十萬八千五百為總滿衍母三千六百去之不滿三千三百里為軍前至都里以甲三百除之得一十一日以乙二百四十除之得一十三日四時半以丙一百八十除之得一十八日二時合問程行相及問有急足三名甲日行三百里乙日行二百五十里丙日行二百里先差丙往他處下文字既兩日又有文字遣乙追付已半日復有文字續令甲趕付乙三人偶不相及乃同時俱至彼所先欲知乙果及丙甲果及乙得日并里次欲知彼處去此里數各幾何答曰乙果追及丙八日行二千里甲果追及乙二日半行七百五十里彼處去此三千里術曰以均輸求之大衍入之置乙已去日數乘乙行里為實以甲乙行里差為法除之得甲及乙日數辰刻以乘甲行得里次置丙既去日乘丙行里為實以丙乙行里差為法除之得乙及丙日數以乘乙行得里然後置三人日行求總等約得元數以連環求等約得定母以定相乘得衍母各定約衍得衍數滿定去衍得奇奇定大衍得乘率以乘寄衍得用數視甲及乙里為乙率見乙
