body:
  text: 等約之爲峻定實峻定隅開同體連枝平方得峻岸斜長同體格先以隅開平方得數名同隅以同隅乘定實開之得數爲實以同隅爲法除之得峻斜求水退㴱置岸高羃乘峻定實爲㴱實以去岸羃併岸高羃乘峻定隅爲㴱隅其㴱實㴱隅可約約之仍以同體格入之開連枝平方得水退㴱
