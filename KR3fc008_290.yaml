body:
  text: 等約之為峻定實峻定隅開同體連枝平方得峻岸斜長同體格先以隅開平方得數名同隅以同隅乘定實開之得數為實以同隅為法除之得峻斜求水退深置岸高羃乘峻定實為深實以去岸羃併岸高羃乘峻定隅為深隅其深實深隅可約約之仍以同體格入之開連枝平方得水退深
