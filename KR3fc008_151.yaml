body:
  text: 於上以見日乘伏差減上餘為法以見日乘伏度為泛以伏日乘見度減泛餘為實滿法而一為度不滿退除為分秒即得日差求初行率置初行法減一餘乘日差為寄以半初行法乘寄得數又加伏見度𠔏為初行實以法退除之得合伏日初行率求末行率以段日乘日差減初行率餘為末行率求平行率以初行率併末行率而半之為平行率求交段差以各段常日下分數減全日一百分餘乘末日行率為交段差纍減前段積度以益後段積度各為常度草曰兼具算圖以伏日隨伏度為右行以見日隨見度為左行以度對度日對日其度於上日於中空其下列之置見日一百一十三減一餘一百一十二以半之得五十六為見率以伏日一十六日九十分併見日一百一十三得一百二十九日九十分為初行法
