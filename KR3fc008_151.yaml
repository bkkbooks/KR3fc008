body:
  text: 於上以見日乘伏差減上餘爲法以見日乘伏度爲泛以伏日乘見度減泛餘爲實滿法而一爲度不滿退除爲分秒卽得日差求初行率置初行法減一餘乘日差爲寄以半初行法乘寄得數又加伏見度𠔏爲初行實以法退除之得合伏日初行率求末行率以段日乘日差減初行率餘爲末行率求平行率以初行率併末行率而半之爲平行率求交段差以各段常日下分數減全日一百分餘乘末日行率爲交段差累減前段積度以益後段積度各爲常度草曰兼具算圖以伏日隨伏度爲右行以見日隨見度爲左行以度對度日對日其度於上日於中空其下列之置見日一百一十三減一餘一百一十二以半之得五十六爲見率以伏日一十六日九十分併見日一百一十三得一百二十九日九十分爲初行法
