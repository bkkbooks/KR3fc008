body:
  text: 小麥實乃以穀率三石五斗乘母三得一十石五斗爲法除實得二千三百四十石五斗七升七分升之一爲官種折小麥穀仍以母三約本實一萬二千二百八十八石得四千九十六石爲所折上得小麥穀數私種者先以大麥率三乘小麥率二得六又乘穀數一千一百一十八石八斗八升得六千七百一十三石二斗八升爲實乃以小麥率二乘穀率三石五斗得七石爲法除之得九百五十九石四升爲私種折大麥數次以小麥率二乘穀率一千六百七十八石三斗二升得三千三百五十六石六斗四升爲實以穀率三石五斗爲法除之得九百五十九石四升爲私種穀折小麥數次以官種四分大麥二千三百四十石五斗七升七分升之一併私種四分大麥九百五十九石四升得三千二百九十九石六斗一升七分升之一爲成年夏折大麥數次以官種六分小麥二千三百四十石五斗七升七分升之一併私種六分小麥九百五十九石四升得三千二百九十九石六斗一升七分升之一爲成年夏折小麥數次以官種二分正色穀一萬三千六百五十三石三斗三升三分升之一併私種正色穀五千五百九十四石四斗得一萬九千二百四十七石七斗三升三分升之一合問戶田均寬
