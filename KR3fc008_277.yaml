body:
  text: 千九百一十二萬為田容水次以夏水深二尺五寸乘寄一千一百四十六億九千六百萬得二萬八千六百七十四億萬寸為夏積水次以冬水深一尺乘寄得一萬一千四百六十九億六千萬寸為冬積水乃以田容水九千七十二億六千九百一十二萬併港容水九百六十五億五千二百萬得一萬三十八億二千一百一十二萬減夏積水二萬八千六百七十四億萬寸餘一萬八千六百三十五億七千八百八十八萬為遏出水當以八節乘之歲日三百六十除之為實今從省先以八節約歲日三百六十得四十五為除率次以里法一萬八千寸通流長一百三十五里得二百四十三萬又乘溪闊一十三丈得三十一億五千九百萬以乘除率四十五得一千四百二十一億五千五百萬為法除遏出水一萬八千六百三十五億七千八百八十八萬得一尺三寸為溪面泛高不盡一百五十五億六千三百八十八萬與法一千四百二十一億五千五百萬求等得一百八萬俱以約之為一十三萬一千六百二十五分寸之一萬四千四百一十一為泛高寸下分母之數合問數書九章卷第六
