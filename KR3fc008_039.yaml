body:
  text: 左下用數九挂一得一十二扐一得二十四扐三得一十二又扐一得九並為總數併此四總得五十七不問所握幾何乃滿衍母一十二去之得不滿者九或使知其所握三十七亦滿衍母去之亦只數九數以為實用三才衍法約之得三乃畫少陽單爻或不滿得八得七為實皆命為三他皆仿此術意謂揲二揲三揲四者凡三度復以三十三從頭數揲之故曰三變而成爻既卦有六爻必一十八變故曰十有八變而成卦古厯會積問古厯冬至以三百六十五日四分日之一朔策以二十九日九百四十分日之四百九十九甲子六十日各為一周假令至淳祐丙午十一月丙辰朔初五日庚申冬至初九日甲子欲求古厯氣朔甲子一會積年積月積日及厯過未至年數各幾何
  hash: sha256:08d36dfd55cd5b7ec7de8f20d11a7fe72f17878b16bc8edf79cc07ebe252da16
