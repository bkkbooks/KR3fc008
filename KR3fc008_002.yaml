body:
  text: 周教六藝數實成之學士大夫所從來尚矣其用本太虛生一而周流無窮大則可以通神明順性命小則可以經世務類萬物詎容以淺近窺哉若昔推䇿以迎日定律而知氣髀矩濬川土圭度晷天地之大囿焉而不能外况其間總總者從爰自河圖洛書闓發祕奧八卦九疇錯綜精微極而至於大衍皇極之用而人事之變無不該鬼神之情莫能隱矣聖人神之言而遺其粗常人昧之由而莫之覺要期歸則數與道非二本也漢去古未遠有張蒼許商乘馬延年耿壽昌鄭元張衡劉洪之倫或明天道而法傳於後或計功䇿而效驗于時後世學者自高鄙不之講此學殆絶惟治厯疇人能為乘除面弗通於開方衍變若官府會事則府史一二參之算家位置素所不識上之人亦律而聽焉持算者惟若人則鄙之也宜矣鳴呼樂有制氏僅記鏗鏘而謂與天地同和者止於是可乎今數術之書尚三十餘家天象厯度謂之綴術太乙壬甲謂之三式皆曰內算言其祕也九章所載即周官九數繫於方圓者為叀術皆曰外算對丙而方也其用相通不可岥二獨大衍法不載九章未有能推之者厯家演法頗用之以為方程者誤也且天下之事多矣古之人先事而計計定而行仰觀俯察人謀鬼謀無所不用其謹是以不愆於成載籍章章可覆也後世興事造始鮮能考度浸浸乎天紀人事之
