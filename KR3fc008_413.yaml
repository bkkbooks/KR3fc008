body:
  text: 之加中等戶數卻以半折之加二等戶又以半折之加上等戶數不折便為法除科綿得上等一戶之綿復半之為副等又半之為中等又四折之為次等又四折之為下等各一戶綿卻各以戶數乘之各得五等共出綿具圖折之草曰先置下等戶八千四百三十五以四折之得三千三百七十四乃以得數併入次戶二千三十五內得五千四百九戶訖又以四折次數五千四百九得二千一百六十三戶六分
