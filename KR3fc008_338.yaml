body:
  text: 超步約得百乃於實上商置三百寸方再進為一萬五千二百隅四進為五千以商隅相生得一萬五千為正方以消益方一萬五千二百其益方餘二百次與商相生得六百投入實得一萬二千一百五十二又商隅相生又得正方一萬五千內消負方二百訖餘一萬四千八百為從方一退為一千四百八十以隅再退為五十乃於上商之次續商置六十寸與隅相生增入正方得一千七百八十乃命驗續商除實訖實餘一千四百七十二次以商生隅增入正方為二千八十方一退為二百八隅再退為五分乃於續商之次又商置六寸與隅相生增入正方為二百一十一乃命商除實訖實不盡二百六寸不開為分子乃以商生隅增入正方又併隅𠔏得二百一十四寸五分為分母以分母分子求等得五分為等數皆以五分約其分子分母之數為四百二十九分寸之四百一十二通命之得池圓徑及方面皆三丈六尺六寸四百二十九分寸之四百一十二又倍隅斜七尺六寸得一丈五尺二寸併徑三丈六尺六寸𠔏得五丈一尺八寸四百二十九分寸之四百一十二為方斜
