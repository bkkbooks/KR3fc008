body:
  text: 草曰以長五百七十六步併廣三十四步得六百一十以兩度自乘得二億二千六百九十八萬一千步進一位即是以十乘之得二十二億六千九百八十一萬步定得此數以為實置長五百七十六以半之得二百八十八自乘得八萬二千九百四十四於上又置廣三十四步以半之得一十七自乘得二百八十九減上餘八萬二千六百五十五為從方以一為從隅開平方得二萬一千七百四十二步不盡一萬四百二十六步以商生隅入方又併隅算共得一十二萬六千一百四十為母與不盡及開方田積數皆半之田積定得一萬八百七十一步六萬三千七十分步之五千二百一十三以畝法二百四十約之得四十五畝一角一十一步六萬三千七十分步之五千二百一十三均分梯田問戶業田一段若梯之狀南廣小三十四步北廣大五十二步正長一百五十步合係兄弟三人均分其田邊道各欲出入其地難分經官乞分定南甲乙北丙欲知其田共積各人合得田數及各段正長大小廣幾何
