body:
  text: 後世必有知者嗚乎百餘年來不絶如線至今日而其學大著精神所結鬼神護之欒城自信詎虛言哉秦九韶為周密所醜詆至于不堪而其書亦晦而復顯密以填詞小說之才實學非其所知即所稱與吳履齊交稔為賈相竄于梅州力政不輟則秦之為人亦瑰奇有用之才也密又述楊守齊之言稱斷事不平薦湯如墨恐遭其毒手此亦影響之言又言以劒命隸殺所養子又言聞透渡而色喜密自標聞于陳聖觀又惡知聖觀之非謗耶乃九韶之履厯頗賴此以傳則謗之正所以著之耳元史李冶傳不言其天元一之學且誤海鏡為鏡海自敘稱取天臨海鏡之義則必不名鏡海矣益古演段為益古衍疑明儒之苟率又何至箬溪始然耶
