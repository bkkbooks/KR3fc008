body:
  text: 減五日景餘三分二十四秒太弱為差以十二時除之得二十七秒五小分二十小秒為法復除陽城景與本日景差二分一十八秒一十二小分五十小秒得八命外為在初五日寅時景等求較以大衍厯晷景所差乃置陽城大暑景長一尺九寸五分七十六秒併陽城立秋景二尺五寸三分三十一秒得四尺四寸九分七秒以半之得二尺二寸四分五十三秒半為大暑後九日午中景復併大暑一尺九寸五分七十六秒得四尺二寸二十九秒半以半之得二尺一寸一十四秒太為大暑後五日景以較今開禧厯當日景一尺四寸八分八十五秒差少六寸一分二十九秒太合問天池測雨問今州郡都有天池盆以測雨水但知以盆中之水為得雨之數不知器形不同則受雨多少亦異未可以所測便為平地得雨之數假令盆口徑二尺八寸底徑一尺二寸深一尺八寸接雨水深九寸欲求平地雨降幾何答曰平地雨降三寸術曰盆深乘底徑為底率二徑差乘水深併底率為面率以盆深為法除面率得面徑以二率相乘又各自乘三位併之乘水深為實盆深乘口徑以自之又三因為法除之得平地雨深
