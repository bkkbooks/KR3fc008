body:
  text: 置元內周八千四十尺為實以後立尺七尺九寸一分約之得一千一十六為內周人數不盡三尺四寸四分為寬地本術所求內外周之人數既定不拘人奇出奇入皆以六人為重差或纍差加減各得諸重圍數或併九重人課總軍所存望知敵衆問敵為圓營在水北平沙不知人數諜稱彼營布卒占地
