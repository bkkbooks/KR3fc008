body:
  text: 魯郡秦九韶尖田求積問有兩尖田一段其尖長不等兩大斜三十九步兩小斜二十五步中廣三十步欲知其積幾何尖田步答曰田積八百四十步術曰以少廣求之翻法入之置半廣自乘為半羃與小斜羃相減相乘為小率以半羃與大斜羃相減相乘為大率以二率相減餘自乘為實併二率倍之為從上廉以一為益隅開翻法三乘方得積一位開盡者不用翻法草曰置廣三十步以半之得一十五以自乘得二百二十五為半羃以小斜二十五步自乘得六百二十五為小斜羃與半羃相減餘四百與半羃二百二十五相乘得九萬步為小率置大斜三十九步自乘得一千五百二十一為大斜羃與半羃二百二十五相減餘一千二百九十六與半羃二百二十五相乘得二十九萬一千六
