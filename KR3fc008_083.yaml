body:
  text: 先以丙乙求等得一不約次以丙甲求等得三於術約奇不約偶蓋以等三約三因得一為奇慮無衍數乃使徑先約甲三百為一百復以等三乘丙三為九既丙九為奇甲百為偶此即是約奇弗約偶次以乙四與甲百求等得四以四約一百得二十五為甲復以四乘乙四得一十六為乙各為定母以定母相乘得三千六百為衍母以各定約衍母為衍數甲得一百四十四乙得二百二十五丙得四百衍數各滿定母去之不滿為奇數甲得一十九乙得一丙得四以各奇數與定母用大衍入之各得乘數甲得四乙得一丙得七各為乘率列右行
  hash: sha256:444ee0f10b6d3e2f29be83da84b0b7f473f94986350a7ac5a23a3a41195b1468
