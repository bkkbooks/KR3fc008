body:
  text: 一百六十隅退二位為一乃於實上續商四里生隅入從方內得一百六十四乃命續商除實適盡所得八十四里為田積其形長八十四里廣一里以里法三百步自乘得九萬步乘八十四里得七百五十六萬步以畝法二百四十除之得三萬一千五百畝又以頃法一百畝約之得三百一十五頃斜蕩求積問有蕩一所正北闊一十七里自南尖穿徑中長二十四里東南斜二十里東北斜一十五里西斜二十六里欲知畝積幾何
