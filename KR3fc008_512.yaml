body:
  text: 乘之得二萬四千七百六貫二百七十九文三分四釐八毫四絲六忽七微無塵七沙無渺三莽一輕二淸五煙爲第七月納足本息畸錢米穀粒分問開倉受納有甲戶米一千五百三十四石到廊驗得米內夾穀乃於樣內取米一捻數計二百五十四粒內有穀二十八顆凡粒米率毎勺三百今欲知米內雜穀多少以折米數科責及粒各幾何荅曰米一千三百六十四石八斗九升七合六勺一百二十七分勺之四十八穀一百六十九石一斗二合三勺二百二十七分勺之七十九合折米八十四石五斗五升一合一勺一百二十七分勺之一百三元米折米𠔏計四十三億四千八百三十四萬六千四百五十六粒術曰以粟米求之衰分入之置樣米粒數爲法以帶穀顆數減之餘與穀爲列衰可約約之以𠔏米乘列衰爲各實實如法而一各得米數穀數置穀數以粟率折之爲穀所折米次以勺率徧乘米數折米得粒數草曰置一捻樣粒數二百五十四爲法以帶穀二十八顆爲穀衰以減法餘二百二十六爲米衰此二衰與法皆可約求等得二俱以二約之法得一百二十七米衰得
  hash: sha256:0be9e129857b90bfac034cc936f03d8f9640408ed92a81d09c28b09921defcf0
