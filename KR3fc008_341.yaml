body:
  text: 表望浮圖問有浮圖欹側欲換塔心木不知其高去塔六丈有剎竿亦不知其高竿木去地九尺二寸始釘𨨠𨨠一十四枚枚長五寸每𨨠下股相去二尺五寸就竿為表人退竿三丈遙望浮圖尖適與竿端斜合又望相輪之本其景入𨨠第七枚上股人目去地四尺八寸心木放三尺為楯酉翦截欲求塔高輪高合用塔心木長各幾何答曰塔高一十一丈七尺相輪高三丈塔身高八丈七尺竿高四丈二尺二寸塔心木九丈內三尺為翦截穿鑿楯酉術曰以勾股求之重差入之置𨨠數減一餘乘𨨠相去數併一枚長數加竿本𠔏為表竿高以退表為法以人目高減表竿高餘乘竿去塔為實實如法而一得數加表竿高𠔏為塔高置相輪本之𨨠數減一餘乘𨨠相去又乘竿去塔為實實如法而一得相輪高以減塔高餘為塔身高以益楯酉尺數為塔心木長草曰置𨨠一十四枚減一餘一十三以乘𨨠相去二尺五寸得三百二十五寸併最上𨨠一枚長五寸得三百三十寸又加竿本九尺二寸𠔏得四百二十二寸為表竿高以人退表三丈通為三百寸為法次以人目高四尺八寸減表竿高四百二十二寸餘三百七十四寸以乘竿去塔六丈得二十二萬四千四百寸為實實如法三
