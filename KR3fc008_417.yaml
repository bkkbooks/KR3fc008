body:
  text: 纍折至上等共得七百一十二戶四分以為總法乃置科綿八萬八千三百三十七兩六錢為實如法七百一十二戶四分而一得一百二十四兩為上等一戶所出綿以五折之得六十二兩副等一戶所出綿又五折之得三十一兩為中等一戶所出綿乃以四折之得一十二兩四錢為次等一戶所出綿又以四折之得四兩九錢六分為下等一戶所出綿乃以各等戶數各乘一戶所出即各得每等共數之綿戶稅移割問某縣據甲稱本戶田地元納苗三十五石七斗和買本色一十一匹二丈二尺九寸四分八釐七毫五絲折帛二十七匹二寸一分三釐七毫五絲紬絹折帛八匹三丈九尺七寸三分九釐紬絹本色二十匹二丈八尺九寸三分九釐已將田四百七畝出與乙五百一十六畝出與丙訖乞移割本戶所出田上稅賦歸併乙丙兩戶稅納會到乙元有田三百七十五畝丙元有田四百三十六畝並係本鄉本等每畝苗三升五合稅一尺一寸五分物力一貫二百本等地紬一尺三寸四分物力九百物力三十二貫敷和買一匹內三分本色七分折帛夏稅七分本色三分折帛紬五分本色五分折帛併絹紬欲知甲田地及甲乙丙分割合納苗米和買夏稅折帛本色畸零各幾何答曰甲元有田一千二十畝
