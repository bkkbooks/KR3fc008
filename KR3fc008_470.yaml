body:
  text: 十三合遍乘之安吉州得二千五百四十八貫一百文平江府得二千九百七十九貫七百文江西隆興得二千四百七十三貫四百文湖南潭州得二千四百四十貫二百文江南吉州得二千三百八十六貫二百五十文各為實於右行次列安吉斗一百一十合平江斗一百三十五合隆興斗一百一十五合潭州斗一百一十八合吉州斗一百二十合於左行為法以對除右行之實安吉得二十三貫一百六十四文一十一分文之六平江得二十二貫七十一文二十七分文之二十三隆興得二十一貫五百七文二十三分文之一十九潭州得二十貫六百七十九文五十九分文之三十九吉州得一十九貫八百八十五文一十二分文之五相課石價其安吉州最貴平江次之隆興又次之潭州又次之吉州最賤數書九章卷第十一
  hash: sha256:72bd3dc6bc6f2f5cb5313ca9738812317100193cc395dd361d0b2db4b34e8710
