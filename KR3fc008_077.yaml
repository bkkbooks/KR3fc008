body:
  text: 先以三率求總等得一不約次以連環求等其安吉率一百一十與平江率一百三十五求等得五以約平江率得二十七餘皆求等得一不約各得定數以定數相乘得二十四萬六千五百一十爲衍母各以元率約之得二千九百七十爲官斛衍數得二千二百四十一爲安吉斛衍數得九千一百三十爲平江斛衍數次以定母滿去衍數得不滿六十五爲官斛奇不滿四十一爲安吉奇不滿四爲平江奇數定母奇數各以大衍入之求得乘數得二十三爲官斛乘率得五十一爲安吉乘率得七爲平江乘率
  hash: sha256:9d7400337b270b4aaabff50badf47a3c10f569ccabc6270d6f4aa2ea34b79e77
