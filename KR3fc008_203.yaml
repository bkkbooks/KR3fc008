body:
  text: 之七百六十四合問列問數各通為寸口徑得一十六寸深一十七寸底徑一十二寸籮中雪高一十寸乃以底徑減口徑餘四寸乘雪深一十寸得四十寸以半得數二十寸自乘得四百寸為隅以籮深一十七寸自乘得二百八十九寸為籮深羃次置雪深一十寸自乘得一百為雪深羃以雪深羃一百寸乘籮深羃二百八十九寸得二萬八千九百寸併隅四百寸得二萬九千三百寸為上
