body:
  text: 百一十五套以左行求等得五十約之積得二萬九千四百貫沈得六十四裹玳得三十斤乳得七十五套列為定率圖三行副置求之今先欲去定圖下位乳香套數一十五與左下七十五互乘左右兩行右積得四百四十一萬貫沈得一萬五百玳得六千六百乳得一千一百二十五左積得四十四萬一千貫沈得九百六十玳得四百五十乳得一千一百二十五驗左積少右積多當以左行直減右行畢仍置定圖左行數右積得三百九十六萬九千貫沈得九千五百四十玳得六千一百五十次驗中左兩行各有下位段又以左
  hash: sha256:bdee99dc3a8d473b17b353e5f34c25acab2fc4327306fff8c9d00c2f0ac0b940
