body:
  text: 十四刻六十一分五十四秒得一十九萬三千四百四十分二十六小分為實其厯約率係三千一百二十以約之得六十二可用其實餘小分二十六乃棄之只用一十九萬三千四百四十為氣骨分次置朔一日七十五刻五十五分六十二秒以本厯日法一萬六千九百乘之得二萬九千六百六十八分九十九秒七十八小分將近一分故於氣骨內所棄二十六小分借二十二小分以補朔內收上得二萬九千六百六十九為朔骨然後以朔骨分減氣骨分餘有一十六萬三千七百七十一為閏骨率復以日法除之得閏骨策九日六十九刻五分九十一秒不盡一百二十一算直命之為一百六十九分秒之一百二十一合問治厯演紀問開禧厯積年七百八十四萬八千一百八十三欲知推演之原調日法求朔餘朔率斗分歲率歲閏入元歲入閏朔定骨閏泛骨閏縮紀率氣元率元閏元數及氣等率因率蔀率朔等數因數蔀數朔積年二十三事各幾何答曰日法一萬六千九百朔餘八千九百六十七朔率四十九萬九千六十七斗分四千一百八歲率六百一十七萬二千六百八歲閏一十八萬三千八百四入元歲九千一百八十入閏四十七萬四千二百六十
