body:
  text: 乃得空度二十三分九十七秒為伏合初日行率餘三秒一十三小分三十二小秒一十三微分弃之求末行率置合伏段日數一十六日九十分乘日差一十一秒二十三小分六十六小秒得一分八十九秒八十九小分八十五小秒四十微分為得數乃以得數減初行率二十三分九十七秒餘二十二分七秒一十小分一十四小秒六十微分為合伏末日行率但注厯收弃小分以下數餘為定求平行率置初行率二十三分九十七秒併末行率二十二分七秒得四十六分四秒以半之得二十三分二秒為平行率求交段差置合伏日下減全日一百分餘一十分乘末行率二十二分七秒得二分二十秒七十小分為交段
