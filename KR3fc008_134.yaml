body:
  text: 為實以元率一萬九千五百為法除之得五千一百二十七為乘元限數乃以元閏三十七萬七千八百七十三與朔率四十九萬九千六十七用大衍術求之得等數一因數四十五萬七千九百九十九蔀數四十九萬九千六十七然後以等數一約閏縮只得一十八萬八千五百七十八以因數四十五萬七千九百九十九乘之得八百六十三億六千八百五十三萬五千四百二十二滿蔀數四十九萬九千六十七去之不滿四百二在乘元限數以下為可用乃以乘元率一萬九千五百得七百八十三萬九千年為朔積年併入元歲九千一百八十共得七百八十四萬八千一百八十為嘉泰四年甲子歲積算本厯係於丁丣歲進呈又加丁丣三年共為七百八十四萬八千一百八十三算為本厯積年合具算圖如后
