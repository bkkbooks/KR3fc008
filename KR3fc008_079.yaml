body:
  text: 以乘率各乘寄左行衍數得六萬八千三百一十爲官斛用數得一十一萬四千二百九十一爲安吉用數得六萬三千九百一十爲平江用數次以甲餘三十二升乘官斛用數六萬八千三百一十得二百一十八萬五千九百二十升於上次以乙餘七十升乘安吉用數一十一萬四千二百九十一得八百萬三百七十升於中次以丙餘三十升乘平江用數六萬三千九百一十得一百九十一萬七千三百於下各爲總併之得一千二百一十萬三千五百九十升爲總數滿衍母二十四萬六千五百一十升去之不滿二萬四千六百升爲所求率展爲二百四十六石爲三人各分米以兄弟三人因之得七百三十八石爲𠔏米置分
  hash: sha256:5bcfe8e99011e7cc9f28ee30a34fcd278db8b23a8c2e734d0995f248e1fb3b59
