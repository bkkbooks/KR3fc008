body:
  text: 以乘率各乘寄左行衍數得六萬八千三百一十為官斛用數得一十一萬四千二百九十一為安吉用數得六萬三千九百一十為平江用數次以甲餘三十二升乘官斛用數六萬八千三百一十得二百一十八萬五千九百二十升於上次以乙餘七十升乘安吉用數一十一萬四千二百九十一得八百萬三百七十升於中次以丙餘三十升乘平江用數六萬三千九百一十得一百九十一萬七千三百於下各為總併之得一千二百一十萬三千五百九十升為總數滿衍母二十四萬六千五百一十升去之不滿二萬四千六百升為所求率展為二百四十六石為三人各分米以兄弟三人因之得七百三十八石為共米置分
  hash: sha256:d4093ee7b3c466a20d0cecb750414b96666fc1571305d5fd33b0226fbc8d226e
