  text: 五百二十各爲實皆如法二十而一前軍合差三百一十五人右軍合差二百五十二人中軍合差三百七十八人左軍合差一百八十九人後軍合差一百二十六人先計軍程問一軍三將將十隊隊七十五人毎將分左右傔作九行爬頭拽行毎日六十里明日路狹以單傔拽行至晚欲先
