  text: 五百二十各為實皆如法二十而一前軍合差三百一十五人右軍合差二百五十二人中軍合差三百七十八人左軍合差一百八十九人後軍合差一百二十六人先計軍程問一軍三將將十隊隊七十五人每將分左右傔作九行爬頭拽行每日六十里明日路狹以單傔拽行至晚欲先
