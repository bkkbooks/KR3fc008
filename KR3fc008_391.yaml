body:
  text: 魯郡秦九韶圍田租畝問有興復圍田已成𠔏計三千二十一頃五十一畝一十五步分三等其上等毎畝起租六斗中等四斗五升下等四斗中田多上田弱半不及下田太半欲知三色田畝及各租幾何荅曰上田四百七十七頃八畝一十五步米二萬八千六百二十四石八斗三升七合五勺中田六百三十六頃一十畝三角米二萬八千六百二十四石八斗三升七合五勺下田一千九百八頃三十二畝一角米七萬六千三百三十二石九斗術曰以衰分求之列母子求田率副併爲法以𠔏田爲實實如法而一得一分之率以徧乘未併者得三等田各以起租乘之各得米草曰置弱半母四爲中率子三爲上率以太半子二減母三餘一以乘中率四只得四爲中泛又以餘一乘上率三只得三爲上泛次以太半母三乘中泛四得一十二爲下泛副併三泛得一十九爲泛置田三千二十一頃五十一畝以畝法二百四十通之得七千二百五十一萬六千二百四十步內子一十五步得七千二百五十
  hash: sha256:62e104c54a0c7191a2d0590e4396709af0f9122c288890e85928523448ff5a7f
