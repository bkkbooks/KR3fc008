body:
  text: 斗四合入廉得一百八十四貫三百二十文又以商生廉加入方內得五百五十二萬九千六百貫為方法復以商又生隅四石六斗八合加入廉得二百七十六貫四百八十文為廉法其方法一退廉法二退從隅三退乃於首商之次約實續商五貫以續商生隅四石六斗八合入廉得二百九十九貫五百二十文又以續商生廉入方得七百二萬七千二百貫乃命續商五貫除實適盡所得二十五貫為每石米價以為法以糴本三百萬貫為實如法而一得一十二萬石為糴到米數以米數乘牙錢三十得三千六百貫為牙錢以石價二十五貫除牙錢三千六百貫文得一百四十四石為糴場量米折牙錢以牽錢八百乘牙米一百四十四石得一百一十五貫二百文為牽頭得牙人所與牽錢之數今乃以石價二十五貫文約牽錢一百一十五貫二百文得四石六斗八合為牽米折錢合問分定綱解問州郡合解諸司窠名錢戶部九十六萬五千四百二十一貫文總所六十四萬三千六百一十四貫文運司一萬六千九十貫三百五十文今諸窠名先催到九千二百五十三貫六百二十文欲照元額分數均定樁米候解合各幾何答曰戶部五千四百九十七貫二百文
