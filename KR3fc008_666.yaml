body:
  text: 魯郡秦九韶推求物價問推貨務三次支物準錢各一百四十七萬貫文先撥沈香三千五百裹玳瑁二千二百斤乳香三百七十五套次撥沈香二千九百七十裹玳瑁二千一百三十斤乳香三千五十六套四分套之一後撥沈香三千二百裹玳瑁一千五百斤乳香三千七百五十套欲求沈乳玳瑁裹斤套各價幾何答曰沈香每裹三百貫文乳香每套六十四貫文玳瑁每斤一百八十貫文術曰以方程求之正負入之列積及物數於下布行數各對本色有分者通之可約者約之為定率積列數每以下項互遍乘之每視其積以少減多其下物數各隨積正負之類如同名相減異名相加正無人負之負無人正之其如同名相加異名相減正無人正之負無人負之使其下項物數得一數者為法其積為實實如法而一所得不計遍損或益諸積各得法實除之餘仿此草曰置準錢一百四十七萬貫為三次撥錢為三行積數次置先撥沈香三千五百裹玳瑁二千二百斤乳香三百七十五套為右行物數又列次撥沈香二千九百七
