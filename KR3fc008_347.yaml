body:
  text: 下等上田一萬八千三十七畝一角六步中田九千四百五十六畝三角五十九步下田無丙鄉田共計一十二萬九百三十五畝五十八步五分上等上田四千八百六十八畝二角三步中田五千九百七十九畝三角六步下田六千八百八十八畝二角六步中等上田七千九百八十四畝一角中田一萬四千五十六畝一十二步下田二萬三千三百三十三畝一十二步下等上田二萬七千七百五十五畝一十六步五分中田無下田三萬七十畝三步丁鄉田共計八萬九千六十六畝二步三分上等上田一萬一千一百二畝一步中田九千八百七十六畝一角下田八千七百六十五畝一角三十步中等上田七千五百三十九畝三十四步三分中田無下田一萬二千九百八十七畝四十二步下等上田無中田五千四百三十二畝一角六步
