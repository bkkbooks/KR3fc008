body:
  text: 置各乘率對乘衍數得泛用併泛課衍母多一者為正用或泛多衍母倍數者驗元數奇偶同類者損其半倍或三處同類以三約衍母于三處損之各為正用數或定母得一而衍數同衍母者為無用數當驗元數同類者而正用至多處借之以元數兩位求等以等約衍母為借數以借數損有以益其無為正用或數處無者如意立數為母約衍母所得以如意子乘之均借補之或欲從省勿借任之為空可也然後其餘各乘正用為各總併總滿衍母去之不滿為所求率數本題術曰置諸元數兩兩連環求等約奇弗約偶遍約畢乃變元數皆曰定母列右行各立天元一為子列左行以諸定母互乘左行之子各得名曰衍數次以各定母滿去衍數各餘名曰奇數以奇數與定母用大衍術求一大衍求一術云以奇于右上定母于右下立天元一于左上先以右行上下兩位以少除多所得商數乃遞互乘內左行使右上得一而止左上為乘率得乘率以乘率乘衍數各得用數驗次所揲餘幾何以其餘數乘諸用數併名之曰總數滿衍母去之不滿為所求數以為實易以三才為衍法以法除實所得為象數如實有餘或一或二皆命作一同為象數其象數得一為老陽得二為少陰得三為
