body:
  text: 置各乘率對乘衍數得泛用併泛課衍母多一者爲正用或泛多衍母倍數者騐元數奇偶同類者損其半倍或三處同類以三約衍母于三處損之各爲正用數或定母得一而衍數同衍母者爲無用數當騐元數同類者而正用至多處借之以元數兩位求等以等約衍母爲借數以借數損有以益其無爲正用或數處無者如意立數爲母約衍母所得以如意子乘之均借補之或欲從省勿借任之爲空可也然後其餘各乘正用爲各總併總滿衍母去之不滿爲所求率數本題術曰置諸元數兩兩連環求等約奇弗約偶徧約畢乃變元數皆曰定母列右行各立天元一爲子列左行以諸定母互乘左行之子各得名曰衍數次以各定母滿去衍數各餘名曰奇數以奇數與定母用大衍術求一大衍求一術云以奇于右上定母于右下立天元一于左上先以右行上下兩位以少除多所得商數乃遞互乘內左行使右上得一而止左上爲乘率得乘率以乘率乘衍數各得用數騐次所揲餘幾何以其餘數乘諸用數併名之曰總數滿衍母去之不滿爲所求數以爲實易以三才爲衍法以法除實所得爲象數如實有餘或一或二皆命作一同爲象數其象數得一爲老陽得二爲少陰得三爲
