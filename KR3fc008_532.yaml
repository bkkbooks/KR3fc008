body:
  text: 四八甎三十六萬片石灰二十二萬八千斤紙斤六千斤中板瓦四十五萬片丁環一千二百箇一尺釘四百八十箇八寸釘一萬六千二百箇五寸釘六千箇四寸釘三千箇用工二萬三千七百六十人術曰以商功求之置牆高乘長得寸為實以甎闊乘厚為法除之得用甎及用灰以處數並乘諸工料得總用工料草曰置牆高四尺通為四十寸置長三丈通為三百寸相乘得一萬二千寸為實以甎闊六寸乘厚二寸五分得一十五寸為法除之得八百片為牆甎又為灰并四八甎灰三千斤𠔏灰三千八百斤乃以六十處遍乘總用工料臥牛木搭腦木看濠木柱副濠柱掛甲柱虎蹲仰板木平板木串掛枋木四八甎城甎石灰紙斤中板瓦一尺釘八寸釘五寸釘四寸釘丁環工數得各項總數在前計造石壩問創石壩一座長三十丈水深四丈二尺令面闊三丈石版每片長五尺闊二尺厚五寸用灰一十斤每層高二尺差闊一尺石匠每工九片般扛五片用工四人兼工般灰兼用每工一百一十斤火頭每名管六十人部押每名管一百二十人所用石須依原段不許鑿動欲知壩下闊及
  hash: sha256:ce546458a2663400696a675986789fcad17d4f4f17d7dff234a397a121bc74ff
