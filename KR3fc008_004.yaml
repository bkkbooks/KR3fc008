body:
  text: 殽缺矣可不求其故哉九韶愚陋不間於藝然早散侍親中都因得訪習于太史又嘗從隱君子受數學際時狄患厯歲遙塞不自意全於矢石間嘗險罹憂荏苒十祀心槁氣落信知夫物莫不有數也乃肆意其間旁諏方能𢲘索杳渺粗若有得焉所謂通神明順性命固膚末於見若其小者竊嘗設為問答以擬于用樍多而惜其弃因取八十一題釐為九類立術具草間以圖發之恐或可備博學多識子之餘觀可遂也願進之於道儻曰藝成而下疇人府史流也鳥足盡天下之用亦無瞢焉時淳祐年九月魯郡秦九韶敘且系之曰昆崙旁礴道本虛一聖有大衍微寓于易奇餘取策羣數錯捐衍而究之𢲘隱知原數術之傳以實為體其書九章惟茲弗紀厯家雖用用而不知小試經世姑推所為述大衍第一七精回穹人事之紀追綴而求宵星晝晷厯久則疏性智能革不尋天道模襲何益三農務穡厥施自天以滋以生雨膏雪零司牧閔焉尺雨驗之積以器移憂嘉皆非述天時第二魁隗粒民甄度四海蒼姬井之仁政攸在代遠庶蕃懇葘日廣步度庀賦版圖是掌方圓異狀邪窳殊形叀術精徴孰究厥真差之毫釐謬乃千百公私𠔏弊盍謹其籍述田
