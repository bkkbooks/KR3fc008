body:
  text: 百而一得七百四十八寸加表竿高四百二十二寸得一千一百七十寸以十約之爲一十一丈七尺爲塔高置相輪本入第七𨨠減一餘六以乘𨨠相去二尺五寸得一百五十寸又乘竿去塔六丈得九萬寸爲實實如前法三百寸而一得三百寸約三丈得相輪高以相輪高三丈減塔高一十一丈七尺餘八丈七尺爲塔身高益三尺爲剪截楯酉𠔏得九丈爲塔心木長合問數書九章卷第八
