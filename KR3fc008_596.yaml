body:
  text: 魯郡秦九韶計立方營問一軍三將將三十三隊隊一百二十五人遇暮立營人占地方八尺須令隊間容隊帥居中央欲知營方幾何荅曰營方一百七十一丈隊方九丈術曰以少廣求之置人占方冪乘毎隊人爲隊實以一爲隅開平方所得爲隊方面或開不盡就爲全數次置隊數乘將又四因之增三𠔏爲實以二爲從方一爲從隅開平方得率以乘隊方面爲營方面開不盡爲全數方營各隊圖
