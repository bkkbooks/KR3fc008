body:
  text: 魯郡秦九韶計立方營問一軍三將將三十三隊隊一百二十五人遇暮立營人占地方八尺須令隊間容隊帥居中央欲知營方幾何答曰營方一百七十一丈隊方九丈術曰以少廣求之置人占方冪乘每隊人為隊實以一為隅開平方所得為隊方面或開不盡就為全數次置隊數乘將又四因之增三𠔏為實以二為從方一為從隅開平方得率以乘隊方面為營方面開不盡為全數方營各隊圖
