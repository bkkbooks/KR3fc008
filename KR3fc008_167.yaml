body:
  text: 求晨疾初末行率置晨疾初常日三十減一餘二十九日乘日差一十一秒二十三小分六十六小秒得三分二十五秒八十六小分一十四小秒以減晨疾初段初行率泛二十一分九十五秒七十六小分三十四小秒餘一十八分六十九秒九十小分二十小秒爲晨疾初末行率求平行率以晨疾初初行泛二十一分九十五秒七十六小分三十四小秒併晨疾初末行泛一十八分六十九秒九十小分二十小秒得四十分六十五秒六十六小分五十四小秒以半之得二十分三十二秒八十三小分二十七小秒爲晨疾初平行泛乃以三泛收弃之爲定
