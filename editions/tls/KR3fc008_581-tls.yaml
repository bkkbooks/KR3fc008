body:
  text: 次以道闊六尺併下長一千八百二十寸得一千八百八十寸爲補以南北道高併臺高𠔏得二千五百八十寸乘補得四百八十五萬四百寸爲需次以上廣五百寸減下廣一千五百寸餘一千寸爲址乘南道高四百八十寸得四十八萬寸爲實以臺高一千二百寸除之得四百寸爲減率以減下廣一千五百寸餘一千一百寸爲南道長併下廣一千五百寸得二千六百乘南道高四百八十寸得一百二十四萬八千寸加需又以址一千寸乘北道高九百寸得九十萬寸爲實亦如臺高一千二百而一得七百五十以減下廣一千五百寸餘七百五十寸爲北道長併下廣一千五百得二千二百五十寸乘北道高九百寸得二百二萬五千寸又加需𠔏得八百一十二萬三千四百以半道闊三尺乘之得二億四千三百七十萬二千寸併泛三億四千三百四十五萬四百得五億八千七百一十五萬二千四百寸爲𠔏率次以基腳七層乘石版厚五寸得三十五寸爲基高次倍道闊得一百二十併下闊一千六百二十寸得一千七百四十乘下長一千八百二十得三百一十六萬六千八百爲基率次以下廣一千五百寸乘下袤
