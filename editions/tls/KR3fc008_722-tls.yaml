body:
  text: 煉金計直問庫有三色金𠔏五千兩內八分金一千二百五十兩兩價四百貫文七分五釐金一千六百兩兩價三百七十五貫文八分五釐金二千一百五十兩兩價四百二十五貫文竝欲煉爲足色毎兩工食藥炭錢三貫文耗金九百七十二兩五錢欲知色分及兩價各幾何荅曰色一十分兩價五百三貫七百二十四文五百三十七分文之二百一十二術曰以方田及粟米求之置𠔏數以耗減之餘爲法以三色分數各乘兩數併之爲色分實以三色價數各乘兩數爲寄以工藥價乘𠔏金併價寄𠔏爲價實二實皆如法而一卽各得草曰置𠔏金五千兩減耗九百七十二兩五錢外餘四千二十七兩五錢爲法次置一千二百五十兩乘八分得一萬分於上置一千六百兩以七分五釐乘之得一萬二千分加上置二千一百五十兩乘八分五釐得一萬八千二百七十五分又加上𠔏得四萬二百七十五分爲分實次置一千二百五十兩乘四百貫得五十萬貫爲寄次置一千六百兩乘價三百七十五貫得六十萬貫加寄次置二千一百五十兩乘價四百二十五貫得九十一萬三千七百五十貫又加寄次置𠔏金五千兩
