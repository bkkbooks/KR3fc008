body:
  text: 六十二人得九十人爲外銳一邊人倍一邊九十得一百八十併不盡二人𠔏得一百八十二人爲內銳廣布兵數亦爲長布兵副置加一得一百八十三乘副一百八十二得三萬三千三百六以半之得一萬六千六百五十三人爲內銳陳布兵以減總兵六萬二千五百餘四萬五千八百四十七人爲外銳兵
