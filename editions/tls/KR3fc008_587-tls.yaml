body:
  text: 毎垜高五尺乘闊八尺得四千寸又乘長一丈得四十萬寸爲毎垜實卻以甎平法三十二寸乘厚一寸只得三十二寸爲甎積法除之得一萬二千五百片又以十五垜乘之得一十八萬七千五百片爲見有甎內減今用甎餘有一十七萬一千九十三片四分片之三爲外餘甎數合問竹圍蘆束問受給場交收竹二千三百七十四把內筀竹一千一百五十一把毎把外圍三十六竿水竹一千二百二十三把毎外圍四十二竿蘆三千六十五束毎束圍五尺其蘆元樣五尺五寸今納到圍小合準元蘆幾束及水筀竹各幾何荅曰筀竹一十四萬六千一百七十七竿水竹二十萬六千六百八十七竿合準元蘆二千五百三十三束一百二十一分束之七術曰以方田及圓率求之置圓束差併竹外圍竿數以乘外圍又乘把數爲竹實倍圓束差爲竹法除之各得二竹數皆以把數爲心加入各得竹條數置蘆圍尺數自乘以乘蘆束數爲蘆實以蘆元尺數自乘爲蘆法除實得所準蘆束數草曰置圓束差六併筀竹外圍三十六竿得四十二竿以乘外圍三十六竿得一千五百一十二竿又乘筀竹一
  hash: sha256:8615a7b4d97b570a863256f8b7f28b1bfa85f9a04994813dac2ecd93109ae71f
