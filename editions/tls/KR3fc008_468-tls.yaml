body:
  text: 至建康水腳錢毎石一貫七百文吉州石價二十五貫八百五十文一百二十合至建康水腳錢毎石二貫九百文湖廣潭州石價二十七貫三百文一百一十八合至鄂州水腳錢毎石二貫一百文其錢並十七界官會其米並用文思院斛交量細數欲皆以官斛計石錢相比貴賤幾何文思院斛毎斗八十三合荅曰文思院斛石錢安吉州二十三貫一百六十四文一十一分文之六平江府二十二貫七十一文二十七分文之二十三隆興府二十一貫五百七文二十三分文之一十九潭州二十貫六百七十九文五十九分文之三十九吉州一十九貫八百八十五文一十二分文之五術曰以粟米互換求之置石價併水腳乘官斗合數爲實各如本州合數而一各得官斛石錢以課貴賤草曰置安吉州石價二十九貫五百文平江石價三十五貫文隆興石價二十八貫一百文吉州石價二十五貫八百五十文潭州石價二十七貫三百文列右行次置水腳安吉一貫二百文平江九百文隆興一貫七百文吉州二貫九百文潭州二貫一百文列左行各對本州石價以兩行數併之得數安吉三十貫七百平江三十五貫九百隆興二十九貫八百潭州二十九貫四百吉州二十八貫七百五十仍於右行次以文思院官斗八
