body:
  text: 日役工八千一百六十四五分工之四術曰以商功求之併河上下廣於上併河上下流㴱乘之又以長乘爲實以四爲法除得河積以堅率乘河積爲實以墟率爲法除得堤積併堤上下廣乘堤長半之爲法除堤積得堤高併河堤二積以棚道母半之副置以棚道減功子乘之以棚道減功母除之得數以併其副𠔏爲寄以子減母餘乘常尺爲增子以母乘常尺爲增分併增分增子乘寄半爲用工實以增分乘增子又乘限月日爲法除實得用人工數草曰置河上廣六丈併底廣四丈通之折半得五十尺於上又置河上流㴱八尺併下流㴱一丈六尺併之折半得一十二尺以乘上位得六百尺爲次置長四十八里以尺里法二千一百六十通之得一十萬三千六百八十尺得堤河長以乘次得六千二百二十萬八千尺爲河積以堅率三因河積得一億八千六百六十二萬四千尺爲實以穿率四爲法除之得四千六百六十五萬六千尺爲堤積置上廣一丈八尺下廣二丈四尺併之爲四十二尺以乘堤長一十萬三千六百八十尺得四百三十五萬四千五百六十尺以半之得二百一十七萬七千二百八十尺爲法除堤積得二十一尺爲堤高不盡九十三萬三千一百二十與法求等得三十一萬一千四十俱約之爲七分尺之三次置河積六千二百
