body:
  text: 億入益下廉得三十二億畢其益方一退爲八十二億六千八百八十萬益上廉再退得三億七百六十八萬益下廉三退得三百二十萬益隅四退爲一萬畢乃約正實續置商四十步與益隅一萬相生得四萬入益下廉爲三百二十四萬又與商相生得一千二百九十六萬入益上廉內爲三億二千六十四萬又與商相生得一十二億八千二百五十六萬入從方內爲九十五億五千一百三十六萬乃命上續商四十除實適盡所得八百四十步爲田積今列求率開方圖于后
