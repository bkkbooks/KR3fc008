body:
  text: 對乘寄左行衍數各得爲用數凡諸用數同類者數必多可互借以補無者先騐革元數二十五與木元數二十爲同類求等得五以等五約衍母八萬五千八百得一萬七千一百六十乃於革用數內減出以補木位爲木用餘四萬四千六百一十六爲革用次騐竹元數一百與土五十爲同類以求等得五十以等五十約衍母八萬五千八百得一千七百一十六亦於革用內各借與竹土爲用數革止餘四萬一千一百八十四爲用得諸定用數右行定用始列錐行假號求得今照甎色遷次列之
  hash: sha256:6b31b41380b08a24dcb68cc60a03953a49c98888f6da028b82fbc70bd6153f9e
