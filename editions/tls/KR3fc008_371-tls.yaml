body:
  text: 中田率一十二萬一千六百九十分一毫二絲五忽下田率七萬九千九百一十分一釐中等上田率六萬二千一百四十分六釐四毫五絲中田率六萬八千二分五釐下田率一十三萬五千三百三十五分下等上田率七萬九千五百七分一釐中田率二十三萬七千四百七分七釐八毫七絲五忽下田率二萬八十三分二釐五毫己上等上田無中田率七萬一百分六釐六毫二絲五忽下田無中等上田率六萬九千九百九十六分五釐八毫七絲五忽中田率六萬五千一十七分四釐一毫下田無下等上田率一十二萬八千三百五十七分七釐六毫中田率一十三萬一千三十六分二釐一毫二絲五忽下田率一十萬八千一百三十五分八釐八毫併六鄉之九率爲九鄉之法甲法六十萬四千八百八十三分二釐三毫七絲五忽
