body:
  text: 六分五釐爲夏稅折帛又得一疋三丈八尺八分五釐爲夏稅本色其乙得六疋二丈九尺七寸九分爲夏稅折帛又得一十五疋二丈九尺五寸一分爲夏稅本色其丙得八疋一丈七尺七寸五分五釐爲夏稅折帛得一十九疋二丈八尺九分五釐爲夏稅本色次以田力一貫二百徧乘右副行并以地物力乘甲元地及紬甲得一百一十六貫四百乙得九百三十八貫四百丙得一千一百七十四貫八百各爲田物力其甲又置一十一畝七分以乘地紬一尺三寸四分得一丈五尺六寸七分八釐爲甲地紬半之得七尺八寸三分九釐各爲折紬本色又以甲地乘物力九百得一十貫五百三十爲甲地物力併田物力一百一十六貫四百𠔏得一百二十六貫九百三十文爲甲物力列甲乙丙三戶𠔏物力各爲實皆以物力和買率三十二貫爲法除之甲得三疋九分六釐六毫五絲六忽二微五塵乙得二十九疋三分二釐五毫丙得三十六疋七分一釐二毫五絲各爲和買率亦各列二位各以七三折之其上位七折者爲和買折帛下位三折者爲和買本色折訖其甲得二疋七分七釐六毫五絲九忽三微七塵五沙爲和買折帛率又得一疋一分八釐九毫九絲六忽八微七塵五沙爲和買本色率乙得二十疋五分二釐七毫五絲爲和買折帛率又得八疋七分九釐七毫五絲爲和買
