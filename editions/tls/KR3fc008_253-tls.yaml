body:
  text: 五通徑九步一十九分步之九實徑一步一十九分步之九內周二十五步一十七分步之五大圓田積七十九步五十三分步之三周三十一步二十一分步之十三小圓田積七十一步二百八十六分步之四十三徑九步一十九分步之九術曰以方田及少廣率變求之各置環圓徑自乘爲羃進位爲實以一爲隅開平方得周各置環圓周自乘爲羃退位爲實以一爲隅開平方得徑以周羃或徑羃乘各實以一十六約之爲實以一爲隅開平方得圓積置環周羃乘徑實十六約之爲大率置虛徑羃乘內周實十六約之爲小率以二率相減之餘以自乘爲實併二率倍之爲從上廉一爲益隅開三乘方得環積置環周自乘退位爲實一爲隅開平方得通徑以虛徑減通徑餘爲實徑其有開不盡者約而命之草曰置大圓徑一十步自乘得一百爲徑羃進位得一千爲實以一爲隅開平方得三十一步不盡三十九爲分子乃以隅生方又益隅𠔏得六十三爲分母以分子與母求等得三俱以三約之母子得二十一分步之一十三爲大圓周三十一步二十一分步之一十三次以徑羃一百乘前實一千得一十萬以十六約之得六千二百五十爲實以一爲隅開平方得七十九步不盡九爲分子乃以隅生方又增隅得一百五十九爲分母以分
