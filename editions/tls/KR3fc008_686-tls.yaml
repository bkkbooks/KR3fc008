body:
  text: 乃騐維圖左及次行之下度牒等當相減之以積爲端當以左之少積來減次之多積按術曰同名相減其次行之金空而左行之金五百二十五兩有爲正次空爲無按術曰正無人負之卽以左行之金正加入次行金位爲負乃成音圖仍置定圖左行諸數乃騐音圖次行積得二百三十五萬三千二百貫正金五百二十五兩負銀五萬二千一百四兩正餘三行皆正
