body:
  text: 癸辛雜識續集下秦九韶字道古秦鳳閒人年十八在鄉里爲義兵首豪宕不羈嘗隨其父守郡父方宴客忽有彈丸出父後眾賓駭愕莫知其由頃加物色乃九韶與一妓狎時亦抵筵此彈之所以來也旣出東南多交豪富性極機巧星象音律算術以至營造等事無不精究邇嘗從李梅亭學駢儷詩詞遊戲毬馬弓劒莫不能知性喜奢好大嗜進謀身或以厯學薦於朝得對有奏藁及所述數學大略與吳履齋交尢稔吳有地在湖州西門外地名曾上正當苕水所經入城面勢浩蕩乃以術攫取之遂建堂其上極其宏敞堂中一間橫亘七丈求海栰之奇材爲前楣位置皆自出心匠凡屋脊雨翬摶風皆以塼爲之堂成七間後爲列屋以處秀姬管絃製樂度曲皆極精妙用度無算將持鉢於諸大閫會其所養兄之子與其所生親子妾通事泄卽幽其妾絕其飮食而死又使一隸偕此子以行授以毒藥及一劒曰導之無人之境先使仰藥不可則令自裁又不可則擠之於水中其隸僞許而送之所生兄之寓鄂渚者歸吿事畢已而寖聞其實隸懼而逃秦并購之於是罄其所蓄自行且求其子及隸將甘心焉語人曰我且齎十萬錢如揚惟秋壑所以處我旣至遍謁臺幕洪恕齋勳爲憲起而賀曰比傳令嗣不得其死今君訪求之是傳者妄也可不賀乎秦不爲久之賈爲宛轉得瓊州行未至怒迓者之不如
