body:
  text: 八千八百步以大斜羃減之餘一千三百七十萬八千八百步乃半之得六百八十五萬四千四百步自乘得四十六萬九千八百二十七億九千九百三十六萬步于上次以小斜羃乘中羃得五十五萬一千三百九十五億三千五百三十六萬步減上餘八萬一千五百六十七億三千六百萬爲實以四約之得二萬三百九十一億八千四百萬爲實以一爲隅開平方得一十四萬二千八百步併寄三百四十五萬六千步𠔏得三百五十九萬八千八百步以畝法二百四十步除之得一萬四千九百九十五畝次以頃法一百畝約之爲一百四十九頃九十五畝爲地積又爲實以毎戶所給一十五畝爲法除實得九百九十九戶不盡一十畝不及一戶所給數以爲餘地一十畝蕉田求積問蕉葉田一段中長五百七十六步中廣三十四步不知其周求積畝合幾何荅曰田積四十五畝一角十一步六萬三千七十分步之五千二百一十三術曰以長併廣再自乘又十乘之爲實半廣半長各自乘所得相減餘爲從方一爲從隅開平方半之得積
  hash: sha256:fc90f7853ffeae47dcc1c9a474351ed9cffeffbd0add220a5ae61d523cb0021a
