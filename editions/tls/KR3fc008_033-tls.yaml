body:
  text: 以右行定母一一三四互乘左行各子一惟不對乘本子畢左上得一十二左副得一十二左次得四次下得三皆曰衍數次以各母滿去衍數其上母去衍一十二奇一其副母一亦去副子一十二亦奇一其次母三去次衍四亦奇一其下母四欲去下子三則不滿便以三爲左下奇數凡奇數得一者便爲乘率今左下衍是三乃與本母四用大衍求一術入之列衍奇三於右上定母四於右下立天元一於左上空其左下先以右上少數三除右下多數四得一爲商以商一乘左上天元一只得一歸左下其右下餘一
