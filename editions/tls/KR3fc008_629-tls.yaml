body:
  text: 求出奇後以奇母四約軍一萬二千五百得三千一百二十五爲奇兵以減總軍餘九千三百七十五爲存兵次以率四百三十二加之得九千八百七人爲實如重數九而得一千八十九爲外周人不盡六次以元外周八千六百一十六尺爲實以外周人一千八十九約之得七尺九寸一分不盡二尺一分與法求等得三俱約之爲分下三百六十三分六十七
