body:
  text: 金定一十三得衍數六千六百石定八得衍數一萬七百二十五絲定一十一得衍數七千八百竹定一無衍數匏定三得衍數二萬八千六百土定一無衍數革定二十五得衍數三千四百三十二木定一無衍數各滿定母去之得奇數金得奇九石得奇五絲得奇一匏得奇一革得奇七其絲匏得奇數一者便以一爲乘率其金石革三處奇數皆與本定母用大衍求一入之各得乘率列右行金得三石得五絲得一匏得一革得一十八各爲乘率
