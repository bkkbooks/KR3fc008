body:
  text: 荅曰一會積一萬八千二百四十年二十二萬五千六百月六百六十六萬二千一百六十日厯過九千一百六十三年未至九千七十七年術曰同前置問數有分者通之互乘之得通數求總等不約一位約眾位得各元法連環求等約奇弗約偶各得定母本題欲求一會不復乘偶以定相乘爲衍母定除母得衍數滿定去衍得奇以大衍入之得乘率以乘衍數得泛用數併諸泛以課衍母如泛內多倍數者損之乃騐元數奇偶同類處各損半倍或三位同類者三約衍母損泛各得正用然後推氣朔不及或所過甲子日數乘正用加減之爲總滿衍去之餘爲所求厯過率實如紀元法而一爲厯過以氣元法除衍母得一會積年以氣周日刻乘一會年得一會積日以朔元法除衍母得一會積月數右本題問氣朔甲子相距日數係開禧厯推到或甲子日在氣朔之間及非十一月前後者其總數必滿母贅去之所得厯過年數尾位雖倫首位必異今設問以明大衍之理初不計其前多後少之厯過草曰置問數冬至三百六十五日四分日之一朔策二十九日九百四十分之四百九十九甲子六十日各通分内子互乘之列三等位具圖如后
