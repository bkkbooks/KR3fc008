body:
  text: 魯郡秦九韶分糶推原問有上農三人力田所收之米係用足斗均分各往他處出糶甲糶與本郡官場餘三斗二升乙糶與安吉鄉民餘七斗丙糶與平江攬戶餘三斗欲知𠔏米及三人所分各糶石數幾何荅曰𠔏米七百三十八石三人分米各二百四十六石甲糶官斛二百九十六石乙糶安吉斛二百二十三石丙糶平江斛一百八十二石術曰以大衍求之置官場斛率安吉鄉斛率平江市斛率官私𠔏知者官斛八斗三升安吉鄕斛一石一斗平江市斛一石三斗五升爲元數求總等不約一位約眾位連環求等約奇不約偶或猶有類數存者又求等約彼必復乘此各得定母相乘爲衍母互乘爲衍數滿定去之得奇大衍求一得乘率乘衍數爲用數以各餘米乘用併之爲總滿衍母去之不滿爲所分以元人數乘之爲𠔏米草曰置文思院官斛八十三升安吉州鄉斛一百一十升平江府市斛一百三十五升各爲其斛元率
