body:
  text: 乃以中除上得下位里法及零步其不盡寸與法求等得八十俱約之爲步分母子之數臨臺測水問臨水城臺立高三丈其上架樓其下址側腳闊二尺護下排沙下樁去址一丈二尺外樁露土高五尺與址下平遇水漲時浸至址今水退不知多少人從樓上欄杆腰串間虛駕一竿出外斜望水際得四尺一寸五分乃與竿端參合人目高五尺欲知水退立㴱涸岸斜長自臺址至水際各幾何荅曰水退立㴱一丈五尺一百五十七分尺之一百三十五涸岸自臺址至水際斜長四丈一尺一百五十七分尺之三十七術曰以勾股變法兼少廣求之求涸岸斜長置出竿乘臺高爲段以去基乘段爲闊泛以岸高乘段爲淺泛以目高乘去基爲約泛三泛可約者約之爲定率不可約徑爲率以闊率自乘爲闊冪以淺率自乘爲淺羃併闊淺二羃𠔏爲峻羃復乘闊羃於上以臺高羃乘上爲峻實次以闊率乘淺率爲寄以臺高數乘闊率又乘約率得數內減寄餘自乘爲峻隅驗峻實峻隅兩者可約求
  hash: sha256:52c0afcf9e50aba181e84cb5cf2a221e81441c25d86791daf4354bae748bbf26
