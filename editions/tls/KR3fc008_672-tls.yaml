body:
  text: 下七十五互乘中行乃以中行下八百一十五互乘左行畢中積得二千九百四十萬貫沈得五萬九千四百瑇得四萬二千六百乳得六萬一千一百二十五左積得二千三百九十六萬一千貫沈得五萬二千一百六十瑇得二萬四千四百五十乳得六萬一千一百二十五騐左積少中積多以左行同名直減中行畢仍置定圖左行數中積得五百四十三萬九千貫沈得七千二百四十瑇得一萬八千一百五十今騐右中兩行數多又求等約之其右行求得三十約之右積得一十三萬二千三百
