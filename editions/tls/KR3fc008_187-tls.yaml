body:
  text: 實如法而一得商數八有餘命大暑四日午後數八辰得大暑五日寅時景與陽城夏至之日午景等求較以大衍厯晷景所差乃置陽城大暑景長一尺九寸五分七十六秒併陽城立秋景二尺五寸三分三十一秒得四尺四寸九分七秒以半之得二尺二寸四分五十三秒半爲大暑后九日午中景置九日景復併大暑景一尺九寸五分七十六秒得四尺二寸二十九秒半以半之得二尺一寸一十四秒太爲大暑后五日景
