body:
  text: 荅曰田𠔏積二十六畝二百一十步甲得八畝三角五十步小廣三十四步係元南廣大廣四十步五萬八千七百九分步之五萬二千二百八十四大約百分步之八十九分正長五十七步二千四十五分步之八百五十三大約一百分步之四十一分乙得八畝三角五十步小廣同甲大廣大廣四十六步八萬四千八百二十六億八千九百五十七萬二千六百五十一分步之六萬五千八百七十四億五千四百八十二萬五千二百八十三計大率約百分步之七十七分半强正長四十九步四億一千二百四十萬六千三百九分步之二千二十七萬六千三百一十九大約百分步之四分九釐丙得八畝三角五十步小廣同乙大廣大廣五十二步係元北廣正長四十三步八千四百三十三億七千九十萬一千九百五分步之四千四百八十八億八千六百二萬七千四十六大約百分步之五十三分强術曰以少廣及從法求之併兩廣乘長得數以分田人數約之爲通率半之爲各積以長乘各積爲𠔏實以長乘南廣爲甲從方二廣差半之爲𠔏隅開連枝平方得甲截長以甲長除通率得數減小廣餘爲甲廣卽爲乙小廣以元長乘乙小廣爲乙從方置𠔏隅𠔏實開連枝平方得乙截長以乙長除通率得數減乙小廣餘爲乙大
