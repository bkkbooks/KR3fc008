body:
  text: 置各縣日程約稅力得力率副併爲科法上置甲縣力一十三萬三千八百六十六以一日程約之只得此數爲甲率又置乙縣力二十三萬七千九百八十四以二日約得一十一萬八千九百九十二爲乙率又置丙縣力三十一萬三千三百五十四以三日約得一十萬四千一百一十八爲丙率列三率求等得一萬四千八百七十四俱約之甲得九乙得八丙得七各爲定率副併得二十四具圖如后
