body:
  text: 李爲元人元宜在宋後也循按元史冶以至元二年卒於家年八十八是爲宋度宗咸淳元年上溯生年爲金世宗大定十九年當宋孝宗淳熙六年冶卒後十六年元世祖始并宋又按秦九韶之名不著宋史惟周密癸辛雜識續集言九韶字道古秦鳳間人數學九章敘自稱其籍爲魯郡近盧氏補宋史藝文志因以九韶爲魯郡人蓋失考核年十八在鄕里爲義兵首旣出東南多交豪富性極機巧星象音律算術以至營造等事無不精究從李梅亭學駢儷詩詞花庵中興絕妙詞選云李公甫名劉號梅亭遊戲裘馬弓劒莫不能知性喜侈好大嗜進謀身或以厯學薦于朝得對有奏稾及所述數學大略淳祐四年韓祥請召山林布衣造厯從之薦九韶宜在此時數學大略卽數學九章與吳履齋交尢稔履齋卽吳潛吳有地在湖州西門外當苕水所經入城面勢浩蕩乃以術攫取之以術攫取說亦荒渺果如是則忤履齋矣何得又有從履齋事建堂其上位置皆出自心匠齎錢如揚徧謁臺幕賈秋壑宛轉得瓊州至郡數月罷歸又言吳履齋在鄞亟住投之吳時入相使之先行曰當思所處秦復追隨之吳旋得謫賈當國徐摭秦事竄之梅州在梅治政不輟竟殂于梅癸辛雜識所紀甚詳今撮其略考賈鎭淮揚時在理宗淳祐十年當元憲宗時履齋之謫在景定初年其殂梅之時與冶之卒相先後年齒未必大于李况李居河北秦處浙西同時異國不得謂李演秦說也九韶爲秦鳳間人若以秦鳳路言之建炎間已入於金九龍爲義兵首年已十八則年百餘歲矣然秦鳳路所屬之階成岷鳳四州終金之世未嘗
