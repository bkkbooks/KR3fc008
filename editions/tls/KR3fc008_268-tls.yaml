body:
  text: 所求是實徑者但以虛徑減通徑之餘一步一十九分步之九爲環田實徑圍田先計問有草蕩一所廣三里縱一百十八里夏日水㴱二尺五寸與溪面等平溪闊一十三丈流長一百三十五里入湖冬日水㴱一尺欲趁此時圍裹成田於蕩中順縱開大港一條磬折通溪順廣開小港二十四條其㴱同其小港闊比大港六分之一大港㴱比大港面三分之一大小港底各不及面一尺取土爲埂高一丈上廣六尺下廣一丈二尺蕩縱當溪其岸高廣倍其埂數上下流各立斗門一所須令田內止容水八寸遏餘水復溪入湖里法三百六十步步法五尺欲知田積埂土積大小港底面㴱闊冬夏積水田港容水遏水溪面泛高各幾何
  hash: sha256:867b37fb92c92ef8d0a3fae0145cd2881e22544d525b5b9a095320e755fb4a53
