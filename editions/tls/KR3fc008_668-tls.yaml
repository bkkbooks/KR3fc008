body:
  text: 十裹瑇瑁二千一百三十斤乳香三千五十六套四分套之一爲中行物次列沈香三千二百裹瑇瑁一千五百斤乳香三千七百五十套爲左行之物各以本色相對列之其中行乳香有四分套之一便以母四通中行諸數只內子一入乳香段內積得五百八十八萬貫沈得一萬一千八百八十裹瑇得八千五百二十斤乳得一萬二千二百二十五套以右行求等得二十五俱約之積得五萬八千八百貫沈得一百四十裹瑇得八十八斤乳得一十五套以中行求等十五約之積得三十九萬二千貫沈得七百九十二裹瑇得五百六十八斤乳得八
