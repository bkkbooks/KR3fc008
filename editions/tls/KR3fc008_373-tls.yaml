body:
  text: 乙法四十八萬九千二百三十四分一釐一毫三絲丙法五十八萬五千六百六十二分九釐丁法四十七萬七百六十三分五釐七毫五絲戊法一百五萬三百九十八分二毫己法五十七萬二千六百四十四分五釐一毫二絲五忽以六鄕法各除諸鄕官物得一分之率米至圭帛至忽止半已上收已下弃甲鄉苗米三升二合三勺二抄一撮和買一寸六分八釐五毫四忽夏稅一寸二分三釐二毫八絲乙鄉苗米三升六合三勺二抄八撮一圭和買一寸八分九釐三毫九絲二忽夏稅一寸三分八釐五毫八絲丙鄉苗米三升三勺四抄八撮和買一寸五分八釐二毫一絲夏稅一寸一分五釐七毫五絲丁鄉苗米三升四合三勺二抄一撮四圭和買一寸七分八釐九毫三絲夏稅一寸三分九毫二絲三忽戊鄉苗米一升五合三勺八抄二撮和買八分一毫九絲二忽夏稅五分八釐六毫七絲七忽
