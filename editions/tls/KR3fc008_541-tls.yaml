body:
  text: 爲石版以毎片用灰乘石爲灰數以匠功片數約版得石匠以般夫數乘石版爲實以扛片數爲法除之得人數以般用灰數除灰得人數併諸工以火頭管數約之爲火頭半之爲部押草曰置層高二尺面闊三丈相乘得六十尺又乘長三十丈得一萬八千尺爲初率次以差闊一尺乘高二尺又乘長三十丈得六百尺爲次率卻以石版長五尺闊二尺厚五寸相乘得五尺爲法以除二率得三千六百片爲初積一百二十片爲次積列右行置㴱四丈二尺以毎層二尺約之得二十一層乘初積三千六百片得七萬五千六百片於上次置二十一層減一餘二十以乘二十一層得四百二十半之得二百一十乘次積一百二十片得二萬五千二百片加入上𠔏得一十萬八百片爲石版數次置二十一層減去一餘二十以差闊一尺乘之得二丈併上闊三丈𠔏得五丈爲下闊之數又置石版一十萬八百片以毎功九約得一萬一千二百功置石版數以般扛四人乘之得四十萬三千二百爲實以五片爲法除之得八萬六百四十工又置石版數以毎片用灰一十斤乘之得一百萬八千斤爲灰實以毎人擔用一百一十斤約之得九千一百六十三功一十一分功之七爲灰工於上又併石版工一萬一千二百及併般扛工八萬六百四十功加上𠔏得一十萬一
