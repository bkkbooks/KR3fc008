body:
  text: 數爲基增損求之以口底方相乘又各自乘併之爲法除前上積得㴱餘分收弃之求圓斛置四數以因前積爲寄如意立數爲斛㴱別如意立數爲底徑以三因㴱爲從隅以底徑乘隅爲從方以底徑乘從方爲減率以減寄餘爲實開連枝平方得口徑不盡以所得爲基如意求差以口底徑相乘又各自乘併之爲法除寄得㴱餘方收弃之求囤米置各囤上徑下徑相乘又各自乘併之乘高又乘囤數所得之數爲積囤有大小以類併之爲𠔏積如四而一爲實以斛法除之得米
