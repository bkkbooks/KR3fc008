body:
  text: 及丙里爲丙率以乙日行滿去乙率不滿爲乙餘以丙日行滿去丙率不滿爲丙餘以二餘各乘本用併之爲總滿衍去之不滿爲彼去此里草曰置乙巳去半日乘乙日行二百五十里得一百二十五里爲實次置甲日行三百里減乙行二百五十里餘五十里爲差法除實得二日五十刻爲甲果及乙數以乘甲行三百里得七百五十爲甲及乙里數次置丙旣行二日乘丙日行二百里得四百里爲實次置乙行二百五十里減丙行二百里餘五十里爲差法除實得八日爲乙及丙日數以乘乙行二百五十里得二千里爲乙行及丙之里數已上爲先欲知果及數次列甲乙丙三名日行求總等得五十先約甲丙存乙得甲六乙二百五十丙四以甲六丙四求等得二以二約甲爲三復以二因丙爲八次將乙二百五十與丙八相約得二乃約乙爲一百二十五復以二因丙爲十六定得甲三乙一百二十五丙十六爲定母
