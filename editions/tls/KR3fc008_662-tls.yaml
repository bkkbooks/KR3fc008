body:
  text: 十五右上得五十六相減餘九爲法以中四五相乘得二十爲寄於中先以左下六千八百四互乘右上五十六得三十八萬一千二十四卻以右下適足之空乘左上六十五亦爲空乃去之只以右上三十八萬一千二十四斤爲絮實只以左下六千八百四乘寄二十人得一十三萬六千八十爲兵實二實皆如法九而一其絮得四萬二千三百三十六斤其兵得一萬五千一百二十人合問
