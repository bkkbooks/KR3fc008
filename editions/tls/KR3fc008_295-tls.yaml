body:
  text: 得二萬四千六百四十九爲峻定隅開同體連枝平方得峻岸至水際斜長驗同體格乃以定隅二萬四千六百四十九爲實先以一爲隅開平方得一百五十七爲同體法次以峻定實四千一百九十一萬二千六百七十六尺爲實亦以一爲隅開平方得六千四百七十四尺爲同體實實如同體法一百五十七而一得四十一尺不盡三十七與法一百五十七求等得一俱以一各約之其法與餘只得此數乃直命之得四丈一尺一百五十七分尺之三十七爲涸岸斜長至水際求退水㴱置岸高五尺自乘得二十五爲岸高羃乘峻定實四千一百九十一萬二千六百七十六尺得一十億四千七百八十一萬六千九百爲㴱泛以去岸一十二尺自乘得一百四十四尺爲去岸羃併岸高羃二十五得一百六十九以乘峻定隅二萬四千六百四十九得四百一十六萬五千六百八十一爲隅泛置二泛求等得一百六十九俱約二泛得六百二十萬一百爲定實得二萬四千六百四十九爲㴱定隅開連枝平方得水退立㴱驗同體格乃以㴱定隅二萬四千六百四十九爲實先以一爲隅開平方得一百五十七爲同體法次以㴱定實六百二十萬一百爲實亦以一爲隅開平方得二千四百九十爲同體實實如法一百五十七而一得一十五尺不盡一百三十五與法求等得一俱以一各約法
