body:
  text: 下等上田苗米六升一合五勺二抄八撮和買三寸二分七毫六絲八忽夏稅二寸三分四釐七毫八忽中田苗米四升六合一勺四抄六撮和買二寸四分五毫七絲六忽夏稅一寸七分六釐三絲一忽下田苗米三升七勺六抄四撮和買一寸六分三毫八絲四忽夏稅一寸一分七釐三毫五絲四忽己鄉上等上田苗米二斗八升二合一勺五抄一撮和買一尺四寸七分九毫六絲夏稅一尺七分六釐三毫中田苗米二斗五升三合九勺三抄五撮九圭和買一尺三寸二分三釐八毫六絲四忽夏稅九寸六分八釐六毫七絲下田苗米二斗二升五合七勺二抄八圭和買一尺一寸七分六釐七毫六絲八忽夏稅八寸六分一釐四絲中等上田苗米一斗九升七合五勺五撮七圭和買一尺二分九釐六毫七絲二忽夏稅七寸五分三釐四毫一絲中田苗米一斗六升九合二勺九抄六圭
