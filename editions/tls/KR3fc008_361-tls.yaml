body:
  text: 和五寸九分稅四寸三分中田苗八升四合六勺和四寸四分稅三寸二分下田苗五升六合四勺和二寸九分稅二寸二分甲鄉苗米一萬九千五百五十石二斗四升八合三勺和買一萬一百九十二丈二尺六寸五分六釐夏稅七千四百五十七丈六尺八寸九分八釐乙鄉苗米一萬七千七百七十二石九斗五升三合和買九千二百六十五丈六尺九寸六分夏稅六千七百七十九丈七尺一寸八分丙鄉苗米一萬七千七百七十二石九斗五升三合和買九千二百六十五丈六尺九寸六分夏稅六千七百七十九丈七尺一寸八分丁鄉苗米一萬六千一百五十七石二斗三升和買八千四百二十三丈三尺六寸夏稅六千一百六十三丈三尺八寸戊鄉苗米一萬六千一百五十七石二斗三升和買八千四百二十三丈三尺六寸夏稅六千一百六十三丈三尺八寸己鄉苗米一萬六千一百五十七石二斗三升和買八千四百二十三丈三尺六寸
