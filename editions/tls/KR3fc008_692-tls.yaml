body:
  text: 乃視卜圖副行積少次行積多卽以副行求減次行皆是同名相減之旣畢仍置定圖副行數其次行乃得積二千八百四十八萬二千二百貫銀得五十六萬九千六百四十四兩列爲宮圖騐宮圖次行下只有銀五十六萬九千六百四十四兩獨一數以爲法以次積二千八百四十八萬二千二百貫爲實實如法而一得五十貫爲銀一兩價而成干圖
