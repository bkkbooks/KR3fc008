body:
  text: 魯郡秦九韶囤積量容問有圓囤米二十五個內有大囤一十二個上徑一丈下徑九尺高一丈二尺小囤一十三個上徑九尺下徑八尺高一丈今出租斗一隻口方九寸六分底方七寸正㴱四寸並裏明準尺先令準數造五斗方斛及圓斛各二隻須令二斛口徑正㴱大小不同各得多少及囤積米幾何荅曰方斛一隻口方六寸四分底方一尺二寸㴱一尺五寸九分二釐又一隻口方一尺底方一尺二寸㴱一尺一寸四分五釐圓斛一隻口徑一尺二寸七分底徑一尺二寸㴱一尺一寸一分四釐又一隻口徑一尺三寸底徑一尺二寸㴱一尺一寸八分五釐囤米計八千六十七石四升七合四勺一抄八撮術曰以商功及少廣求之置出斗上下方相乘之又各自乘併之乘㴱又以五斗乘之爲積于上求方斛先自如意立數爲斛㴱又如意立數爲底方置㴱爲從隅以底方乘隅爲從方又以底乘從方爲減率以減上積餘爲實開連枝平方得方斛口方不盡以所得
