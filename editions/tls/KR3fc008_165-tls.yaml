body:
  text: 置𠔏積內減合伏三度九十分餘六度一十五分一十二秒二十三小分五十四小秒爲泛次以交段差二分二十秒七十小分減泛餘六度一十二分九十一秒五十三小分五十四小秒爲晨疾初段常度注厯乃收八秒五十六小分四十六小秒爲全分常定度求晨疾初段初行率以日差一十一秒二十三小分六十六小秒減合伏末行率二十二分七秒餘二十一分九十六秒爲晨疾初段初行率得泛收之爲定者也
