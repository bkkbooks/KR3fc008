body:
  text: 之七百六十四合問列問數各通爲寸口徑得一十六寸㴱一十七寸底徑一十二寸籮中雪高一十寸乃以底徑減口徑餘四寸乘雪㴱一十寸得四十寸以半得數二十寸自乘得四百寸爲隅以籮㴱一十七寸自乘得二百八十九寸爲籮㴱羃次置雪㴱一十寸自乘得一百爲雪㴱羃以雪㴱羃一百寸乘籮㴱羃二百八十九寸得二萬八千九百寸併隅四百寸得二萬九千三百寸爲上
