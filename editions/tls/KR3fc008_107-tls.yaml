body:
  text: 旣照甎次序列用數於右行乃騐問題所謂大方甎砌廣多六寸小方多二寸城甎長多三寸城甎闊多三寸厚多五分六門長多三寸闊多三寸厚多一寸對本用列左行各對乘之具圖如后兩行乘畢金得一百一十八萬八千絲得一十五萬六千石得一百六十萬八千七百五十匏得八十五萬八千革得二十萬五千九百二十竹得五萬一千四百八十土亦得五萬一千四百八十木得一十七萬一千六百乃併前八位數𠔏得四百二十九萬一千二百三十分爲總滿衍母八萬五千八百去之不滿一千二百三十分約之爲一丈二尺三寸爲基元廣數乃求其㴱騐問題大方砌少六寸小方砌少三寸城甎長砌少一寸闊砌少一寸厚砌多一寸六門長砌多一寸六門闊砌多一寸厚砌多一寸列爲中行次置諸甎元數列爲左行課減之具圖如后
