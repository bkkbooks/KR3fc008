body:
  text: 次以人立圓邊六尺乘內周人一千三百四十得八千四十尺收作八百四丈爲內周尺數倍衰四十八得九十六乘圓邊六尺得五百七十六尺爲泛以泛五百七十六尺併內周八千四十尺得八千六百一十六尺爲外周尺以外周尺八千六百一十六爲實如圓邊六尺而一得一千四百三十六人爲外周人數
