body:
  text: 魯郡秦九韶折解輕齎問有甲乙丙丁四郡各合起上供銀絹甲郡銀三千二百兩毎兩二貫二百文足絹六萬四千疋毎疋二貫文足去京一千里毎擔一里傭錢六文足其時舊會毎貫五十四文足乙郡銀二千七百兩毎兩二貫三百文足絹四萬九千二百疋毎疋二貫四百二十文足去京九百八十里毎擔一里傭錢四文二分舊會價五十九文足丙郡銀四千兩毎兩新會九貫三百文絹七萬三千六百疋毎疋新會一十貫三百文去京二千里毎擔一里傭銀八十文舊會丁郡銀二千二百兩毎兩五十一貫文舊會絹三萬一千三十五疋毎疋五十八貫文舊會去京一千五百里毎擔一里傭錢一百文舊會諸郡銀毎五百兩絹毎六十疋新會毎五千貫爲擔欲並折新會均作三限起解求各郡毎限及本色元理折解實用寬餘傭錢各新會幾何荅曰甲郡合解五十萬一百四十八貫一百四十八文初限一十六萬六千七百一十六貫四十九文次限一十六萬六千七百一十六貫四十九文末限一十六萬六千七百一十六貫五十文傭錢元理二萬三千八百四十五貫九百二十五文二十七分文之二十五
