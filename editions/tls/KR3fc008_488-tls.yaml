body:
  text: 四十四寸併以加上𠔏得二百六十一寸七分六釐爲法以除前積四千一百六十七寸二分得一尺五寸九分二釐爲方斛㴱其積不及一釐九毫二絲收爲閏又累增至一十寸爲口方仍以一十二寸爲底方乃以口方一十寸乘底方一十二寸得一百二十寸於上又以口方自乘得一百寸加上又以底方自乘得一百四十四寸又加上𠔏得三百六十四寸爲法亦除前實積四千一百六十七寸二分得一十一寸四分五釐爲方斛㴱其積不及六分收爲閏此是求出兩等斛數在人擇而用之求圓斛置四數以因前積四千一百六十七寸二分得一萬六千六百六十八寸八分爲寄如意立一尺二寸爲圓斛㴱又如意立一尺爲底徑以三因㴱得三十六寸爲從隅以底一十寸乘隅得三百六十寸爲從方又以底一十寸乘從方得三千六百寸爲減率以減寄一萬六千六百六十八寸八分餘一萬三千六十八寸八分爲實開連枝平方得一尺四寸七分爲基其實不及二寸四分四釐收爲閏次以元立底徑一尺併基一尺四寸七分得二尺四寸七分只減七分爲差餘二尺四寸以半之得一尺二寸爲底徑以差七分併底徑得一尺二寸七分爲口徑始以口徑一尺二寸七分乘底徑一尺二寸得一百五十二寸四分於上次以口徑自乘得
  hash: sha256:f6c17b99ac6f7ab66ba32aa1f82b66628b922ef9bdf16f0838bb1379d6c7c2bb
