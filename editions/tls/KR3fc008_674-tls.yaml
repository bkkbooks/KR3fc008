body:
  text: 貫沈得三百一十八瑇得二百五斤中行求得一十約之中積得五十四萬三千九百貫沈得七百二十四瑇得一千八百一十五今又欲去中左行之瑇瑁乃以中行一千八百一十五互乘右行右積得二億四千一十二萬四千五百貫右沈得五十七萬七千一百七十右瑇得三十七萬二千七十五次以干圖右瑇二百五互乘中行中積得一億一千一百四十九萬九千五百貫中沈得一十四萬八千四百二十中瑇得三十七萬二千七十五今騐宮圖右積多中積少乃以中行直減右行畢仍置干圖中行數今騐干圖右行段數只有沈香四十二萬八千七百五
