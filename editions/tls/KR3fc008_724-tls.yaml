body:
  text: 乘工藥錢三貫得一萬五千貫又加寄𠔏得二百二萬八千七百五十貫爲價實二實併如法四千二十七兩五錢而一其色得一十分其價毎兩得五百三貫七百二十四文不盡一貫五百九十與法求等得七十五俱約之爲五百三十七分文之二百一十二
