body:
  text: 先以丙乙求等得一不約次以丙甲求等得三於術約奇不約偶蓋以等三約三因得一爲奇慮無衍數乃使徑先約甲三百爲一百復以等三乘丙三爲九旣丙九爲奇甲百爲偶此卽是約奇弗約偶次以乙四與甲百求等得四以四約一百得二十五爲甲復以四乘乙四得一十六爲乙各爲定母以定母相乘得三千六百爲衍母以各定約衍母爲衍數甲得一百四十四乙得二百二十五丙得四百衍數各滿定母去之不滿爲奇數甲得一十九乙得一丙得四以各奇數與定母用大衍入之各得乘數甲得四乙得一丙得七各爲乘率列右行
  hash: sha256:6e91c9abf1fb5637bba2bd02ba2c49df6ab1a75eed172b65b954f6734d46f212
