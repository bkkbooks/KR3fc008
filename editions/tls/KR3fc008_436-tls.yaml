body:
  text: 一萬六千一百九十四已上並爲定力副併八處定力得五千六百九十二萬二千五百五十七爲法以合起一萬二千夫遍乘定力訖上得一千三百八十三億二千五百九十六萬八千爲實中得一千七百二十八億七千一百七十四萬八千爲中實下得二千三百九十四億五百二十五萬六千爲下實仁得四百五億八千四百四十五萬六千爲仁實義得三百三十五億四千二百四十九萬六千爲義實禮得三百六億四千四百二十四萬四千爲禮實智得二百五十一億二百一十八萬八千爲智實信得二十五億九千四百三十二萬八千爲信實已上八實皆如前法而一上縣得二千四百三十夫不盡四百一十五萬四千四百九十輩歸中縣下縣中縣得三千三十六夫不盡五千四百八十六萬四千九百四十八輩爲一夫下縣得四千二百五夫不盡四千五百九十萬三千八百一十五輩爲一夫仁鄕得七百一十二夫不盡五千五百五十九萬五千四百一十六輩爲一夫義鄉得五百八十九夫不盡一千五百一十萬九千九百二十七輩歸仁鄕禮鄕得五百三十八夫不盡一千九百九十萬八千三百三十四輩歸智鄕信鄕智鄕得四百四十夫不盡五千六百二十六萬二千九百二十輩爲一夫信鄕得四十五夫不盡三千二百八十一萬二千九百三十五輩爲一夫合問
