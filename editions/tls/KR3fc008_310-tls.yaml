body:
  text: 術曰以勾股重差求之置城東南隅景入表減表間餘乘表間爲城去木實以西行步減城東北隅景入表餘爲法得城去木數以城東北隅景入表減表間餘乘表間爲廣實實如前法而一得城廣數草曰以西行一十步減東北隅入表一十五步餘五步爲法以城東南隅景入表四十八步七分半減表間一百六十步餘一百一十一步二分半乘表間一百六十步得一萬七千八百爲城去木實以法五步除之得三千五百六十步以里法三百六十約之得九里三百二十步爲城去北株木里及步數次置城東北隅景入表一十五步減表間一百六十餘一百四十五步乘表間一百六十得二萬三千二百爲城廣實以前法五步除之得四千六百四十步以里法三百六十約之爲一十二里三百二十步卽城方廣里數及步數合問遙度圓城問有圓城不知周徑四門中開北外三里有喬木出南門便折東行九里乃見木欲知城周徑各幾何圓用古法荅曰徑九里周二十七里術曰以勾股差率求之一爲從隅伍因北外里爲從七廉置北里羃八因爲從五廉以北里羃爲正率以東行羃爲負率二率差四因乘北里爲益從三廉倍負率乘五
