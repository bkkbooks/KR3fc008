body:
  text: 力一十八萬一千八百三十置義鄉一十一萬九千四百七十二貫六百文如七百九十五里而一得力一十五萬二百八十置禮鄉一十萬八千四百六十三貫五十文如七百九十而一得力一十三萬七千二百九十五置智鄉八萬四千二百三十六貫二百八十五文如七百四十九里而一得力一十一萬二千四百六十五置信鄉九千三百四十五貫一百六十文如八百四里而一得力一萬一千六百二十三不盡二百六十八文與法求等得二百六十八約爲三分之一其下縣信鄉二處帶母子者各以母互徧乘八處所得畢二處各內本子上得五千七百六十三萬五千八百二十中得七千二百二萬九千八百九十五下得九千九百七十五萬二千一百九十仁得一千六百九十一萬一百九十義得一千三百九十七萬六千四十禮得一千二百七十六萬八千四百三十五智得一千四十五萬九千二百四十五信得一百八萬九百七十已上爲三縣五鄉變力率可約者復求等約之求得五故俱以五約之上得一千一百五十二萬七千一百六十四中得一千四百四十萬五千九百七十九下得一千九百九十五萬四百三十八仁得三百三十八萬二千三十八義得二百七十九萬五千二百八禮得二百五十五萬三千六百八十七智得二百九萬一千八百四十九信得二十
