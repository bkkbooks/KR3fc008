body:
  text: 荅曰𠔏失米九石五斗六升三合甲米三石一斗九升二合乙米三石一斗七升九合丙米三石一斗九升二合術曰以大衍求之列三器所容爲元數連環求等約爲定母以相乘爲衍母以定各約衍母得衍數各滿定母去之得奇以奇定用大衍求得乘率以乘衍數得用數次以各剩米乘用併之爲總滿衍母去之不滿爲毎籮米各以剩米減之餘爲甲乙丙盜米併之爲𠔏失米草曰列三器所容一升九合一升七合一升二合爲元數連環求等皆得一不約便以元數相乘得三千八百七十六爲衍母以各元數爲定母以定約衍母得衍數甲得二百四乙得二百二十八丙得三百二十三各爲衍數列左行以三定母甲一十九乙一十七丙一十二列右行具圖如后各滿定母去衍數得奇數甲得一十四乙得七丙得一
