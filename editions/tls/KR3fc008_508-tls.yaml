body:
  text: 總所三千六百六十四貫八百文運司九十一貫六百二十文術曰以衰分求之置諸元率可約約之副併爲法以催到錢乘未併者各爲實實如法而一草曰列戶部九十六萬五千四百二十一貫總所六十四萬三千六百一十四貫運司一萬六千九十貫三百五十文各爲元率今元率可約求等得一萬六千九十貫三百五十爲等數俱約之戶部得六十總所得四十運司得一各爲率副併得一百一爲法次置催到九千二百五十三貫六百二十文乘未併數六十四十及一畢得五十五萬五千二百一十七貫二百文爲戶部之實三十七萬一百四十四貫八百以運司率乘得九千二百五十三貫六百二十文爲運司之實三實皆如法一百一而一其戶部得五千四百九十七貫二百文總所得三千六百六十四貫八百文運司得九十一貫六百二十各爲候解錢累收庫本問有庫本錢五十萬貫月息六釐半令今掌事毎月帶本納息𠔏還一十萬欲知幾何月而納足幷末後畸錢多少荅曰本息納足𠔏七個月末後一月錢二萬四千七百六貫二百七十九文三分四釐八毫四絲六忽七微七沙三莽一輕二淸五
