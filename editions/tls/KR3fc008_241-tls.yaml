body:
  text: 十四又元長一百五十乘之得三億六千九萬六千六百爲乙從方又以分母五萬八千七百九通𠔏實三十二萬二千五百得一百八十九億三千三百六十五萬二千五百爲乙實又以分母通𠔏隅九得五十二萬八千三百八十一爲乙從隅開連枝平方更不立草得四十九步不盡二千二十七萬六千三百一十九隅併方得𠔏四億一千二百四十萬六千三百九爲母與不盡求等單一不可約乃定爲四十九步四億一千二百四十萬六千三百九分步之二千二十七萬六千三百一十九爲乙截長以乙長母通全步內子得二百二億二千八百一十八萬五千四百六十爲法以乙長步下母四億一千二百四十萬六千三百九乘通率四千三百得一萬七千七百三十三億四千七百一十二萬八千七百爲實以法除之得八十七步不盡一百三十四億九千四百九十九萬三千六百八十與法求等得一百四十俱約之爲八十七步一億四千四百四十八萬七千三十九分步之九千六百三十九萬二千八百一十二爲得數乃以乙小廣母五萬八千七百九乘得數子九千六百三十九萬二千八百一十二得五萬六千五百九十一億二千五百五十九萬九千七百八爲泛卻以得數母一億四千四百四十八萬七千三十九分乘乙小廣子五萬二千二百八十四得七萬五千五百四十三
