body:
  text: 錐行置之右列位稍多甎名相互今假八音爲號位先以最少者自木二十與革二十五求等得五乃反約木二十爲四木四與土五十求等得二以約五十爲二十五木四與𠣻六十求等得四約六十爲一十五木四與百求等得四約一百爲二十五木四與絲一百一十求等得二約一百一十爲五十五木四與石一百二十求等得四反約木四爲一以木一與金一百三十求等得一不約爲木與諸數求等約訖爲一變得數具圖如后次以革二十五與土五十求等得二十五約五十爲二以革二十五與𠣻一十五求等得五約𠣻一十五爲三以革二十五與竹二十五求等得二十五約竹二十五爲一又以革二十五與絲五十五求等得五約絲五十五得一十一以革二十五與石一百二十求等得五約一百二十爲二十四以革二十五與金一百三十求等得五約金一百三十得二十六革與諸數徧約訖爲二變具圖如后
  hash: sha256:68a71b5f1da4a8c537229760a4b289edf1e39a25b8f6d5711d279c9c689901e6
