body:
  text: 各以大衍入之氣乘率得四百七十三朔乘率得五紀乘率得一十七萬二千七百一十七對左行衍數以右行乘率對乘左行衍數氣泛得二十億二千七百四十六萬七千二百朔泛得五億四千九百三十三萬六千紀泛得一十五億九千八百一十五萬四百一具圖如后
