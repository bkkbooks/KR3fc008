body:
  text: 或平或側只用一色甎砌須要適足匠以甎量地計料稱用大方料廣多六寸㴱少六寸用小方廣多二寸㴱少三寸用城甎長廣多三寸㴱少一寸以闊㴱少一寸廣多三寸以厚廣多五分㴱多一寸用六門甎長廣多三寸㴱多一寸以闊廣多三寸㴱多一寸以厚廣多一寸㴱多一寸皆不匼匝未免修破甎料裨補其四色甎大方方一尺三寸小方方一尺一寸城甎長一尺二寸闊六寸厚二寸五分六門長一尺闊五寸厚二寸欲知基㴱廣幾何荅曰㴱三丈七尺一寸廣一丈二尺三寸術曰以大衍求之置甎方長闊厚爲元數以小者爲單起一先求總等存一位約眾位列位多者隨意立號乃爲元數連環求等約爲定母以定相乘爲衍母各定約衍母得衍數滿定去之得奇奇定大衍得乘率以乘衍數得用數次置廣㴱多少數多者乘用少者減元數餘以乘用併爲總滿衍母去之不滿得廣㴱草曰置四甎方長闊厚係八數城甎厚有分爲小者皆通之爲單大方得一百三十分小方得一百一十分城甎長得一百二十分闊得六十分厚得二十五分六門甎長得一百分闊得五十分厚得二十分
