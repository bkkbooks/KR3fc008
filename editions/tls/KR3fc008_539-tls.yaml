body:
  text: 術曰以商功求之招法入之置層高尺數乘面闊及長爲初率次以差闊尺數乘高又乘長爲次率卻以石版長闊厚相乘爲法以除二率各得石版爲上積及次積置㴱以層高尺數約之得層數對二積列之一行各添一撥天地數各以累乘對約之得乘率以對上次積併之
