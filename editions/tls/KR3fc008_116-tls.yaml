body:
  text: 各以奇定用大衍求一各得乘率甲得一十五乙得五丙得一十一各爲乘率列右行對寄左行衍數具圖如后以兩行對乘之得用數甲得三千六十乙得一千一百四十丙得三千五百五十三列右行具圖如后旣得用數始騐問題三籮剩米列左行對三人所用以兩行對乘之甲得三千六十乙得一萬五千九百六十丙得三千五百五十三
