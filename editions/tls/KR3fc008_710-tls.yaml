body:
  text: 術曰以粟米換易求之置元易率本色對列如雁翅以多一事者相乘爲實以少一事者相乘爲法除之各得或問數不干其率者不置草曰置四率六數列六位率如雁翅皆化爲合先將菽一十四石四斗化作一萬四千四百合乃對前二句率數四位如雁翅至欲易油麻止𠔏五事爲上圖次將小麥二十一石六斗化作二萬一千六百合乃對後兩句率四位如雁翅至欲易粳米止𠔏五事爲下圖其上圖以菽一萬四千四百合乘麥二十得二十八萬八千又乘油麻八合得二百三十萬四千合爲油麻實次以菽三十合乘麥一十五得四百五十合爲法除之得五千一百二十合展爲五石一斗二升爲油麻其
