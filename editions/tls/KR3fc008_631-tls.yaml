body:
  text: 置元內周八千四十尺爲實以後立尺七尺九寸一分約之得一千一十六爲內周人數不盡三尺四寸四分爲寬地本術所求內外周之人數旣定不拘人奇出奇入皆以六人爲重差或累差加減各得諸重圍數或併九重人課總軍所存望知敵眾問敵爲圓營在水北平沙不知人數諜稱彼營布卒占地
