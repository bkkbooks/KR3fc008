body:
  text: 爲隅開平方得一十寸四分展爲一尺四分爲平地雪厚合問竹器騐雪問以圓竹籮騐雪籮口徑一尺六寸㴱一尺七寸底徑一尺二寸雪降其中高一尺籮體通風受雪多則平地少欲知平地雪高幾何荅曰平地雪厚九寸三千四百三十九分寸之七百六十四術曰口徑減底徑餘乘雪㴱半之自乘爲隅以籮㴱羃乘雪㴱羃併隅又乘雪㴱冪爲實隅實可約約之開連枝三乘方得平地雪厚草曰列問數各通爲寸置口徑一十六寸減底徑一十二寸餘四寸乘雪㴱一十寸得四十寸以半之得二十寸自乘得四百寸爲隅以籮㴱一十七寸自乘得二百八十九寸爲籮㴱羃次置雪㴱一十寸自乘得一百寸爲雪㴱羃以乘籮㴱冪數加隅又乘㴱羃得二百九十三萬寸爲實隅實求等得四百俱約之得七千三百二十五爲實得一爲隅開三乘方步法不可超乃約實置商九寸與隅一相生得九爲下廉又與商相生得八十一寸爲上廉又與商相生得七百二十九爲從方乃命上商除實不盡七百六十四已而復以商生隅入二廉至方陸續又生畢以方廉隅𠔏併之得三千四百三十九分寸之七百六十四爲平地雪厚九寸三千四百三十九分寸
