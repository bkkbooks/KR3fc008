body:
  text: 和買一尺七寸八分九釐三毫夏稅一尺三寸九釐二毫三絲中田苗米三斗八合八勺九抄二撮六圭和買一尺六寸一分三毫七絲夏稅一尺一寸七分八釐三毫七忽下田苗米二斗七升四合五勺七抄一撮二圭和買一尺四寸三分一釐四毫四絲夏稅一尺四分七釐三毫八絲四忽中等上田苗米二斗四升二勺四抄九撮八圭和買一尺二寸五分二釐五毫一絲夏稅九寸一分六釐四毫六絲一忽中田苗米二斗五合九勺二抄八撮四圭和買一尺七分三釐五毫八絲夏稅七寸八分五釐五毫三絲八忽下田苗米一斗七升一合六勺七撮和買八寸九分四釐六毫五絲夏稅六寸五分四釐六毫一絲五忽下等上田苗米一斗三升七合二勺八抄五撮六圭和買七寸一分五釐七毫二絲夏稅五寸二分三釐六毫九絲二忽中田苗米一斗二合九勺六抄四撮二圭和買五寸三分六釐七毫九絲
