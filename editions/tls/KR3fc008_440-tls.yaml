body:
  text: 八等一戶米八百石三十四戶計二萬七千二百石九等一戶米二百石四十五戶計九千石術曰以衰分求之置上下戶米減餘爲實列等數減一餘爲法除之得抛差石數以差累減上等米各得諸等米以各等戶數乘之併之爲總數草曰置上等戶米五千石減下等戶二百戶餘四千八百石爲實以九等減一餘八爲法除實得六百石爲毎等抛差用減上等餘四千四百石爲二等米又減六百得三千八百石爲三等米又減六百得三千二百石爲四等米又減六百得二千六百石爲五等米又減六百得二千石爲六等米又減六百得一千四百石爲七等米又減六百得八百石爲八等米又減六百得二百石爲九等米又各乘戶數併之得總認米石數二十三萬七千六百石數書九章卷第十
