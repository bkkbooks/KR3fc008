body:
  text: 草曰置出租斗口方九寸六分與底方七寸相乘得六十七寸二分於上又以口方九寸六分自乘之得九十二寸一分六釐加上又以底方七寸自乘得四十九寸又加上𠔏得二百八寸三分六釐乘㴱四寸得八百三十三寸四分四釐又以五斗乘之得四千一百六十七寸二分爲三段斛積於上求方斛如意立一尺六寸爲斛㴱又如意立一尺二寸爲斛底以㴱一十六寸爲從隅以底一十二寸乘隅得一百九十二寸爲從方又以底一十二寸乘從方一百九十二寸得二千三百四寸爲減積以減上積四千一百六十七寸二分餘一千八百六十三寸二分爲實開連枝平方得六寸三分五釐爲基其積不及一寸一分六釐係有虧數其基數爲未可用須合損益基數今益作六寸四分爲口方以元立一尺二寸爲底方以口方乘底方得七十六寸八分於上又以口方六寸四分自乘得四十寸九分六釐又以底方一十二寸自乘得一百
