body:
  text: 石四斗爲今減數乃以官種減租五千一百二十石減官種租二萬五千六百餘二萬四百八十石爲合催次以私種減五千五百九十四石四斗減私種租一萬三千九百八十六石餘八千三百九十一石六斗亦是合催租乃以二等合催租分列之先以毎歲三分之一以子一減分母三得二乃以一及二皆爲子各乘合催租其官種者一分租得二萬四百八十石二分租得四萬九百六十石其私種者一分租得八千三百九十一石六斗二分租得一萬六千七百八十三石二斗並爲實此四實並如母三而一其官種一分折得六千八百二十六石六斗六升零三分升之二及二分正色穀得一萬三千六百五十三石三斗三升三分升之一其私種一分折色得二千七百九十七石二斗二分正色穀得五千五百九十四石四斗次置官私種各一分折色數各二位及用夏折四分大六分小對乘之通係四位乃併四六得一十分約之是並退一位其官種四分大麥者置折穀六千八百二十六石六斗六升三分升之二通分內子得二萬四百八十列二位上位以四分折之得八千一百九十二石爲大麥實下位以六分折之得一萬二千二百八十八石爲小麥實次置私種折穀二千七百九十七石二斗列二位上位以四分折之得一千一百一十八石八斗八升爲大麥實下位以六分折
