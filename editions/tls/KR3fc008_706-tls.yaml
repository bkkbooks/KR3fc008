body:
  text: 甲得五萬二千五百七十六合乙得三萬二千二百二十四合丙得五萬二千三百六十四合丁得四萬二千六百一十二合各爲牙實皆以總法八百四十八除之甲合得牙六十二合乙合得牙三十八合丙合得牙六十一合不盡六百三十六求等得二百一十二約之得四分合之三丁合得牙五十合不盡二百一十二求等得二百一十二約之得四分合之一互易推本問出度牒差人營運毎三道易鹽一十三袋鹽二袋易布八十四疋布一十五疋易絹三疋半絹六疋易銀七兩二錢今趁到銀九千一百七十二兩八錢欲知元關度牒道數幾何荅曰度牒一百八十道術曰以粟米互乘易法求之列各數以本色相對如雁翅以多一事者相乘爲實以少一事者相乘爲法除之
  hash: sha256:1ca815032d1f671981fc55a3e7d7828e53ccf053499ba95dd6ba47b2a7c7a512
