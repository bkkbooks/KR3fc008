body:
  text: 以右行一二三四互乘左行異子一弗乘對位本子各得衍數乃併左行衍數四位𠔏計五十故易曰大衍之數五十算理不可以此五十爲用蓋分之爲二則左右手之數奇偶不同見陰陽之伏數必須復求用數先名此曰衍數以爲限率遂乃復以一二三四之元數求等數約定按前術以兩兩連環求等約之先以一與二求等一與三求等一與四求等皆得一各約奇弗約偶數不變次以二與三求等亦得一約奇弗約偶數亦不變及以二與四求等乃得二此二只約副數二變爲一而弗約四次以三與四求等亦得一約奇亦不變所得一一三四各爲定數母列右行仍各立天元一爲子列左行
