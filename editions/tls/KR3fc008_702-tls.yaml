body:
  text: 爲合半之得二百一十二合亦遍乘列衰爲牙實甲得一百二十六萬一千八百二十四乙得七十七萬三千三百七十六丙得一百二十五萬六千七百三十六丁得一百二萬二千六百八十八各爲沈香實以總法八百四十八除之甲得沈香一千四百八十八兩乙得沈香九百一十二兩丙得沈香一千四百八十二兩丁得沈香一千二百六兩甲得二百五十八萬六千六百四十乙得一百五十八萬五千三百六十丙得二百五十七萬六千二百一十丁得二百九萬六千四百三十各爲椒實以總法八百四十八除之甲得三千五十包不盡二百四十包以包率四十斤乘之得九千六百斤又以法除之得一十一
  hash: sha256:c65cebbffbf25f031c263a20266e43a62963d9419944ff8969cc7a8901b9315e
