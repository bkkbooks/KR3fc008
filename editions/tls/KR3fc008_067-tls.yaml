body:
  text: 十爲丙庫陌九爲丁庫陌八爲戊庫陌七爲己庫陌六爲庚庫陌得諸庫元陌以連環求等約訖甲得一乙得一十一丙得五丁得九戊得八己得七庚得一各爲定母立各一爲子先以諸定相乘得二萬七千七百二十爲衍母次以諸定互乘諸子甲得二萬七千七百二十乙得二千五百二十丙得五千五百四十四丁得三千八十戊得三千四百六十五己得三千九百六十庚得二萬七千七百二十各爲衍數次騐諸衍數有同衍母者皆去之爲無衍數次各滿定
