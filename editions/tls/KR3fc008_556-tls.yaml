body:
  text: 諸隅高以北道高減臺高餘爲上停高以南道高減北道高餘爲中停高命南道高爲下停高以履寸除諸高得級數以上長減下長餘半之爲句以勾乘南道高爲實如臺高而一得底率以底率減下長餘爲底股以外道級數約底股得外道踏縱又以底數減底股餘爲中股以勾乘中停高爲實如臺高而一得中率以率減中股餘爲上股以西道級除上股得西道踏縱以勾乘上停高爲實如臺高而一得上率以上率併中率𠔏減上股餘爲實如裏道級而一得裏道踏縱次以道闊併下長爲補以南北道高併臺高乘補爲需次上廣減下廣餘爲址以址乘南道高爲實以臺高除之得數減下廣餘爲南道長以南道長併下廣乘南道高加需又以址乘北道高爲實以臺高除之得數減下廣餘爲北道長以北道長併下廣乘北道高又加需𠔏乘半道闊得數併泛爲𠔏率以基腳層數乘石版厚爲基高次倍道闊併下闊乘下長爲基率次下以下廣乘下袤減基率餘乘基高爲石率以石率減𠔏率餘爲甎率以甎積法除甎率得甎數以石版積法除石率得石版數草曰倍上袤七丈得一十四加下袤一十七丈得三十一乘上廣五丈得一百五十五丈爲寄次倍下袤得三十四丈加上袤七丈得四十一乘下廣一十五丈得六百一十五併寄得七百七十乘高一十二丈得九千二百
