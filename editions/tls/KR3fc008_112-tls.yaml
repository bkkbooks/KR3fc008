body:
  text: 千絲得六十二萬四千石得五百八十九萬八千七百五十匏得一百四十三萬革得四十一萬一千八百四十竹得一萬七千一百六十土得一萬七千一百六十木得一十七萬一千六百具圖如后併八位得九百九十五萬六千五百一十分爲總滿衍母八萬五千八百去之不滿三千七百一十分展爲三丈七尺一寸爲基地㴱餘米推數問有米鋪訴被盜去米一般三籮皆適滿不記細數今左壁籮剩一合中間籮剩一升四合右壁籮剩一合後獲賊係甲乙丙三名甲稱當夜摸得馬杓在左壁籮滿舀入布袋乙稱踢著木履在中籮舀入袋丙稱摸得漆椀在右邊籮舀入袋將歸食用日久不知數索到三器馬杓滿容一升九合木履容一升七合漆椀容一升二合欲知所失米數計贓結斷三盜各幾何
