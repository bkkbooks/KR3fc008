body:
  text: 均貨推本問有海舶赴務抽畢除納主家貨物外有沈香五千八十八兩胡椒一萬四百三十包包四十斤象牙二百一十二合大小爲合斤兩俱等係甲乙丙丁四人合本博到緣昨來湊本互有假借甲分到官供稱甲本金二百兩鹽四袋鈔一十道乙本銀八百兩鹽三袋鈔八十八道丙本銀一千六百七十兩度牒一十五道丁本度牒五十二道金五十八兩八銖已上𠔏估直四十二萬四千貫甲借乙鈔乙借丙銀丙借丁度牒丁借甲金今合撥各借物歸元主名下爲率均分上件貨物欲知金銀袋鹽度牒元價及四人各合得香椒牙幾何荅曰甲金毎兩四百八十貫文本一十二萬四千貫文合得沈香一千四百八十八兩胡椒三千五十包一十一斤五兩五十三分兩之七象牙六十二合乙鹽毎袋二百五十貫文本七萬六千貫文合得沈香九百一十二兩胡椒一千八百六十九包二十一斤二兩五十三分兩之六象牙三十八合
