body:
  text: 四八甎三十六萬片石灰二十二萬八千斤紙觔六千斤中板瓦四十五萬片丁環一千二百箇一尺釘四百八十箇八寸釘一萬六千二百箇五寸釘六千箇四寸釘三千箇用工二萬三千七百六十人術曰以商功求之置牆高乘長得寸爲實以甎闊乘厚爲法除之得用甎及用灰以處數並乘諸工料得總用工料草曰置牆高四尺通爲四十寸置長三丈通爲三百寸相乘得一萬二千寸爲實以甎闊六寸乘厚二寸五分得一十五寸爲法除之得八百片爲牆甎又爲灰并四八甎灰三千斤𠔏灰三千八百斤乃以六十處遍乘總用工料臥牛木搭腦木看濠木柱副濠柱掛甲柱虎蹲仰板木平板木串掛枋木四八甎城甎石灰紙觔中板瓦一尺釘八寸釘五寸釘四寸釘丁環工數得各項總數在前計造石壩問創石壩一座長三十丈水㴱四丈二尺令面闊三丈石版毎片長五尺闊二尺厚五寸用灰一十斤毎層高二尺差闊一尺石匠毎工九片般扛五片用工四人兼工般灰兼用毎工一百一十斤火頭毎名管六十人部押毎名管一百二十人所用石須依原段不許鑿動欲知壩下闊及
