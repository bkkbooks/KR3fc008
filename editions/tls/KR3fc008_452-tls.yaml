body:
  text: 一萬九千二百貫乙得一萬一千一百一十三貫二百文丙得六十四萬貫舊丁得三十九萬貫舊皆銀傭置於右行次置甲乙丙丁毎擔銀率五百兩爲法徧除右行甲得三十八貫四百足乙得二十二貫二百二十六文四分足丙得一千二百八十貫舊丁得七百八十貫舊爲各郡銀傭錢列寄別行次置甲元絹六萬四千疋乙絹四萬九千二百疋丙絹七萬三千六百疋丁絹三萬二千三十五疋爲左行與右行各率對乘之甲得三十八萬四千貫足乙得二十萬二千五百七貫二百足丙得一千一百七十七萬六千貫舊丁得四百八十萬五千二百五十貫各爲絹傭實次以四郡毎擔絹率六十疋爲法除之甲得六千四百貫足乙得三千三百七十五貫一百二十足丙得一十九萬六千二百六十六貫六百六十六文三分文之二舊丁得八萬八十七貫五百舊爲各郡絹傭錢併入寄別行甲得六千四百三十八貫四百足乙得三千三百九十七貫三百四十六文四分足丙得一十九萬七千五百四十六貫六百六十六文三分文之二舊丁得八萬八百六十七貫五百舊列右行其甲舊會價五十四文五因之得二百七十文足乙舊會價五十九文亦五因之得二百九十五文丙以五丁亦以五於左行以對約右行皆爲新會甲得二萬三千八百四十五貫九百二十五文二十七分文之二
