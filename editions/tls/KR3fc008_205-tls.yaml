body:
  text: 置上位數二萬九千三百寸又乘雪㴱羃一百寸得二百九十三萬寸爲實開三乘方以隅實求等得四百俱爲約之得七千三百二十五爲實一爲隅開之步法不可超乃約實置商九寸與隅相生得九下廉下廉九又與商九相生得八十一爲上廉
