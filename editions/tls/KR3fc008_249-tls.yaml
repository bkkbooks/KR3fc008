body:
  text: 草曰以水直五減中斜一十六餘一十一爲法以中斜一十六乘大殘二十得三百二十爲大斜實以法除之得二十九步一十一分步之一爲元大斜內減殘大斜二十步餘九步一十一分步之一爲水大斜以法一十一乘徑一十二得一百三十二自之得一萬七千四百二十四爲小斜隅以水直五自乘得二十五爲水直羃以徑一十二自之得一百四十四爲徑羃併水直羃得一百六十九爲弦羃以乘徑羃一百四十四得二萬四千三百三十六於上又以中斜一十六自乘得二百五十六爲中斜羃以乘上得六百二十三萬一十六爲小斜實開平方與隅求等得一百四十四俱約之實得四萬三千二百六十四隅得一百二十一開方不盡以連枝術入之用隅一百二十一乘實四萬三千二百六十四
  hash: sha256:b854af2e566602b615f4c03ce56dadcc6c4d37fff16095465461f6b06d2bbaa5
