body:
  text: 廣卽爲丙小廣併甲乙長減元長餘爲丙長以元大廣爲丙大廣各有分者通之草曰置小廣三十四併大廣五十二得八十六乘長一百五十得一萬二千九百爲實以兄弟三人約之得四千三百爲通率半之得二千一百五十爲各積以畝法二百四十步約之得八畝不盡二百三十步以角法六十步約之得三角五十步是三人各得八畝三角五十步以元長一百五十步乘各積二千一百五十得三十二萬二千五百爲𠔏實以長一百五十乘小廣三十四得五千一百爲甲從方以小廣減大廣餘一十八乃半之得九爲𠔏隅開連枝平方開方草更不繁具得五十七步不盡三約爲二千四十五分步之八百五十三爲甲截長乃以分母二千四十五通全步內子𠔏得一十一萬七千四百一十八爲法又以分母乘通率四千三百得八百七十九萬三千五百爲實以法除之得七十四步不盡一十萬四千五百六十八與法求等得二俱約之爲五萬八千七百九分步之五萬二千二百八十四乃以小廣三十四步於所得全步七十四步內減之餘四十步五萬八千七百九分步之五萬二千二百八十四爲甲大廣卽爲乙小廣今次求乙長乃以分母五萬八千七百九通乙小廣四十步得二百三十四萬八千三百六十內子五萬二千二百八十四得二百四十萬六百四
