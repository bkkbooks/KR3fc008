body:
  text: 均數徭役問軍戍差坐烽擺鋪切慮差徭不均今諸軍𠔏合差一千二百六十人契勘諸軍見管前軍六千一百七十人右軍四千九百三十六人中軍七千四百四人左軍三千七百二人後軍二千四百六十八人各軍合差幾何荅曰前軍差三百一十五人右軍差二百五十二人中軍差三百七十八人左軍差一百八十九人後軍差一百二十六人術曰以均輸求之置各軍見管人騐可約求等以約之爲衰副併爲法以𠔏合差數乘列衰各爲實實如法而一各得草曰置諸軍見管求等得一千二百三十四俱以約各見管前軍得五右軍得四中軍得六左軍得三後軍得二列爲各衰副併諸衰得二十爲法以𠔏差一千二百六十人乘諸衰前軍得六千三百右軍得五千四十中軍得七千五百六十左軍得三千七百八十後軍得二千
  hash: sha256:c1ab92fa7b70a56c4db936ef0f58bbdfd5125bec5b6bdd1651f9f49ee4cec13b
