body:
  text: 得五百二十三萬四千九百四十四爲定實以一爲定隅開平方得二千二百八十八爲實以約隅一百二十一除之得一十八步不盡一百一十與法一百二十一俱以一十一約之得一十一分步之十爲元小斜減殘小斜一十三步餘五步一十一分步之十爲水小斜置水小斜通步內子得六十五以水直五步乘之得三百二十五爲水實倍水小母一十一得二十二爲法除之得一十四步不盡一十七以法命之得一十四步二十二分步之一十七爲水積置中斜一十六併水直五得二十一乘徑一十二得二百五十二以半之得一百二十六爲殘積以併水積𠔏得一百四十步二十二分步之一十七爲元積環田三積問環田大小圓田𠔏三段環田外周三十步虛徑八步大圓田徑一十步小圓田周三十步欲知三田積及環內周通實徑大圓周小圓徑各幾何荅曰環田積二十步二百三十六萬二千二百五十六分步之一百二十九萬八千二十
  hash: sha256:f141f466803fa7434fbd9c93fbe4d68ca3cfab1ea4dd65b14642296b207543de
