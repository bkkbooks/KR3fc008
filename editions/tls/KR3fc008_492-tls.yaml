body:
  text: 徑自乘得八千一百加次又下徑自乘得六千四百寸加次𠔏得二萬一千七百寸又乘高一百寸得二百一十七萬寸又乘小囤一十三個得二千八百二十一萬寸併寄𠔏得六千七百二十三萬四千寸爲實倍前斛積四千一百六十七寸二分爲法除之得八千六十七石四升七合四勺一抄八撮積倉知數問和糴米運借倉權頓計五十敖母敖闊一丈五尺㴱三丈米高一丈二尺又借寺屋四十間內二十五間闊一丈二尺㴱二丈五尺米高一丈內一十五間各闊一丈三尺㴱三丈米高一丈二尺欲知寺屋及倉容米𠔏計幾何荅曰𠔏計米一十六萬六千八十石倉五十敖米一十萬八千石寺屋四十間米五萬八千八十石術曰商功求之置敖并屋㴱闊米高相乘併之爲實如斛法而一草曰先以敖㴱三丈通爲三十尺乘闊一十五尺得四百五十尺又乘高一十二尺得五千四百尺以乘五十敖得二十七萬尺爲實以斛法二尺五寸除之得一十萬八千石爲倉五十敖𠔏容米次置寺屋㴱二十五尺乘闊一十二尺得三百尺又乘米高一十尺得三千尺以二十五間乘之得七萬五千尺於上次置㴱三十尺乘
