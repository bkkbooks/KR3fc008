body:
  text: 百四十寸又加寄𠔏得一十八萬一千四百四十寸𠔏爲寄其箭窗內外眼雖差三寸於斜㴱虛積將盈補虧與眞㴱等以窗闊六寸乘長七寸五分得四十五寸又乘座闊三尺六寸得一千六百二十寸爲窗虛積以減寄餘一十七萬九千八百二十寸爲實置甎側法三十寸乘甎闊六寸得一百八十寸爲甎積法除實得九百九十九片爲女頭鵲臺𠔏甎又置護嶮牆高三尺乘毎丈得三千寸以牆法當半折之得一千五百寸又乘上下五幅得七千五百寸爲實次以甎厚二寸五分乘闊六寸得一十五寸爲甎法除實得五百片爲護嶮牆甎次併三項甎得八千四百九十九片爲毎丈用甎都實以毎功七百片爲法除實得一十二功七百分功之九十九爲甎功毎丈用石版十片計一功搬石十片計一功甎毎片用灰一斤命都甎卽甎用灰之數又置毎丈用石版一十片毎片用灰一十斤相乘之得一百斤爲石版用灰併甎用灰八千四百九十九斤得八千五百九十九斤爲甎石用灰數爲實以毎功般一千斤爲法除之得八功一千分功之四百九十九爲般灰功并石匠般石二功通前列土功一千一百定柱功二十爬頭拽後木功四十摶子木功八十橛索功三十二甎功一十二功七百分功之九十九搬灰八功千分功之四百九十九石匠搬石𠔏二功併諸作功餘分不同者合分
