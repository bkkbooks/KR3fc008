body:
  text: 乘堡爲實以㴱母除之爲大小港等㴱以㴱母因堡爲實以㴱子除之爲中以半不及加中爲大港面以闊母除之爲小港面二面各減不及爲底以埂下廣乘段爲址以大港面乘隅爲實以闊母除之爲港平以港平併址減寄餘爲田積以址減寄餘乘容水爲田容水以夏冬水㴱乘寄得夏冬積水以田容水併港容水減夏積水餘爲遏出水以八節乘之爲實以溪闊乘流長又乘歲日爲法除之得溪面泛高草曰先通步法爲五十寸通三百六十步得一萬八千寸爲里法以里法通蕩廣三里得五萬四千爲廣率又通蕩縱一百一十八里得二百一十二萬四千爲縱率以縱率併廣率得二百一十七萬八千爲和以縱率乘廣率得一千一百四十六億九千六百萬爲寄三因縱率二百一十二萬四千得六百三十七萬二千於上倍和二百一十七萬八千得四百三十五萬六千加上得一千七十二萬八千爲段次以埂上廣六尺併下廣一丈二尺得一十八尺乘半埂高五十寸得九千寸又乘段一千七十二萬八千得九百六十五億五千二百萬爲土積亦爲港容水以港闊母六因土積得五千七百九十三億一千二百萬爲實以闊子一乘小港二十四條又乘廣率五萬四千得一百二十九萬六千爲泛以闊母六因縱率二百一十二萬四千得一千二百七十四
