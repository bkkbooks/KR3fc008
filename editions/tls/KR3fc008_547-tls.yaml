body:
  text: 二十萬八千尺併堤積四千六百六十五萬六千尺得一億八百八十六萬四千尺以棚道築至半是二除之得五千四百四十三萬二千尺副之先以減功之子一乘之只得此數爲實乃後以減功母五爲法除之得一千八十八萬六千四百尺併副五千四百四十三萬二千尺𠔏得六千五百三十一萬八千四百尺爲寄以折減功五分之一以子一減母五餘四以乘常尺六十得二百四十尺爲增子以母五乘常尺六十得三百尺爲增分以二增併之得五百四十乘寄得三百五十二億七千一百九十三萬六千尺以半之得一百七十六億三千五百九十六萬八千尺爲用工實以增分三百乘增子二百四十得七萬二千尺又乘限分日三十得二百一十六萬尺爲法除前用工實得八千一百六十四爲毎日人工數不盡一百七十二萬八千與法求等得四十三萬二千俱約之爲五分工之四得毎日用工八千一百六十四功五分工之四復通分內子得四萬八百二十四以三十日乘之得一百二十二萬四千七百二十爲實仍以母五約之得二十四萬四千九百四十四工爲𠔏用工合問數書九章卷第十三
