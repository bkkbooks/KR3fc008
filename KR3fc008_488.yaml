body:
  text: 四十四寸併以加上共得二百六十一寸七分六釐為法以除前積四千一百六十七寸二分得一尺五寸九分二釐為方斛深其積不及一釐九毫二絲收為閏又纍增至一十寸為口方仍以一十二寸為底方乃以口方一十寸乘底方一十二寸得一百二十寸於上又以口方自乘得一百寸加上又以底方自乘得一百四十四寸又加上共得三百六十四寸為法亦除前實積四千一百六十七寸二分得一十一寸四分五釐為方斛深其積不及六分收為閏此是求出兩等斛數在人擇而用之求圓斛置四數以因前積四千一百六十七寸二分得一萬六千六百六十八寸八分為寄如意立一尺二寸為圓斛深又如意立一尺為底徑以三因深得三十六寸為從隅以底一十寸乘隅得三百六十寸為從方又以底一十寸乘從方得三千六百寸為減率以減寄一萬六千六百六十八寸八分餘一萬三千六十八寸八分為實開連枝平方得一尺四寸七分為基其實不及二寸四分四釐收為閏次以元立底徑一尺併基一尺四寸七分得二尺四寸七分只減七分為差餘二尺四寸以半之得一尺二寸為底徑以差七分併底徑得一尺二寸七分為口徑始以口徑一尺二寸七分乘底徑一尺二寸得一百五十二寸四分於上次以口徑自乘得
