body:
  text: 驗得諸法皆變寸乃以各圖上下長闊直按術求率倍上長八百二十寸得一千六百四十寸加下長一千八百二十寸得三千四百六十乘上闊六百二十得二百一十四萬五十二百爲寄次倍下長一千八百二十得三千六百四十加上長八百二十得四千四百六十乘下闊一千六百二十得七百二十二萬五千二百併寄得九百三十七萬四百乘臺直一千二百六寸得一百一十三億七十萬二千四百寸仍爲寄乃驗土積圖土率九千二百四十丈以一百萬寸通之得九十二億四千萬寸以減寄餘二十億六千七十萬二千四百寸如六而一得三億四千三百四十五萬四百寸爲泛次置南道高五分之一北道高强半係四分之三及臺元高一千二百寸具圖如后乃以南道高子二乘元臺高得二千四百寸爲南實以北道高子三乘元臺高得三千六百寸爲北實各如本母而一得四百八十寸約爲四丈八尺爲南道兩隅又爲東外道巽隅高又爲西道坤隅高所得九百寸約爲
