body:
  text: 八千五百併斗定分四千一百八得六百一十七萬二千六百八爲歲率卻以十二月乘朔率四十九萬九千六十七得五百九十八萬八千八百四減歲率餘一十八萬三千八百四爲歲閏以歲閏乘入元歲九千一百八十得一十六億八千七百三十二萬七百二十滿朔率去之不滿四十七萬四千二百六十爲入閏次置本厯所用嘉泰甲子歲天正月朔一日七十五刻五十五分六十二秒以日法乘之得二萬九千六百六十八分九千九百七十八秒爲朔泛骨就近收秒爲一分𠔏爲二萬九千六百六十九爲朔定骨數然後乃以朔定骨減氣定骨一十九萬三千四百四十餘一十六萬三千七百七十一爲閏泛骨置日法以二百約之得八十四半爲半刻法次以閏泛骨與入閏相課減之餘三十一萬四百八十九此是閏贏爲差半刻法以上乃以閏泛骨併朔率𠔏得六十六萬二千八百三十八以入閏四十七萬四千二百六十減之餘一十八萬八千五百七十八在朔率下便爲閏縮次以紀策六十乘日法得一百一萬四千爲紀率以等數五十二約紀率得一萬九千五百爲氣元率以氣元率乘歲閏一十八萬三千八百四得三十五億八千四百一十七萬八千滿朔率去之不滿三十七萬七千八百七十三爲元閏次置一億以入元歲九千一百八十減之餘九千九百九十九萬八百二十
