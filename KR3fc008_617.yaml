body:
  text: 術曰以商功求之以圓率因內徑爲內周以人立尺約之爲內周人數乃以圓束差率爲隅次置內周人減隅餘爲從方列兵數爲實開平方得重數不盡爲餘兵置重數減一餘四因又乘圓邊尺數併內徑𠔏爲通徑以圓率因通徑得外周
