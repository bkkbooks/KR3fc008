body:
  text: 術曰以商功求之以圓率因內徑為內周以人立尺約之為內周人數乃以圓束差率為隅次置內周人減隅餘為從方列兵數為實開平方得重數不盡為餘兵置重數減一餘四因又乘圓邊尺數併內徑共為通徑以圓率因通徑得外周
