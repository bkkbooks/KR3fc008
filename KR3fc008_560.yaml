body:
  text: 八為寄母具圖如后次列棚道全分及所當鮮母衍子三當五及三當七并二當五乃以右行鮮母互乘左行衍子上得四十五副得四十二次得三十下得一十八為右行以鮮母相乘得一十八乃對寄左圖列之乃以左右兩行母子對乘之上得五百四十副得三百
