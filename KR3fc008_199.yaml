body:
  text: 得六十四寸為半深羃以乘下法四十二得二千六百八十八為上法以半深羃六十四寸乘下率七萬三千二百一十六寸得四百六十八萬五千八百二十四寸併上率九十萬六千四百四十四共得五百五十九萬二千二百六十八寸為總實以口徑一十寸五分自乘得一百一十寸二分五釐以乘上法二千六百八十八寸得二十九萬六千三百五十二寸為總法除實得一尺八寸不盡二十五萬七千九百三十二與法求等得四俱約之為一尺八寸七萬四千八十八分寸之六萬四千四百八十三為平地雨深合問峻積驗雪問驗雪占年牆高一丈二尺倚木去址五尺梢與牆齊木身積雪厚四寸峻積薄平積厚欲知平地雪厚幾何答曰平地雪厚一尺四分術曰以少廣求之連枝入之以去址自乘為隅以牆高自乘併隅於上以雪厚自之乘上為實可約者約而開之開連枝平方得地上雪厚草曰以問數皆通為寸置去址五十寸自乘得二千五百為隅以牆高一百二十寸自乘得一萬四千四百寸併隅得一萬六千九百寸於上以雪厚四寸自之得一十六乘上得二十七萬四百寸為實開連枝平方今隅實可求等得一百俱約之得二千七百四為實得二十五
