body:
  text: 數為基增損求之以口底方相乘又各自乘併之為法除前上積得深餘分收棄之求圓斛置四數以因前積為寄如意立數為斛深別如意立數為底徑以三因深為從隅以底徑乘隅為從方以底徑乘從方為減率以減寄餘為實開連枝平方得口徑不盡以所得為基如意求差以口底徑相乘又各自乘併之為法除寄得深餘方收棄之求囤米置各囤上徑下徑相乘又各自乘併之乘高又乘囤數所得之數為積囤有大小以類併之為共積如四而一為實以斛法除之得米
