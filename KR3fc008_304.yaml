body:
  text: 陡岸測水問行師遇水須計篾纜搭造浮橋今垂繩量陡岸高三丈人立其上欲測水面之闊以六尺竿為矩平持去目下五寸今矩本抵頤遙望水彼岸與矩端參相合又望水此岸沙際入矩端三尺四寸人目高五尺其水面闊幾何答曰水闊二十三丈四尺六寸術曰以勾股重差求之置矩去目下寸為法以人目併岸高減去法餘乘入矩端為實實如法而一得水闊草曰置矩本去目下五寸為法以人目高五尺併岸高三丈得三丈五尺通為寸得三百五十寸減法五寸餘三百四十五寸乘沙際入矩端三十四寸得一萬一千七百三十寸為實實如法五寸而一得二千三百四十六寸展為二十三丈四尺六寸為水闊合問
  hash: sha256:198f878a3b611a56195e4e8652d4ec58aba768dd4cf0e0e14c0d86aaf3ea63b2
