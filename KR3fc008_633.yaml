body:
  text: 方八尺我軍在水南山原於原下立表高八丈與山腰等平自表端引繩虛量平至人足三十步人立其處望彼營北陵與表端參合又望營南陵入表端八尺人目高四尺八寸以圓密率入重差求敵衆合得幾何答曰敵衆八百四十九人術曰以勾股求之置人退表步乘入表為實以人目高為法除之得徑以密周率乘徑得數為實以密徑率因人立為法約之得外周人數餘收為一副置加六以乘副得數為實如一十二而一餘亦收為全
