body:
  text: 地一十一畝二角四十八步甲今有田九十七畝苗米三石三斗九升五合夏稅折帛三丈三尺四寸六分五釐本色一匹畸零三丈八尺八分五釐物力一百一十六貫四百文地一十一畝二角四十八步稅紬折帛七尺八寸三分九釐稅紬畸零七尺八寸三分九釐物力一十貫五百三十文田地共物力一百二十六貫九百三十文和買折帛二匹三丈一尺六分三釐七毫五絲本色一匹畸零七尺五寸九分八釐七毫五絲乙今有田七百八十二畝苗米二十七石三斗七升夏稅折帛六匹二丈九尺七寸九分本色一十五匹畸零二丈九尺五寸一分物力九百三十八貫四百文和買折帛二十匹二丈一尺一寸
