body:
  text: 問沙洲一段形如棹刀廣一千九百二十步縱三千六百步大斜二千五百步小斜一千八百二十步以安集流民每戶給一十五畝欲知地積容民幾何答曰地積一百四十九頃九十五畝容民九百九十九戶餘地一十畝術曰以少廣求之置廣乘長半之為寄以廣羃併縱羃為中羃以小斜羃併中羃減大斜羃餘半之自乘於上以小斜羃乘中羃減上餘以四約之為實以一為隅開平方得數加寄共為積以每戶給數除積得容民戶數草曰置廣一千九百二十步乘縱三千六百步得六百九十一萬二千步乃半之得三百四十五萬六千步為寄以廣自乘得三百六十八萬六千四百步為廣羃又以縱自乘得一千二百九十六萬步為縱羃併廣羃得一千六百六十四萬六千四百步為中羃次以小斜一千八百二十步自乘得三百三十一萬二千四百步為小斜羃又以大斜二千五百步自乘得六百二十五萬步為大斜羃卻以小斜羃併中羃得一千九百九十五萬
