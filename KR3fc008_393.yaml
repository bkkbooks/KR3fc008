body:
  text: 一萬六千二百五十五步爲實以法一十九除之得三百八十一萬六千六百四十五步爲一分之數以上泛三因之得一千一百四十四萬九千九百三十五步爲上積又以中泛四因之一分數得一千五百二十六萬六千五百八十步爲中積又以下泛一十二乘一分數得四千五百七十九萬九千七百四十步爲下積其三積各以畝法二百四十約之爲畝其上田得四百七十七頃八畝一十五步其中田得六百三十六頃一十畝三角其下田得一千九百八頃三十二畝一角各以起租三積爲三實其上積一千一百四十四萬九千九百三十五步乘上租六斗得六百八十六萬九千九百六十一石爲實以畝法二百四十除之得二萬八千六百二十四石八斗三升七合五勺爲上田租其中積一千五百二十六萬六千五百八十步乘中租四斗五升得六百八十六萬九千九百六十一石爲實以畝法二百四十除之得二萬八千六百二十四石八斗三升七合五勺其下積四千五百七十九萬九千七百四十步乘下租四斗得一千八百三十一萬九千八百九十六石爲實以畝法二百四十除之得七萬六千三百三十二石九斗爲下田米築埂均功問四縣𠔏興築圩埂長三十六里半甲縣出二千七百八
