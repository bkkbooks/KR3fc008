body:
  text: 八等一戶米八百石三十四戶計二萬七千二百石九等一戶米二百石四十五戶計九千石術曰以衰分求之置上下戶米減餘為實列等數減一餘為法除之得拋差石數以差纍減上等米各得諸等米以各等戶數乘之併之為總數草曰置上等戶米五千石減下等戶二百戶餘四千八百石為實以九等減一餘八為法除實得六百石為每等拋差用減上等餘四千四百石為二等米又減六百得三千八百石為三等米又減六百得三千二百石為四等米又減六百得二千六百石為五等米又減六百得二千石為六等米又減六百得一千四百石為七等米又減六百得八百石為八等米又減六百得二百石為九等米又各乘戶數併之得總認米石數二十三萬七千六百石數書九章卷第十
