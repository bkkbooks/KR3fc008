body:
  text: 以首圖伏日一十六日九十分乘伏率一百二十日九十五分得二千四十四日五分五十秒為伏差於右下以首圖見日一百一十三乘見率五十六日得六千三百二十八日為見差於左下乃成次圖凡方程之術先欲得者存之以未欲得者互遍乘兩行諸數今驗次圖先欲得日差故存其左右之上下以左右之中伏見日數互遍乘兩行乃以次圖右中伏日一十六日九十分先遍乘左行畢左上得三百一度三十二分七十秒左中得一千九百九日七十分左下得一十萬六千九百四十三日二十分又以次圖左中見日一百一十三遍乘右行畢右上得四百四十度七十分右中亦得一千九百九日七十分右下得二十三萬九百七十八日二十一分五十秒
