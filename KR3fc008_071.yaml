body:
  text: 次以推無用數者惟甲庚合於同類處借之其同類謂元陌列而視之今視甲一十二庚六皆與丙一十戊八俱偶爲同類其戊用數三千四百六十五其數少不可借唯丙一十之用數係二萬二千一百七十六爲最多當以借之乃以甲一十二丙一十庚六求等得二以等數二約衍母二萬七千七百二十得一萬三千八百六十爲借數乃減丙用二萬二千一百七十六餘八千三百一十六爲丙用數乃以所借出之數一萬三千八百六十爲實以元等二爲法除之得六千九百三十爲甲用數以甲用數減借出數餘亦得六千九百三十爲庚用數今不欲使甲庚之借數同乃騐借出數一萬三千八百六十可用幾約如意乃立三取三分之一得四千六百二十爲甲用取三分之二得九千二百四十爲庚用列右行
  hash: sha256:c941bd3c7e28e545023a174824d50cd913d891b4159af0bcb2b365aa5e0b37a1
