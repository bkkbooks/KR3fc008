body:
  text: 次以推無用數者惟甲庚合於同類處借之其同類謂元陌列而視之今視甲一十二庚六皆與丙一十戊八俱偶為同類其戊用數三千四百六十五其數少不可借唯丙一十之用數係二萬二千一百七十六為最多當以借之乃以甲一十二丙一十庚六求等得二以等數二約衍母二萬七千七百二十得一萬三千八百六十為借數乃減丙用二萬二千一百七十六餘八千三百一十六為丙用數乃以所借出之數一萬三千八百六十為實以元等二為法除之得六千九百三十為甲用數以甲用數減借出數餘亦得六千九百三十為庚用數今不欲使甲庚之借數同乃驗借出數一萬三千八百六十可用幾約如意乃立三取三分之一得四千六百二十為甲用取三分之二得九千二百四十為庚用列右行
  hash: sha256:43c998bd1e0ee3b84406c49359713460aca6ddc8d251c2ae56243b4b707870a3
