body:
  text: 方變鋭陳問步兵五軍軍一萬二千五百人作方陳人立地方八尺欲變為前後鋭陳陳後闊今多元方面半倍陳間仍容騎路五丈以上順鋭形出入求方陳面鋭陳長及前後鋭陳各布兵幾何每方目為十丈一面目為大方每面止五二人𠔏立二百五十人
