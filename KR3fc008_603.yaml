  text: 方變銳陳問步兵五軍軍一萬二千五百人作方陳人立地方八尺欲變爲前後銳陳陳後闊今多元方面半倍陳間仍容騎路五丈以上順銳形出入求方陳面銳陳長及前後銳陳各布兵幾何毎方目爲十丈一面目爲大方毎面止五二人𠔏立二百五十人
