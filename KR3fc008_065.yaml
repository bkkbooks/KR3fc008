body:
  text: 小月舊會七千八百一十五貫五百文丁庫日息舊會二百九十九貫四百四文大月舊會八千九百八十三貫三百三文小月舊會八千六百八十三貫八百八文戊庫日息舊會三百三十六貫八百六文大月舊會一萬一百六貫二百四文小月舊會九千七百六十九貫三百六文己庫日息舊會三百八十五貫文大月舊會一萬一千五百五十實文小月舊會一萬一千一百六十五貫文庚庫日息舊會四百四十九貫一百四文大月舊會一萬三千四百七十五貫文小月舊會一萬三千二十五貫八百二文術曰同前以大衍求之置甲庫市陌以遞減數減之各得諸庫元陌連環求等約奇弗約偶得定母諸定相乘爲衍母以定約衍母得衍數衍數同衍母者去之爲無無者借之同類其各滿定母去餘爲奇數以奇定用大衍求乘率乘衍數爲用數無者則以元數同類者求等約衍母得數爲借數次置有零文庫零錢數乘本用數併爲總數滿衍母去之不滿爲諸庫日息足錢各大小月日數乘之各爲實各以元陌約爲舊會草曰置甲庫市陌一十二遞減一得一十一爲乙庫陌一
  hash: sha256:ff491b59cb93574e8ecfb0e1358374e84d557750724c025aea70a27da02e31e2
