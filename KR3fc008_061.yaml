body:
  text: 以各定母與本奇數用大衍求一術入之各得乘率甲得二十三乙得五丙得一十九丁得一以右行乘率對乘寄左行衍數甲得八萬七千四百乙得二萬七千丙得七萬七千九百七十六丁得一萬二千八百二十五各爲用數次騐四縣所築有無不及零丈尺寸今甲乙俱畢爲無丙餘五十一丈丁餘一十八丈爲有以丙丁二縣餘丈各乘丙丁二用數其丙五十一乘丙用七萬七千九百七十六得三百九十七萬六千七百七十六丈爲丙總以丁餘一十八乘丁用一萬二千八百二十五得二十三萬八百五十丈爲丁總併二總得四百二十萬七千六百二十六丈爲總數亦以丈通衍母得一十萬二千六百丈仍爲衍母滿去總數不滿一千二十六丈爲所
