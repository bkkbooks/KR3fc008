body:
  text: 減下長一千八百二十餘一千七百二十寸為底股以外道級八十約之得二尺一寸五分為外道踏縱又以底率一百寸減底股一千七百二十寸餘一千六百二十寸為中股乃以勾五百寸乘中停高四丈二尺得二十一萬寸為實如臺高一千二百寸而一得一百七十五寸為中率以中率減中股一千六百二十寸餘一千四百四十五寸為上股以西道級七十除上股一千四百四十五寸得二尺一十四分寸之九為西道踏縱又以勾五百寸乘上停高三百寸得一十五萬寸為實如臺高一千二百寸而一得一百二十五寸為上率併中率一百七十五寸得三百減上股一千四百四十五寸餘一千一百四十五寸為實如裏道級五十而一得二尺二寸九分為裏道踏縱各得具圖以見如后
