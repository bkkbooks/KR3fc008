body:
  text: 減下長一千八百二十餘一千七百二十寸爲底股以外道級八十約之得二尺一寸五分爲外道踏縱又以底率一百寸減底股一千七百二十寸餘一千六百二十寸爲中股乃以勾五百寸乘中停高四丈二尺得二十一萬寸爲實如臺高一千二百寸而一得一百七十五寸爲中率以中率減中股一千六百二十寸餘一千四百四十五寸爲上股以西道級七十除上股一千四百四十五寸得二尺一十四分寸之九爲西道踏縱又以勾五百寸乘上停高三百寸得一十五萬寸爲實如臺高一千二百寸而一得一百二十五寸爲上率併中率一百七十五寸得三百減上股一千四百四十五寸餘一千一百四十五寸爲實如裏道級五十而一得二尺二寸九分爲裏道踏縱各得具圖以見如后
  hash: sha256:2dbc3ed5e9dc2c2f2ad771a09d5fe5476d3e979ed8262bff69b21d0ff8c75032
