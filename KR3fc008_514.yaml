body:
  text: 一百一十三穀衰得一十四以共米一千五百三十四石遍乘二衰得一十七萬三千三百四十二石為米實得二萬一千四百七十六石為穀實皆如法一百二十七而一米得一千三百六十四石八斗九升七合六勺一百二十七分勺之四十八穀得一百六十九石一斗二合三勺一百二十七分勺之七十九以粟率五十折之得八十四石五斗五升一合一勺一百二十七分勺之一百三為穀折納米數併二米得一千四百四十九石四斗四升八合八勺一百二十七分勺之二十四先通分納子得一十八萬四千八十石以勺率三百粒乘子得五千五百二十二億四千萬粒為實以母一百二十七除之得四十三億四千八百三十四萬六千七百五十六粒不盡八十八棄之合問數書九章卷第十二
