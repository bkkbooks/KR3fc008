body:
  text: 草曰置甲庫反錐差自下置一二三於右行次置乙庫方錐差自上置一四九於中行次置丙庫蒺藜差自上置一二六於左行各為三庫上中下三等乘率乃縱併甲差三二一得六為甲約率縱併乙差一四九得一十四為乙約率縱併丙差一三六得一十為丙約率直命九位數各為上中下乘率乃先以約率各約自庫之本乃以甲約率六約甲本四十九萬三千八百貫得八萬二千三百貫為甲得次以乙約率一十四約乙本三十七萬三百貫得二萬六千四百五十貫為乙得次以丙約率一十約丙本二十四萬六千八百貫得二萬四千六百八十貫為丙得以各得乘未併乘率其甲所得八萬二千三百貫乘反錐乘率三二一得二十四萬六千九百貫為上率得一十六萬四千六百貫為中率得八萬二千三百貫為下率其乙所得二萬六千四百五十貫以乘方錐差一四九得二萬六千四百五十貫為上率得一十萬五千八百貫為中率得二十三萬八千五十貫為下率其丙所
