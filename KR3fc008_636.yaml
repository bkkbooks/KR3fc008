body:
  text: 草曰置人立退表三十步以步法五尺展為五十寸通之得一千五百寸乘入表八尺得一十二萬寸為實以人目高四十八寸為法除之得徑二千五百寸以密率周法二十二乘徑二千五百得五萬五千寸為實以密率徑法七因諜稱人立八尺得五百六十為法
