body:
  text: 本色率丙得二十五匹六分九釐八毫七絲五忽為和買折帛率又得一十一匹一釐三毫七絲五忽為和買本色率各率除端匹外乃以匹下分毫皆以四因之收為丈尺寸分甲得和買折帛二匹三丈一尺六分三釐七毫五絲本色一匹七尺五寸九分八釐七毫五絲乙得和買折帛二十匹二丈一尺一寸本色八匹三丈一尺九寸丙得和買折帛二十五匹二丈七尺九寸五分本色一十一匹五寸五分為各戶和買數匹分本色下畸零數合問移運均勞分郡縣鄉科均問今起夫移運邊餉於某郡交納合起一萬二千夫甲州有三縣上縣力五十七萬三千二百五十九貫五百文至輸所九百二十五里中縣力五十萬四千九百八十三貫七百八十文至輸所六百五十二里下縣力四十九萬八千七百六十貫九百五十文至輸所四百六十五里乙軍倚郭一縣五鄉仁鄉力一十二萬八千三百七十一貫九百八十文至輸所七百六里義鄉力一十一萬九千四百七十二貫六百文至輸所七百九十五里禮鄉力一十萬八千四百六十三貫五十文至輸所七百九十里智鄉力八萬四千二百三十六貫二百八十五文至輸所七百四十九里信鄉力九千三百四十五貫一百六十文至輸所八百四里欲知以物力多寡道里遠近均運之令勞費等
