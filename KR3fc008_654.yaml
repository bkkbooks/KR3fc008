body:
  text: 上置盈朏數各於其下令維乘之先以人數互乘其所給率相減餘爲法次以人數相乘爲寄後以盈朏互乘其上未減者是爲維乘騐其下係一盈一朏以上下皆併之其上併之爲物實其下併之乘寄爲兵實二實皆如法而一各得騐其係兩盈或兩朏者以上下皆相減之其上減之餘爲物實其下減之餘乘寄爲兵實二實皆如法而一各得騐其或一盈一足或一朏一足者其適足乃以空互乘其上未減者去之只以所用盈朏數互乘其上爲物實以盈或朏一數乘寄爲兵實皆如法而一各得求布草曰置布六人於左中八疋於左上朏一百六十疋於左下置七人於右中九疋於右上盈五百六十於右下先以左右之中六七互乘左右之上訖左上得五十六右上得五十四以相減之餘二爲法次以左右中六七相乘得四十二爲寄於中次以左下虧一百六十乘右上未減五十四得八千六百四十又以右下盈五百六十乘左上未減五十六得三萬一千三百六十騐得左右之下係一盈一朏當併之以左上三萬一千三百六十併右上八千六百四十得四萬爲布實次以左下朏一百六十併右下盈五百六十得七百二十乘寄四十二得三萬二百四十爲兵實二實皆如法二而一得二萬疋爲布得一萬五千一百二十爲兵
