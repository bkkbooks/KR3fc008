body:
  text: 一千七百寸得二百五十五萬減基率餘六十一萬六千八百寸乘基高三十五寸得二千一百五十八萬八千寸為石率以石率減𠔏率餘五億六千五百五十六萬四千四百寸為甎率以甎積法一百八十寸除之得三百一十四萬二千二十四片九分片之四乃以石積法五千寸除石率二千一百五十八萬八千寸得四千三百一十七片為石版不盡三千寸弃之不輩合問堂皇程築問有營造地基長二十一丈闊一十七丈先令七人築堅三丈計功二日今涓吉立木有日欲限三日築了每日合收杵手幾何答曰日收五百五十五工三分工之一術曰以長乘闊又乘元日元人為實以限日乘築丈數為法除之得人夫草曰以長二十一丈乘闊一十七丈得三百五十七丈又乘元二日得七百一十四又乘元七人得四千九百九十八為工實以限三日乘元築三丈得九為法除實得五百五十五功不盡三與法俱三約之為三分工之一為日收五百五十五工三分工之一合問砌甎計積問有交到六門甎一十五垜每垜高五尺闊八尺長一丈其甎每片長八寸闊四寸厚一寸欲砌地面使用堂屋三
