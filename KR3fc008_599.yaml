body:
  text: 隊中四眼各立三十人隊心立五人草曰置人占八尺自乘得六十四尺為人占方冪以乘每隊一百二十五人得八千尺為實以一為隅開平方步法常超一位今隅超一度至實之百下約實置商八十尺以商八十生隅一得八十為方乃命上商除實訖實餘一千六百次以商生隅入方得一百六十畢方一退隅再退之復於上商之次續商九尺乃以續商九生隅一入方得一百六十九乃命續商除實訖得八十九尺不盡七十九尺就為九十尺得隊方面次置三十三隊乘三將得九十九又四因得三百九十六增三得三百九十九為實以二為從方一為從隅開平方步法以從方進一位至實之十下隅超一位至實之百下乃約實置商一十隊以商一十生隅一入方得一十二乃命上商除實訖實餘二百七十九又以商一十生隅入方得二十二畢方一退隅再退之續於實上商九隊以續商九生隅又方得三十一乃以命續商除實適盡得一十九乘隊方面九十得一千七百一十隊展為營方一百七十一丈合問
  hash: sha256:30d6a2de68e46a7a12387fa54ef7c818f73855c477f73dc3ba021acea24c2d35
