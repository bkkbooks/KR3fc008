body:
  text: 隊中四眼各立三十人隊心立五人草曰置人占八尺自乘得六十四尺爲人占方冪以乘毎隊一百二十五人得八千尺爲實以一爲隅開平方步法常超一位今隅超一度至實之百下約實置商八十尺以商八十生隅一得八十爲方乃命上商除實訖實餘一千六百次以商生隅入方得一百六十畢方一退隅再退之復於上商之次續商九尺乃以續商九生隅一入方得一百六十九乃命續商除實訖得八十九尺不盡七十九尺就爲九十尺得隊方面次置三十三隊乘三將得九十九又四因得三百九十六增三得三百九十九爲實以二爲從方一爲從隅開平方步法以從方進一位至實之十下隅超一位至實之百下乃約實置商一十隊以商一十生隅一入方得一十二乃命上商除實訖實餘二百七十九又以商一十生隅入方得二十二畢方一退隅再退之續於實上商九隊以續商九生隅又方得三十一乃以命續商除實適盡得一十九乘隊方面九十得一千七百一十隊展爲營方一百七十一丈合問
  hash: sha256:7fb363c148cda14b92224da7530cf19eca0e6bbf3c6d8c18fb845897d5d253b4
