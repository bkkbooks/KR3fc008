body:
  text: 各以定數約衍母各得衍數氣得四百二十八萬六千四百朔得一億九百八十六萬七千二百紀得九千二百五十三寄左行各滿定數去之各得奇數氣奇得三百一十三朔奇得四紀奇得九千二百五十三各與定數用大衍求一各得乘率列右行對寄左行衍數具圖如后
