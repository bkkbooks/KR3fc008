body:
  text: 一寸八分為乙丙二鄉各科數又於身下加一得七千四百五十七丈六尺八寸九分八釐為甲鄉數次列九等上以十次九八七六五四三二各對乘六鄉九等田畝其田畝下角步以畝法除之得分釐毫絲忽接於畝下對乘之各得率甲上等上田率五萬六千七百八十四分五釐中田率四萬四千二十九分一釐二毫五絲下田率五萬二千九百六十九分八釐中等上田率五萬七千五百七十五分七釐中田率六萬二百一十分一釐五毫下田率八萬二千六百五十分下等上田率八萬四千三百六十分四釐中田率九萬六千一百八十分三毫七絲五忽下田率七萬一百二十三分五釐二毫五絲乙上等上田率六萬七千八百九十四分中田率五萬三千八百八十七分五釐下田率六萬四千八十六分一釐中等上田率五萬二千七百八十七分中田率五萬四千七百二十九分三釐下田率九萬五千三百三十分一釐二毫五絲下等上田率七萬二千一百四十九分一釐中田率二萬八千三百七十分九釐八毫八絲
  hash: sha256:3f4d54424ac995d7eaec3a546e157e8def3d2b88a1bfaaf6de8179132b9f1292
