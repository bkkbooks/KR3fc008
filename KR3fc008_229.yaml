body:
  text: 術曰以少廣求之置中長乘北闊半之爲寄以中長羃減西斜羃餘爲實以一爲隅開平方得數減北闊餘自乘併中長羃𠔏爲內率以小斜羃併率減中斜羃餘半之自乘於上以小斜羃乘率減上餘四約之爲實以一爲隅開平方得數加寄𠔏爲蕩積草曰以中長二十四里乘北闊一十七里得四百八乃半之得二百四里爲寄以中長自乘得五百七十六爲長羃以西斜二十六里自乘得六百七十六爲大羃以減長羃餘一百里爲實開平方得一十里以減北闊數一十七里餘七里自乘得四十九併長羃五百七十六得六百二十五爲內率次置東小斜一十五里自乘得二百二十五爲小斜羃又置東南中斜二十里自乘得四百爲中羃卻以小斜羃併率得八百五十以減中羃四百餘四百五十乃半之得二百二十五自乘得五萬六百二十五里於上又以小斜羃二百二十五乘率六百二十五得一十四萬六百二十五減上餘九萬里以四約得二萬二千五百爲實開平方得一百五十併寄二百四里得三百五十四里爲泛以里法三百六十自乘得一十二萬九千六百步乘泛得四千五百八十七萬八千四百步以畝法二百四十步約之得一千九百一十一頃六十畝爲蕩積計地容民
