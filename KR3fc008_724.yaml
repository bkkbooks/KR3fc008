body:
  text: 乘工藥錢三貫得一萬五千貫又加寄共得二百二萬八千七百五十貫為價實二實併如法四千二十七兩五錢而一其色得一十分其價每兩得五百三貫七百二十四文不盡一貫五百九十與法求等得七十五俱約之為五百三十七分文之二百一十二
