body:
  text: 斗四升四合二勺和買一萬三千四百九十八匹一丈七尺三寸七分五釐夏稅九千八百七十六匹三丈二尺六寸五分六釐其六鄉田係三色甲為上乙丙為次丁戊己又為次先令官物為三差使上比中中比下皆十分外差一次令各鄉九等皆於十分內差一拋科用合租額其乙鄉田最肥次丁次甲次丙次己次戊欲知三色等每畝等則及𠔏科數各鄉幾何答曰甲鄉上等上田苗三斗二升三合二勺和一尺六寸九分稅一尺二寸三分中田苗二斗九升九勺和一尺五寸二分稅一尺一寸一分下田苗二斗五升八合六勺和一尺三寸五分稅九寸九分中等上田苗二斗二升六合三勺和一尺一寸八分稅八寸六分中田苗一斗九升三合九勺和一尺一分稅七寸四分下田苗一斗六升一合六勺和八寸四分稅六寸二分下等上田苗一斗二升九合三勺和六寸七分稅四寸九分中田苗九升七合
