body:
  text: 六分五釐為夏稅折帛又得一匹三丈八尺八分五釐為夏稅本色其乙得六匹二丈九尺七寸九分為夏稅折帛又得一十五匹二丈九尺五寸一分為夏稅本色其丙得八匹一丈七尺七寸五分五釐為夏稅折帛得一十九匹二丈八尺九分五釐為夏稅本色次以田力一貫二百遍乘右副行并以地物力乘甲元地及紬甲得一百一十六貫四百乙得九百三十八貫四百丙得一千一百七十四貫八百各為田物力其甲又置一十一畝七分以乘地紬一尺三寸四分得一丈五尺六寸七分八釐為甲地紬半之得七尺八寸三分九釐各為折紬本色又以甲地乘物力九百得一十貫五百三十為甲地物力併田物力一百一十六貫四百𠔏得一百二十六貫九百三十文為甲物力列甲乙丙三戶𠔏物力各為實皆以物力和買率三十二貫為法除之甲得三匹九分六釐六毫五絲六忽二微五塵乙得二十九匹三分二釐五毫丙得三十六匹七分一釐二毫五絲各為和買率亦各列二位各以七三折之其上位七折者為和買折帛下位三折者為和買本色折訖其甲得二匹七分七釐六毫五絲九忽三微七塵五沙為和買折帛率又得一匹一分八釐九毫九絲六忽八微七塵五沙為和買本色率乙得二十匹五分二釐七毫五絲為和買折帛率又得八匹七分九釐七毫五絲為和買
