body:
  text: 丙銀每兩五十貫文本一十二萬三千五百貫文合得沈香一千四百八十二兩胡椒三千三十七包三十九斤五兩五十三分兩之二十三象牙六十一合四分合之三丁度牒每道一千五百貫文本一十萬五百貫文合得沈香一千二百六兩胡椒二千四百七十二包八斤三兩五十三分兩之十七象牙五十合四分合之一術曰以方程求之衰分入之正負入之置𠔏錢以人數約之得數列如人數各為行積次置諸色各物數為段子對本色有分者通之可約者約之為定率以第一行為右以第二行為副以第三行為次第四行為左每以下位互遍乘之每驗其積以少減多如同名相減異名相加正無人負之負無人正之如同名相加異名相減正無人正之負無人負之得一段為法以除積為實除之各得諸價以諸價列右行以各物數列左行以兩行對乘得各本率以諸色求等約之得列衰併諸衰為總法以列衰遍乘各物諸數各為實諸實竝如總法而一各得其物除不盡者以斤兩通而除之或又分母命之
