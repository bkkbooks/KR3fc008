body:
  text: 下田三萬三千三百六十三畝三角九步戊鄉田共計二十萬四千四百七十四畝一角二十四步四分上等上田二萬四千六百三十二畝三十九步中田一萬三千五百二十一畝二十七步下田九千九百八十八畝三角三步中等上田八千八百七十七畝五十六步四分中田一萬一千三百三十三畝三角下田二萬七千六十七畝下等上田一萬九千八百七十六畝三角六步中田七萬九千一百三十五畝三角四十三步下田一萬四十一畝二角三十步己鄉田共計一十五萬八千四百六十畝三角十八步二分上等上田無中田七千七百八十八畝三角五十一步下田無中等上田九千九百九十九畝一角六十三步中田一萬八百三十六畝五十六步下田無下等上田三萬二千八十九畝一角四十五步六分中田四萬三千六百七十八畝二角五十七步下田五萬四千六十七畝三角四十五步六分照得昨來本縣元科苗米一十萬三千五百六十七石八
