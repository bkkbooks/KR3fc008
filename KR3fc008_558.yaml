body:
  text: 四十丈為土率以六除得一千五百四十以千尺通之為一百五十四萬尺為堅積以築功九十尺除之得一萬七千一百一十一功九分功之一為築功次以穿率四因堅積得六百一十六萬尺為實以堅率三因钁鍬功二百尺得六百尺為法除實得一萬二百六十六功三分功之二為穿功次以壤率五因堅積得七百七十萬尺為壤積以三為母具圖如后求負土者先列全分一分之一及築至高少半係三分之一中半係二分之一太半係三分之二作兩行乃以右行母互乘左行子左上得一十二副位得九次得六下得一十八乃變右行名為寄子以諸母相乘得一十
