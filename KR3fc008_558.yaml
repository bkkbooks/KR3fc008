body:
  text: 四十丈爲土率以六除得一千五百四十以千尺通之爲一百五十四萬尺爲堅積以築功九十尺除之得一萬七千一百一十一功九分功之一爲築功次以穿率四因堅積得六百一十六萬尺爲實以堅率三因钁鍬功二百尺得六百尺爲法除實得一萬二百六十六功三分功之二爲穿功次以壤率五因堅積得七百七十萬尺爲壤積以三爲母具圖如后求負土者先列全分一分之一及築至高少半係三分之一中半係二分之一太半係三分之二作兩行乃以右行母互乘左行子左上得一十二副位得九次得六下得一十八乃變右行名爲寄子以諸母相乘得一十
