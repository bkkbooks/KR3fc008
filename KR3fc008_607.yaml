body:
  text: 答曰方面二百丈方面布兵二百五十人鋭後廣三百丈鋭廣列兵三百六十二人鋭通正長三百丈騎路二條各闊五丈二尺內鋭陳廣一百四十五丈六尺列一百八十二人長一百四十五丈六尺計布兵一萬六千六百五十三人外鋭兩廣各七十二丈列九十人計布兵四萬五千八百四十七人術曰以少廣求之置兵開平方得方面人數開不盡方為補隊以人立尺數乘之為元方面置元方面以欲多數加之為鋭後闊亦為通長倍馬路減之餘為實以人立尺約為闊布兵不盡輩歸馬路以四約闊布兵得外鋭一邊人倍一邊人併不歸為內鋭長闊人數副置加一以乘其副得數半之為內鋭布兵以減總兵餘為外鋭布兵草曰置一軍一萬二千五百以五軍因之得總兵六萬二千五百人為實開平方得二百五十人以人立八尺乘之得方面二百丈置二百丈加半倍一百丈得三百丈為鋭陳後闊亦為鋭陳通長先倍騎路五丈得一十丈以減後闊三百丈餘二百九十丈為實以人立八尺約之得三百六十二為鋭後闊布兵不盡四尺以半之得二尺輩歸騎路作五丈二尺以四約鋭後闊布兵三百
