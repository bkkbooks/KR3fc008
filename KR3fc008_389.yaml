body:
  text: 和買八寸八分二釐五毫七絲六忽夏稅六寸四分五釐七毫八絲下田苗米一斗四升一合七抄五撮五圭和買七寸三分五釐四毫八絲夏稅五寸三分八釐一毫五絲下等上田苗米一斗一升二合八勺六抄四圭和買五寸八分八釐三毫八絲四忽夏稅四寸三分五毫二絲中田苗米八升四合六勺四抄五撮三圭和買四寸四分一釐二毫八絲八忽夏稅三寸二分二釐八毫九絲下田苗米五升六合四勺三抄二圭和買二寸九分四釐一毫九絲二忽夏稅二寸一分五釐二毫六絲已上田則苗至勺絹至分收歸為等則定數答在前數書九章卷第九
