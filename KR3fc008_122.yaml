body:
  text: 可今率未得五日乃兩度纍加紀法一百二十入率內共得一百七十三日一刻六十七分為實實如法除之得五日二十四刻二十九分三十秒三十小分不盡棄之為歲餘乃去全五日得二十四刻二十九分三十秒三十小分為斗分次推嘉泰甲子上距慶元戊午歲得六以乘歲餘五日二十四刻二十九分三十秒三十小分得三十一日四十五刻七十五分八十一秒八十小分益入前測戊午歲三十九日九十二刻四十五分得七十一日三十八刻二十分八十一秒八十小分滿紀法六十去之餘一十一日三十八刻二十分八十一秒八十小分為所求甲子年氣骨之數合問治厯推閏問開禧厯以嘉泰四年甲子歲天正冬至為一十一日日辰乙亥四十四刻六十一分五十四秒十一月經朔一日日辰乙丑七十五刻五十五分六十二秒問閏骨閏率各幾何答曰閏骨九日六十九刻五分九十一秒不盡一百六十九分秒之一百二十一閏骨率十六萬三千七百七十一術曰以日法各通氣朔日刻分秒各為氣骨朔骨分其氣骨分如約率而一約盡者為可用或收棄餘分在一刻以下者亦可用然後與朔骨分相減餘為閏骨率以日法約之為閏骨策草曰置本厯日法一萬六千九百先通冬至一十一日四
