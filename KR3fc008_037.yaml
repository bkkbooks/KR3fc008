body:
  text: 用等數二約副母二爲一今乃復歸之爲二遂用衍母一十二益於左副一十二內𠔏爲二十四今騐用數圖右行之一二三四卽是所揲之數左行一十二并二十四及四與九併之得四十九名曰用數用爲蓍草數故易曰其用四十有九是也假令用蓍四十九信手分之爲二則左手奇右手必偶左手偶右手必奇欲使蓍數近大衍五十非四十九或五十一不可二數信意分之必有一奇一偶故所以用四十九取七七之數始者左副二十四扐益一十二就其三十七泛爲用數但三十七無意義兼蓍少太露是以用四十有九凡揲蓍求一爻之數欲得一二三四出於無爲必令揲者不得知故以四十九蓍分之爲二只用左手之數假令左手分得三十三自一一揲之必奇一故不繁揲乃徑掛一故易曰分而爲二以象兩掛一以象三次後又令筮人以二二揲之其三十三亦奇一故歸奇於扐又令之以三三揲之其三十三必奇三故又歸奇於扐又令之以四四揲之又奇一亦歸奇於扐與前掛一并三度揲通有四扐乃得一一三一其掛一者乘用數圖左上用數一十二其二揲扐一者乘左副用數二十四其三揲扐三者乘左次用數四得一十二其四揲一者乘
  hash: sha256:84aded1b5b935f922a55100e4008c79380a7662086d9e0df1949b243a08d4580
