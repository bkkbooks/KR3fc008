body:
  text: 千三功一十一分功之七通分內子得一百一十一萬一千四十為實置火頭每名管六十名功以乘分母一十一得六百六十為法除實得一千六百八十三功不盡二百六十與法約之為三十三分功之二十三為火頭功數半之得八百四十一功三十三分功之一十三為部押濠寨數今衆功下十一分功之七以母十一除火頭分母三十三得三以三因衆功下母子為一十萬一千三功三十三分功之二十一併三項母子得一十萬三千五百二十七功分子五十七滿母三十三收一功餘二十四與母各三約為十一分功之八為共用一十萬三千五百二十八功十一分功之八計浚河渠問開通運河就土築堤令面廣六丈底廣四丈上流深八尺下流深一丈六尺長四十八里其堤下廣二丈四尺上廣一丈八尺長與河等未知高以墟四堅三為率秋程人功每名自開運積築墟堅共積常六十尺築堤至半為棚道取土上下功減五分之一限一月畢欲知河積及堤積尺共用功并日役工數及堤高各幾何答曰河積六千二百二十萬八千尺堤積四千六百六十五萬六千尺堤高二丈一尺七分尺之三共用功二十四萬四千九百四十四
