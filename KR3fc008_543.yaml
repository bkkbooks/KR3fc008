body:
  text: 千三功一十一分功之七通分內子得一百一十一萬一千四十爲實置火頭毎名管六十名功以乘分母一十一得六百六十爲法除實得一千六百八十三功不盡二百六十與法約之爲三十三分功之二十三爲火頭功數半之得八百四十一功三十三分功之一十三爲部押濠寨數今眾功下十一分功之七以母十一除火頭分母三十三得三以三因眾功下母子爲一十萬一千三功三十三分功之二十一併三項母子得一十萬三千五百二十七功分子五十七滿母三十三收一功餘二十四與母各三約爲十一分功之八爲𠔏用一十萬三千五百二十八功十一分功之八計浚河渠問開通運河就土築堤令面廣六丈底廣四丈上流㴱八尺下流㴱一丈六尺長四十八里其堤下廣二丈四尺上廣一丈八尺長與河等未知高以墟四堅三爲率秋程人功毎名自開運積築墟堅𠔏積常六十尺築堤至半爲棚道取土上下功減五分之一限一月畢欲知河積及堤積尺𠔏用功并日役工數及堤高各幾何荅曰河積六千二百二十萬八千尺堤積四千六百六十五萬六千尺堤高二丈一尺七分尺之三𠔏用功二十四萬四千九百四十四
