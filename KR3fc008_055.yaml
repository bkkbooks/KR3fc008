body:
  text: 朔甲子一會積年內減厯過九千一百六十三年餘九千七十七年爲未至年數次以冬至周日三百六十五日二十五刻乘一會積年一萬八千二百四十得六百六十六萬二千一百六十日爲一會積日又以衍母爲實如法元圖朔元法九千二百五十三而一得二十二萬五千六百月爲一會積月合問推計土功問築堤起四縣夫分給里步皆同齊闊二丈里法三百六十步步法五尺八寸人夫以物力差定甲縣物力一十三萬八千六百貫乙縣物力一十四萬六千三百貫丙縣物力一十九萬二千五百貫丁縣物力一十八萬四千八百貫毎力七百七十貫科一名春程人功平方六十尺先到縣先給今甲乙二縣俱畢丙縣餘五十一丈丁縣餘一十八丈不及一日全功欲知堤長及四縣夫所築各幾何荅曰堤長一十九里二百三十五步五尺甲縣夫築一千二十六丈乙丙丁同乙縣夫築一千七百六十八步五尺六寸甲丙丁同丙縣夫築四里三百二十八步五尺六寸甲乙丁同丁縣夫築同前三縣數術曰置各縣力以程功乘爲實以力率乘堤齊闊爲法除之得各縣日築復數有分者通之互乘之得通數求總等不約一位約眾位曰元數連環求等約奇得定母陸續求衍數奇
